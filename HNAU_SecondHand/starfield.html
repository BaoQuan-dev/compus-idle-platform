<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HNAU 闲置星球</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.cn/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
            background: #000;
            color: #fff;
            touch-action: none;
        }
        
        /* 过渡动画遮罩 */
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at var(--tx, 50%) var(--ty, 50%), rgba(0, 255, 200, 0.9) 0%, #000 70%);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        .transition-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        /* Three.js Canvas */
        #cosmic-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: grab;
        }
        
        #cosmic-canvas:active {
            cursor: grabbing;
        }
        
        /* 主界面容器 */
        .main-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
        }
        
        .main-container.zooming {
            transform: scale(0.3);
            opacity: 0;
        }
        
        /* 顶部标题 */
        .header {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            opacity: 0;
            transition: opacity 0.8s ease;
            z-index: 10;
        }
        
        .header.visible {
            opacity: 1;
        }
        
        .header h1 {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 14px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 5s ease infinite;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
        }
        
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .header p {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 8px;
            margin-top: 12px;
        }
        
        /* 中心指示器 */
        .center-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.5s ease;
            z-index: 10;
        }
        
        .center-indicator.hidden {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
        }
        
        .center-circle {
            width: 140px;
            height: 140px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            animation: pulse-ring 2s ease-in-out infinite;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
        }
        
        .center-indicator:hover .center-circle {
            border-color: rgba(255, 255, 255, 0.8);
            transform: scale(1.15);
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.4);
        }
        
        .center-icon {
            font-size: 56px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        
        .center-indicator span {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        
        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 40px rgba(255, 255, 255, 0.15), 0 0 80px rgba(255, 255, 255, 0.08); }
            50% { box-shadow: 0 0 60px rgba(255, 255, 255, 0.25), 0 0 120px rgba(255, 255, 255, 0.12); }
        }
        
        /* 模块节点 */
        .module-node {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: scale(0);
        }
        
        .module-node.visible {
            opacity: 1;
            transform: scale(1);
        }
        
        .module-node.dimmed {
            opacity: 0.15 !important;
            transform: scale(0.65) !important;
            filter: blur(6px);
        }
        
        .module-node.active {
            opacity: 1 !important;
            transform: scale(1.4) !important;
            z-index: 100;
        }
        
        .module-node-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(50, 60, 90, 0.95), rgba(20, 30, 50, 0.98));
            border: 4px solid var(--module-color, rgba(255, 255, 255, 0.3));
            transition: all 0.5s ease;
            box-shadow: 0 0 40px var(--module-color, transparent),
                        inset 0 0 40px rgba(255, 255, 255, 0.08);
        }
        
        .module-node:hover .module-node-bg,
        .module-node.active .module-node-bg {
            border-width: 5px;
            box-shadow: 0 0 70px var(--module-color, rgba(255, 255, 255, 0.6)),
                        inset 0 0 50px rgba(255, 255, 255, 0.15);
        }
        
        .module-node-ring {
            position: absolute;
            width: calc(100% + 20px);
            height: calc(100% + 20px);
            border-radius: 50%;
            border: 2px solid var(--module-color, rgba(255, 255, 255, 0.2));
            opacity: 0.6;
            transition: all 0.5s ease;
        }
        
        .module-node:hover .module-node-ring,
        .module-node.active .module-node-ring {
            opacity: 1;
            animation: rotate-ring 5s linear infinite;
        }
        
        @keyframes rotate-ring {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .module-icon {
            font-size: 56px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 20px var(--module-color, rgba(255, 255, 255, 0.6)));
            transition: transform 0.3s ease;
        }
        
        .module-node:hover .module-icon {
            transform: scale(1.25) rotate(10deg);
        }
        
        .module-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--module-color-text, #fff);
            letter-spacing: 3px;
            text-shadow: 0 0 25px var(--module-color, rgba(255, 255, 255, 0.6));
            text-align: center;
        }
        
        /* 底部快捷入口 */
        .bottom-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: auto;
            width: 90%;
            max-width: 900px;
            z-index: 10;
        }
        
        .bottom-bar.visible {
            opacity: 1;
        }
        
        .quick-links {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        
        .quick-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            background: rgba(25, 35, 60, 0.9);
            border: 2px solid var(--link-color, rgba(255, 255, 255, 0.25));
            border-radius: 35px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(12px);
        }
        
        .quick-link:hover {
            background: rgba(45, 60, 100, 0.95);
            border-color: var(--link-color, rgba(255, 255, 255, 0.6));
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4),
                        0 0 25px var(--link-color, rgba(255, 255, 255, 0.3));
        }
        
        .quick-link:active {
            transform: scale(0.95);
        }
        
        .quick-link-icon {
            font-size: 28px;
        }
        
        .quick-link-text {
            font-size: 16px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.95);
        }
        
        .bottom-hint {
            text-align: center;
            margin-top: 22px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 3px;
        }
        
        /* 拖拽提示 */
        .drag-hint {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 3px;
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
            z-index: 5;
        }
        
        .drag-hint.visible {
            opacity: 1;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
                letter-spacing: 8px;
            }
            
            .module-node {
                width: 110px;
                height: 110px;
            }
            
            .module-icon {
                font-size: 40px;
            }
            
            .module-title {
                font-size: 13px;
            }
            
            .quick-link {
                padding: 14px 24px;
            }
            
            .quick-link-icon {
                font-size: 22px;
            }
            
            .quick-link-text {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="transition-overlay" id="transitionOverlay"></div>
    <canvas id="cosmic-canvas"></canvas>
    <div class="drag-hint" id="dragHint">拖拽星空探索更多</div>
    
    <div class="main-container" id="mainContainer">
        <div class="header" id="header">
            <h1>HNAU 闲置星球</h1>
            <p>探索校园闲置 · 开启绿色循环</p>
        </div>
        
        <div class="center-indicator" id="centerIndicator" onclick="awakenAll()">
            <div class="center-circle">
                <span class="center-icon">🌟</span>
            </div>
            <span>点击唤醒全部</span>
        </div>
    </div>
    
    <div class="bottom-bar" id="bottomBar">
        <div class="quick-links">
            <div class="quick-link" style="--link-color: #ff6b6b;" onclick="goToPage('home.html')">
                <span class="quick-link-icon">🏪</span>
                <span class="quick-link-text">闲置市场</span>
            </div>
            <div class="quick-link" style="--link-color: #ffd93d;" onclick="goToPage('user_login.html')">
                <span class="quick-link-icon">🔑</span>
                <span class="quick-link-text">登录/注册</span>
            </div>
            <div class="quick-link" style="--link-color: #6bcb77;" onclick="goToPage('stu_check.html')">
                <span class="quick-link-icon">🎓</span>
                <span class="quick-link-text">校园认证</span>
            </div>
            <div class="quick-link" style="--link-color: #4d96ff;" onclick="goToPage('carbon_ai.html')">
                <span class="quick-link-icon">🤖</span>
                <span class="quick-link-text">碳足迹AI</span>
            </div>
        </div>
        <div class="bottom-hint">点击上方图标快速进入对应功能</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ========== 配置 ==========
        var CONFIG = {
            modules: [
                { id: 'market', icon: '🏪', title: '闲置市场', color: '#ff6b6b', colorText: '#ff6b6b', url: 'home.html' },
                { id: 'publish', icon: '📦', title: '发布闲置', color: '#ffd93d', colorText: '#ffd93d', url: 'release_goods.html' },
                { id: 'donation', icon: '💝', title: '公益转赠', color: '#ff9ff3', colorText: '#ff9ff3', url: 'donation_list.html' },
                { id: 'demand', icon: '🔍', title: '需求广场', color: '#54a0ff', colorText: '#54a0ff', url: 'demand_board.html' },
                { id: 'carbon', icon: '🌱', title: '碳足迹', color: '#6bcb77', colorText: '#6bcb77', url: 'carbon_ai.html' },
                { id: 'profile', icon: '👤', title: '个人中心', color: '#a29bfe', colorText: '#a29bfe', url: 'user_center.html' }
            ]
        };
        
        var state = {
            isAnimating: false,
            allAwakened: false,
            isDragging: false,
            hasInteracted: false,
            previousMouseX: 0,
            previousMouseY: 0,
            rotationVelocityX: 0,
            rotationVelocityY: 0
        };
        
        // ========== Three.js ==========
        var scene, camera, renderer;
        var galaxyCore, nebulaLayers = [], starClusters = [], dustClouds, shootingStars;
        var mouseX = 0, mouseY = 0;
        var rotationX = 0, rotationY = 0;
        var time = 0;
        
        function initThree() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.z = 8;
            
            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('cosmic-canvas'),
                antialias: true,
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 1);
            
            // 创建银河核心
            createGalaxyCore();
            
            // 创建多层星云（参考图的朦胧效果）
            createNebulaLayer(0x1a0a2e, 3000, 40, 50, 0.08, 0);      // 深紫色星云
            createNebulaLayer(0x0a1628, 2500, 50, 60, 0.06, 1);      // 深蓝色星云
            createNebulaLayer(0x0a2820, 2000, 45, 55, 0.05, 2);       // 青绿色星云
            
            // 创建星系旋臂粒子（围绕中心的漩涡）
            createGalaxySpiralArms();
            
            // 创建星团（模块对应的聚集区）
            createStarClusters();
            
            // 创建尘埃云
            createCosmicDust();
            
            // 创建流星
            createShootingStars();
            
            // 创建背景星空
            createBackgroundStars();
            
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mouseup', onMouseUp);
            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', onTouchEnd);
            window.addEventListener('resize', onResize);
        }
        
        // 银河核心 - 中心明亮光点
        function createGalaxyCore() {
            var geometry = new THREE.BufferGeometry();
            var count = 500;
            var positions = new Float32Array(count * 3);
            var colors = new Float32Array(count * 3);
            var sizes = new Float32Array(count);
            
            for (var i = 0; i < count; i++) {
                var i3 = i * 3;
                var r = Math.random() * 5;
                var theta = Math.random() * Math.PI * 2;
                var phi = Math.acos(2 * Math.random() - 1);
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i3 + 2] = r * Math.cos(phi);
                
                // 核心颜色：青白色到蓝紫色
                var t = r / 5;
                colors[i3] = 0.3 + t * 0.7;      // R
                colors[i3 + 1] = 0.6 + t * 0.4;  // G
                colors[i3 + 2] = 0.8 + t * 0.2;  // B
                
                sizes[i] = (5 - r) * 0.5 + Math.random() * 0.5;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            var material = new THREE.PointsMaterial({
                size: 3,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                sizeAttenuation: true,
                blending: THREE.AdditiveBlending
            });
            
            galaxyCore = new THREE.Points(geometry, material);
            scene.add(galaxyCore);
        }
        
        // 星云层 - 参考图的大范围朦胧效果
        function createNebulaLayer(color, count, spreadX, spreadY, opacity, index) {
            var geometry = new THREE.BufferGeometry();
            var positions = new Float32Array(count * 3);
            var colors = new Float32Array(count * 3);
            var sizes = new Float32Array(count);
            
            var colorObj = new THREE.Color(color);
            
            for (var i = 0; i < count; i++) {
                var i3 = i * 3;
                
                // 椭圆形分布，形成平面星云
                var angle = Math.random() * Math.PI * 2;
                var radius = Math.sqrt(Math.random()) * 30;
                var thickness = (Math.random() - 0.5) * 15;
                
                positions[i3] = Math.cos(angle) * radius * (spreadX / 30);
                positions[i3 + 1] = Math.sin(angle) * radius * 0.6 * (spreadY / 30) + thickness * 0.3;
                positions[i3 + 2] = thickness;
                
                colors[i3] = colorObj.r;
                colors[i3 + 1] = colorObj.g;
                colors[i3 + 2] = colorObj.b;
                
                sizes[i] = Math.random() * 20 + 8;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            var material = new THREE.PointsMaterial({
                size: 15,
                vertexColors: true,
                transparent: true,
                opacity: opacity,
                sizeAttenuation: true,
                blending: THREE.AdditiveBlending
            });
            
            var nebula = new THREE.Points(geometry, material);
            nebula.userData.index = index;
            nebulaLayers.push(nebula);
            scene.add(nebula);
        }
        
        // 星系旋臂 - 漩涡状分布
        function createGalaxySpiralArms() {
            var geometry = new THREE.BufferGeometry();
            var count = 8000;
            var positions = new Float32Array(count * 3);
            var colors = new Float32Array(count * 3);
            
            for (var i = 0; i < count; i++) {
                var i3 = i * 3;
                
                // 漩涡臂公式
                var arm = Math.floor(Math.random() * 3); // 3条旋臂
                var angle = (i / count) * Math.PI * 12 + (arm * Math.PI * 2 / 3);
                var radius = 5 + Math.random() * 45;
                
                // 添加随机扰动
                var spread = 3 + Math.random() * 5;
                var heightSpread = 2 + Math.random() * 3;
                
                positions[i3] = Math.cos(angle) * radius + (Math.random() - 0.5) * spread;
                positions[i3 + 1] = (Math.random() - 0.5) * heightSpread;
                positions[i3 + 2] = Math.sin(angle) * radius * 0.4 + (Math.random() - 0.5) * spread * 0.5;
                
                // 颜色：蓝色到紫色渐变
                var t = radius / 50;
                var colorChoice = Math.random();
                if (colorChoice < 0.4) {
                    // 蓝色系
                    colors[i3] = 0.3 - t * 0.1;
                    colors[i3 + 1] = 0.5 - t * 0.1;
                    colors[i3 + 2] = 0.9;
                } else if (colorChoice < 0.7) {
                    // 紫色系
                    colors[i3] = 0.5 - t * 0.1;
                    colors[i3 + 1] = 0.2;
                    colors[i3 + 2] = 0.8;
                } else if (colorChoice < 0.9) {
                    // 青色系
                    colors[i3] = 0.1;
                    colors[i3 + 1] = 0.7;
                    colors[i3 + 2] = 0.7;
                } else {
                    // 白色亮点
                    colors[i3] = 0.9;
                    colors[i3 + 1] = 0.9;
                    colors[i3 + 2] = 1;
                }
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            var material = new THREE.PointsMaterial({
                size: 1.2,
                vertexColors: true,
                transparent: true,
                opacity: 0.85,
                sizeAttenuation: true
            });
            
            var spiralArms = new THREE.Points(geometry, material);
            scene.add(spiralArms);
        }
        
        // 星团 - 每个模块对应的粒子聚集区
        function createStarClusters() {
            var clusterAngles = [0, 60, 120, 180, 240, 300]; // 6个模块对应位置
            var clusterColors = ['#ff6b6b', '#ffd93d', '#ff9ff3', '#54a0ff', '#6bcb77', '#a29bfe'];
            
            clusterAngles.forEach(function(angleDeg, index) {
                var geometry = new THREE.BufferGeometry();
                var count = 800;
                var positions = new Float32Array(count * 3);
                var colors = new Float32Array(count * 3);
                var sizes = new Float32Array(count);
                var phases = new Float32Array(count); // 闪烁相位
                
                var angle = (angleDeg - 90) * Math.PI / 180;
                var distance = 15 + Math.random() * 5;
                var centerX = Math.cos(angle) * distance;
                var centerY = Math.sin(angle) * distance;
                
                var colorObj = new THREE.Color(clusterColors[index]);
                
                for (var i = 0; i < count; i++) {
                    var i3 = i * 3;
                    
                    // 高斯分布，形成圆形聚集
                    var r = gaussianRandom() * 4;
                    var theta = Math.random() * Math.PI * 2;
                    
                    positions[i3] = centerX + r * Math.cos(theta);
                    positions[i3 + 1] = centerY + r * Math.sin(theta) * 0.6;
                    positions[i3 + 2] = gaussianRandom() * 2;
                    
                    // 模块对应颜色
                    colors[i3] = colorObj.r;
                    colors[i3 + 1] = colorObj.g;
                    colors[i3 + 2] = colorObj.b;
                    
                    sizes[i] = Math.random() * 2 + 0.5;
                    phases[i] = Math.random() * Math.PI * 2;
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
                geometry.setAttribute('phase', new THREE.BufferAttribute(phases, 1));
                
                var material = new THREE.PointsMaterial({
                    size: 2,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.7,
                    sizeAttenuation: true
                });
                
                var cluster = new THREE.Points(geometry, material);
                cluster.userData.moduleIndex = index;
                cluster.userData.centerX = centerX;
                cluster.userData.centerY = centerY;
                starClusters.push(cluster);
                scene.add(cluster);
            });
        }
        
        // 宇宙尘埃
        function createCosmicDust() {
            var geometry = new THREE.BufferGeometry();
            var count = 2000;
            var positions = new Float32Array(count * 3);
            var colors = new Float32Array(count * 3);
            
            for (var i = 0; i < count; i++) {
                var i3 = i * 3;
                
                positions[i3] = (Math.random() - 0.5) * 100;
                positions[i3 + 1] = (Math.random() - 0.5) * 60;
                positions[i3 + 2] = -20 - Math.random() * 50;
                
                var c = Math.random();
                if (c < 0.33) {
                    colors[i3] = 0.2; colors[i3 + 1] = 0.15; colors[i3 + 2] = 0.3;
                } else if (c < 0.66) {
                    colors[i3] = 0.1; colors[i3 + 1] = 0.2; colors[i3 + 2] = 0.3;
                } else {
                    colors[i3] = 0.15; colors[i3 + 1] = 0.25; colors[i3 + 2] = 0.25;
                }
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            var material = new THREE.PointsMaterial({
                size: 8,
                vertexColors: true,
                transparent: true,
                opacity: 0.04,
                sizeAttenuation: true,
                blending: THREE.AdditiveBlending
            });
            
            dustClouds = new THREE.Points(geometry, material);
            scene.add(dustClouds);
        }
        
        // 背景星空
        function createBackgroundStars() {
            var geometry = new THREE.BufferGeometry();
            var count = 5000;
            var positions = new Float32Array(count * 3);
            var colors = new Float32Array(count * 3);
            
            for (var i = 0; i < count; i++) {
                var i3 = i * 3;
                
                positions[i3] = (Math.random() - 0.5) * 300;
                positions[i3 + 1] = (Math.random() - 0.5) * 200;
                positions[i3 + 2] = -50 - Math.random() * 150;
                
                var c = Math.random();
                if (c < 0.6) {
                    colors[i3] = 1; colors[i3 + 1] = 1; colors[i3 + 2] = 1;
                } else if (c < 0.8) {
                    colors[i3] = 0.7; colors[i3 + 1] = 0.8; colors[i3 + 2] = 1;
                } else {
                    colors[i3] = 1; colors[i3 + 1] = 0.9; colors[i3 + 2] = 0.7;
                }
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            var material = new THREE.PointsMaterial({
                size: 0.8,
                vertexColors: true,
                transparent: true,
                opacity: 0.6
            });
            
            var backgroundStars = new THREE.Points(geometry, material);
            scene.add(backgroundStars);
        }
        
        // 流星
        function createShootingStars() {
            var group = new THREE.Group();
            
            for (var i = 0; i < 4; i++) {
                var geometry = new THREE.BufferGeometry();
                var positions = new Float32Array(40);
                
                for (var j = 0; j < 40; j++) {
                    positions[j * 3] = j * 0.8;
                    positions[j * 3 + 1] = j * 0.15 * (Math.random() > 0.5 ? 1 : -1);
                    positions[j * 3 + 2] = -j * 0.4;
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                
                var material = new THREE.LineBasicMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0
                });
                
                var line = new THREE.Line(geometry, material);
                line.visible = false;
                line.userData = {
                    active: false,
                    progress: 0,
                    speed: 0.008 + Math.random() * 0.015,
                    delay: i * 4000 + Math.random() * 3000,
                    startTime: Date.now()
                };
                
                group.add(line);
            }
            
            scene.add(group);
            shootingStars = group;
        }
        
        // 高斯随机数
        function gaussianRandom() {
            var u = 0, v = 0;
            while (u === 0) u = Math.random();
            while (v === 0) v = Math.random();
            return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        }
        
        // 更新流星
        function updateShootingStars() {
            if (!shootingStars) return;
            
            var now = Date.now();
            shootingStars.children.forEach(function(star) {
                if (!star.visible) {
                    if (now - star.userData.startTime > star.userData.delay) {
                        star.visible = true;
                        star.userData.active = true;
                        star.userData.progress = 0;
                        
                        var x = (Math.random() - 0.5) * 60;
                        var y = 20 + Math.random() * 15;
                        star.position.set(x, y, -30);
                        star.rotation.z = -Math.PI / 4 + (Math.random() - 0.5) * 0.4;
                    }
                }
                
                if (star.userData.active) {
                    star.userData.progress += star.userData.speed;
                    star.material.opacity = Math.sin(star.userData.progress * Math.PI) * 0.8;
                    star.scale.setScalar(1 + star.userData.progress * 3);
                    
                    if (star.userData.progress >= 1) {
                        star.visible = false;
                        star.userData.active = false;
                        star.userData.startTime = now;
                        star.material.opacity = 0;
                    }
                }
            });
        }
        
        // 鼠标/触摸事件
        function onMouseDown(e) {
            state.isDragging = true;
            state.previousMouseX = e.clientX;
            state.previousMouseY = e.clientY;
            hideDragHint();
        }
        
        function onMouseUp() {
            state.isDragging = false;
        }
        
        function onMouseMove(e) {
            if (state.isDragging) {
                var deltaX = e.clientX - state.previousMouseX;
                var deltaY = e.clientY - state.previousMouseY;
                
                state.rotationVelocityY = deltaX * 0.004;
                state.rotationVelocityX = deltaY * 0.004;
                
                rotationY += state.rotationVelocityY;
                rotationX += state.rotationVelocityX;
                
                state.previousMouseX = e.clientX;
                state.previousMouseY = e.clientY;
            }
            
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        }
        
        function onTouchStart(e) {
            if (e.touches.length === 1) {
                state.isDragging = true;
                state.previousMouseX = e.touches[0].clientX;
                state.previousMouseY = e.touches[0].clientY;
                hideDragHint();
            }
        }
        
        function onTouchMove(e) {
            if (e.touches.length === 1 && state.isDragging) {
                e.preventDefault();
                var deltaX = e.touches[0].clientX - state.previousMouseX;
                var deltaY = e.touches[0].clientY - state.previousMouseY;
                
                state.rotationVelocityY = deltaX * 0.004;
                state.rotationVelocityX = deltaY * 0.004;
                
                rotationY += state.rotationVelocityY;
                rotationX += state.rotationVelocityX;
                
                state.previousMouseX = e.touches[0].clientX;
                state.previousMouseY = e.touches[0].clientY;
            }
        }
        
        function onTouchEnd() {
            state.isDragging = false;
        }
        
        function hideDragHint() {
            if (!state.hasInteracted) {
                state.hasInteracted = true;
                document.getElementById('dragHint').classList.remove('visible');
            }
        }
        
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            
            // 惯性旋转
            if (!state.isDragging) {
                rotationY += state.rotationVelocityY;
                rotationX += state.rotationVelocityX;
                state.rotationVelocityY *= 0.97;
                state.rotationVelocityX *= 0.97;
                
                // 缓慢自动旋转
                rotationY += 0.0004;
            }
            
            // 银河核心旋转
            if (galaxyCore) {
                galaxyCore.rotation.z += 0.001;
                galaxyCore.rotation.x = rotationX * 0.3;
                galaxyCore.rotation.y = rotationY * 0.3;
            }
            
            // 星云层旋转
            nebulaLayers.forEach(function(nebula, index) {
                nebula.rotation.z = time * (0.02 + index * 0.01);
                nebula.rotation.x = rotationX * 0.2 + Math.sin(time * 0.3) * 0.03;
                nebula.rotation.y = rotationY * 0.2 + Math.cos(time * 0.2) * 0.03;
            });
            
            // 星团闪烁和跟随
            starClusters.forEach(function(cluster, index) {
                // 星团缓慢脉动
                var pulse = 0.7 + 0.3 * Math.sin(time * 2 + index);
                
                // 根据模块状态调整
                var moduleId = CONFIG.modules[index] ? CONFIG.modules[index].id : '';
                var node = document.getElementById('module-' + moduleId);
                
                if (node && node.classList.contains('dimmed')) {
                    cluster.material.opacity = 0.2;
                    cluster.scale.setScalar(0.7);
                } else if (node && node.classList.contains('active')) {
                    cluster.material.opacity = 1;
                    cluster.scale.setScalar(1.3);
                } else {
                    cluster.material.opacity = 0.5 + pulse * 0.3;
                    cluster.scale.setScalar(0.9 + pulse * 0.1);
                }
                
                // 星团跟随整体旋转
                cluster.rotation.z = rotationY * 0.1;
            });
            
            // 尘埃云
            if (dustClouds) {
                dustClouds.rotation.x = rotationX * 0.15;
                dustClouds.rotation.y = rotationY * 0.15;
            }
            
            // 流星
            updateShootingStars();
            
            // 相机轻微跟随
            camera.position.x += (mouseX * 0.4 - camera.position.x) * 0.03;
            camera.position.y += (-mouseY * 0.3 - camera.position.y) * 0.03;
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
        }
        
        // ========== DOM 操作 ==========
        function createModuleNodes() {
            var container = document.getElementById('mainContainer');
            var radius = window.innerWidth < 768 ? 180 : 240;
            
            CONFIG.modules.forEach(function(mod, index) {
                var node = document.createElement('div');
                node.className = 'module-node';
                node.id = 'module-' + mod.id;
                node.style.cssText = '--module-color: ' + mod.color + '; --module-color-text: ' + mod.colorText + ';';
                node.innerHTML = 
                    '<div class="module-node-bg"></div>' +
                    '<div class="module-node-ring"></div>' +
                    '<div class="module-icon">' + mod.icon + '</div>' +
                    '<div class="module-title">' + mod.title + '</div>';
                
                var angle = (index / CONFIG.modules.length) * Math.PI * 2 - Math.PI / 2;
                var x = Math.cos(angle) * radius;
                var y = Math.sin(angle) * radius;
                
                node.style.left = 'calc(50% + ' + x + 'px - 80px)';
                node.style.top = 'calc(50% + ' + y + 'px - 80px)';
                
                node.addEventListener('click', function(e) {
                    zoomAndNavigate(mod, e);
                });
                
                node.addEventListener('mouseenter', function() {
                    dimOtherModules(mod.id);
                });
                
                node.addEventListener('mouseleave', function() {
                    if (!state.allAwakened) {
                        resetModules();
                    }
                });
                
                container.appendChild(node);
                
                setTimeout(function() {
                    node.classList.add('visible');
                }, 300 + index * 120);
            });
        }
        
        function dimOtherModules(activeId) {
            CONFIG.modules.forEach(function(mod) {
                var node = document.getElementById('module-' + mod.id);
                if (mod.id !== activeId) {
                    node.classList.add('dimmed');
                    node.classList.remove('active');
                } else {
                    node.classList.remove('dimmed');
                    node.classList.add('active');
                }
            });
        }
        
        function resetModules() {
            CONFIG.modules.forEach(function(mod) {
                var node = document.getElementById('module-' + mod.id);
                node.classList.remove('dimmed', 'active');
            });
        }
        
        function awakenAll() {
            state.allAwakened = true;
            CONFIG.modules.forEach(function(mod) {
                var node = document.getElementById('module-' + mod.id);
                node.classList.remove('dimmed');
                node.classList.add('active');
            });
            
            setTimeout(function() {
                state.allAwakened = false;
                resetModules();
            }, 3000);
        }
        
        function zoomAndNavigate(module, event) {
            if (state.isAnimating) return;
            state.isAnimating = true;
            
            var mainContainer = document.getElementById('mainContainer');
            var overlay = document.getElementById('transitionOverlay');
            
            var tx = event.clientX !== undefined ? (event.clientX / window.innerWidth) * 100 : 50;
            var ty = event.clientY !== undefined ? (event.clientY / window.innerHeight) * 100 : 50;
            
            overlay.style.setProperty('--tx', tx + '%');
            overlay.style.setProperty('--ty', ty + '%');
            
            var startZ = camera.position.z;
            var targetZ = 1.5;
            var zoomDuration = 600;
            var startTime = Date.now();
            
            function zoomIn() {
                var elapsed = Date.now() - startTime;
                var progress = Math.min(elapsed / zoomDuration, 1);
                var easeProgress = 1 - Math.pow(1 - progress, 3);
                
                camera.position.z = startZ + (targetZ - startZ) * easeProgress;
                
                if (progress < 1) {
                    requestAnimationFrame(zoomIn);
                } else {
                    mainContainer.classList.add('zooming');
                    overlay.classList.add('active');
                    
                    setTimeout(function() {
                        window.location.href = module.url;
                    }, 400);
                }
            }
            
            zoomIn();
        }
        
        function goToPage(url) {
            window.location.href = url;
        }
        
        function init() {
            initThree();
            createModuleNodes();
            
            setTimeout(function() {
                document.getElementById('header').classList.add('visible');
                document.getElementById('bottomBar').classList.add('visible');
            }, 200);
            
            setTimeout(function() {
                document.getElementById('dragHint').classList.add('visible');
            }, 1500);
            
            animate();
        }
        
        init();
    </script>
</body>
