<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农大闲置 - 校园循环经济平台</title>
    <link rel="stylesheet" href="./style/main.css">
    <style>
        /* ========== 视频背景 ========== */
        body { position: relative; margin: 0; padding: 0; }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: #0a0a1a;
        }
        .video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        /* ========== 主界面 ========== */
        .home-header {
            padding: 60px 20px 0;
            text-align: center;
        }
        .home-header h1 {
            margin: 0 0 8px 0;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #60A5FA 50%, #C084FC 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .home-header p {
            margin: 0;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        /* ========== 功能组件容器 ========== */
        .home-container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px 100px;
            position: relative;
            z-index: 1;
        }
        /* ========== 环形功能布局 ========== */
        .feature-ring {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1;
            margin: 0 auto;
        }
        .center-indicator {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            background: linear-gradient(135deg, rgba(96,165,250,0.3), rgba(192,132,252,0.3));
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .center-indicator:hover {
            transform: translate(-50%, -50%) scale(1.1);
            border-color: rgba(255,255,255,0.4);
        }
        .center-indicator .logo {
            font-size: 24px;
            margin-bottom: 2px;
        }
        .center-indicator .text {
            font-size: 10px;
            color: rgba(255,255,255,0.8);
        }
        .feature-item {
            position: absolute;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }
        .feature-item:hover {
            transform: scale(1.1);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .feature-item .icon {
            font-size: 32px;
            margin-bottom: 6px;
        }
        .feature-item .label {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
        }
        /* 位置 */
        .feature-item.top { top: 0; left: 50%; transform: translateX(-50%); }
        .feature-item.top:hover { transform: translateX(-50%) scale(1.1); }
        .feature-item.left { top: 50%; left: 0; transform: translateY(-50%); }
        .feature-item.left:hover { transform: translateY(-50%) scale(1.1); }
        .feature-item.right { top: 50%; right: 0; transform: translateY(-50%); }
        .feature-item.right:hover { transform: translateY(-50%) scale(1.1); }
        .feature-item.bottom-left { bottom: 0; left: 10%; }
        .feature-item.bottom-right { bottom: 0; right: 10%; }
        /* 发光效果 */
        .feature-item.top { box-shadow: 0 0 30px rgba(250,204,21,0.3); border-color: rgba(250,204,21,0.3); }
        .feature-item.left { box-shadow: 0 0 30px rgba(192,132,252,0.3); border-color: rgba(192,132,252,0.3); }
        .feature-item.right { box-shadow: 0 0 30px rgba(236,72,153,0.3); border-color: rgba(236,72,153,0.3); }
        .feature-item.bottom-left { box-shadow: 0 0 30px rgba(52,211,153,0.3); border-color: rgba(52,211,153,0.3); }
        .feature-item.bottom-right { box-shadow: 0 0 30px rgba(59,130,246,0.3); border-color: rgba(59,130,246,0.3); }
        /* ========== 底部登录按钮 ========== */
        .login-section {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .login-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: linear-gradient(135deg, rgba(236,72,153,0.8), rgba(192,132,252,0.8));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(236,72,153,0.4);
        }
        .login-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(236,72,153,0.5);
        }
        /* ========== 底部导航 ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 11px;
            transition: color 0.3s;
        }
        .nav-item:hover, .nav-item.active { color: #fff; }
        .nav-item .icon { font-size: 22px; }
        /* 登录弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: linear-gradient(135deg, rgba(30,30,50,0.95), rgba(20,20,40,0.95));
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }
        .modal h2 {
            margin: 0 0 8px 0;
            font-size: 22px;
            background: linear-gradient(135deg, #fff, #60A5FA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .modal p {
            margin: 0 0 24px 0;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        .modal-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #60A5FA, #3B82F6);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        .modal-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(96,165,250,0.4);
        }
        .modal-btn.secondary {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .close-btn {
            position: absolute;
            top: 16px; right: 16px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 视频背景 -->
    <video class="video-bg" autoplay muted loop playsinline>
        <source src="./images/bg-video.mp4" type="video/mp4">
    </video>
    
    <!-- 主界面 -->
    <div class="home-header">
        <h1>🌟 农大闲置</h1>
        <p>探索校园闲置 开启循环生活</p>
    </div>
    
    <div class="home-container">
        <div class="feature-ring">
            <!-- 中心 -->
            <div class="center-indicator" onclick="awakenAll()">
                <span class="logo">✨</span>
                <span class="text">点击唤醒</span>
            </div>
            
            <!-- 发布闲置 -->
            <a href="explore.html" class="feature-item top">
                <span class="icon">📦</span>
                <span class="label">发布闲置</span>
            </a>
            
            <!-- 个人中心 -->
            <a href="explore.html" class="feature-item left">
                <span class="icon">👤</span>
                <span class="label">个人中心</span>
            </a>
            
            <!-- 公益转赠 -->
            <a href="explore.html" class="feature-item right">
                <span class="icon">💝</span>
                <span class="label">公益转赠</span>
            </a>
            
            <!-- 碳足迹 -->
            <a href="explore.html" class="feature-item bottom-left">
                <span class="icon">🌱</span>
                <span class="label">碳足迹</span>
            </a>
            
            <!-- 需求广场 -->
            <a href="explore.html" class="feature-item bottom-right">
                <span class="icon">🔍</span>
                <span class="label">需求广场</span>
            </a>
        </div>
    </div>
    
    <!-- 登录弹窗 -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <h2>登录农大闲置</h2>
            <p>发现更多校园闲置，开启绿色循环生活</p>
            <button class="modal-btn" onclick="goToLogin()">立即登录</button>
            <button class="modal-btn secondary" onclick="goToRegister()">注册账号</button>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <a href="starfield.html" class="nav-item active">
            <span class="icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="explore.html" class="nav-item">
            <span class="icon">✨</span>
            <span>探索</span>
        </a>
        <a href="explore.html" class="nav-item">
            <span class="icon">➕</span>
            <span>发布</span>
        </a>
        <a href="explore.html" class="nav-item">
            <span class="icon">💝</span>
            <span>公益</span>
        </a>
        <a href="explore.html" class="nav-item">
            <span class="icon">👤</span>
            <span>我的</span>
        </a>
    </nav>
    
    <script>
        // 唤醒所有功能
        function awakenAll() {
            const items = document.querySelectorAll('.feature-item');
            items.forEach((item, index) => {
                setTimeout(() => {
                    item.style.animation = 'pulse 0.5s ease';
                    setTimeout(() => item.style.animation = '', 500);
                }, index * 100);
            });
        }
        
        // 登录弹窗
        function showLoginModal() {
            document.getElementById('loginModal').classList.add('show');
        }
        
        function goToLogin() {
            window.location.href = 'user_login.html';
        }
        
        function goToRegister() {
            window.location.href = 'user_register.html';
        }
        
        // 点击弹窗外部关闭
        document.getElementById('loginModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('show');
            }
        });
        
        // 添加脉冲动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.15); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
