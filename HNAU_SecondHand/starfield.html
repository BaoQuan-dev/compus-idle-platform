<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNAU 闲置星球</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.cn/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            color: #fff;
        }
        
        /* 过渡动画遮罩 */
        /* 过渡动画遮罩 - 透明 */
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: none;
        }
        
        .transition-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        /* Three.js Canvas */
        #cosmic-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* 主界面容器 */
        .main-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
        }
        
        .main-container.zooming {
            transform: scale(0.3);
            opacity: 0;
        }
        
        /* 顶部标题 */
        .header {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        
        .header.visible {
            opacity: 1;
        }
        
        .header h1 {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: 10px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 5s ease infinite;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
            position: relative;
        }
        
        .header h1::before,
        .header h1::after {
            content: '✨';
            position: absolute;
            -webkit-text-fill-color: initial;
            font-size: 24px;
            animation: twinkle 2s ease-in-out infinite;
        }
        
        .header h1::before {
            left: -50px;
            animation-delay: 0s;
        }
        
        .header h1::after {
            right: -50px;
            animation-delay: 1s;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        
        .header p {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 6px;
            margin-top: 15px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* 中心指示器 */
        .center-indicator {
            position: absolute;
            top: calc(50% + 80px);
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.5s ease;
        }
        
        .center-indicator.hidden {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
        }
        
        .center-circle {
            width: 160px;
            height: 160px;
            border: 4px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            animation: pulse-ring 2s ease-in-out infinite;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            position: relative;
        }
        
        .center-circle::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .center-indicator:hover .center-circle {
            border-color: rgba(255, 255, 255, 0.9);
            transform: scale(1.15);
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.4),
                        0 0 100px rgba(255, 215, 0, 0.3);
        }
        
        .center-icon {
            font-size: 50px;
            animation: float 3s ease-in-out infinite;
        }
        
        .center-text {
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            margin-top: 8px;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8),
                         0 0 40px rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, #ffd700, #ff6b6b, #ffd700);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: text-shine 3s ease-in-out infinite;
        }
        
        @keyframes text-shine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .center-indicator span {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 255, 255, 0.1), 0 0 60px rgba(255, 255, 255, 0.05); }
            50% { box-shadow: 0 0 50px rgba(255, 255, 255, 0.2), 0 0 100px rgba(255, 255, 255, 0.1); }
        }
        
        /* 模块节点 - 放大版 */
        .module-node {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.1s ease-out;
            opacity: 0;
            transform: scale(0);
            /* 增强悬浮滑动感 */
            will-change: transform, opacity, left, top;
        }
        
        .module-node.visible {
            opacity: 1;
            transform: scale(1);
            animation: float-in 0.8s ease-out forwards;
        }
        
        @keyframes float-in {
            0% {
                opacity: 0;
                transform: scale(0) translateY(50px);
            }
            60% {
                transform: scale(1.1) translateY(-5px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        /* 鼠标悬浮时的滑动效果 */
        .module-node:hover {
            transform: scale(1.15) translateY(-8px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        box-shadow 0.3s ease,
                        border-color 0.3s ease;
        }
        
        .module-node:active {
            transform: scale(1.05);
            transition: transform 0.1s ease;
        }
        
        .module-node.dimmed {
            opacity: 0.15 !important;
            transform: scale(0.6) translateY(0) !important;
            filter: blur(3px);
        }
        
        .module-node.active {
            opacity: 1 !important;
            transform: scale(1.35) translateY(-15px) !important;
            z-index: 100;
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% {
                filter: brightness(1) drop-shadow(0 0 20px var(--module-color, rgba(255, 255, 255, 0.5)));
            }
            50% {
                filter: brightness(1.2) drop-shadow(0 0 40px var(--module-color, rgba(255, 255, 255, 0.8)));
            }
        }
        
        .module-node-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(40, 50, 70, 0.95), rgba(15, 20, 35, 0.98));
            border: 3px solid var(--module-color, rgba(255, 255, 255, 0.3));
            transition: all 0.5s ease;
            box-shadow: 0 0 30px var(--module-color, transparent),
                        inset 0 0 30px rgba(255, 255, 255, 0.05);
        }
        
        .module-node:hover .module-node-bg,
        .module-node.active .module-node-bg {
            border-width: 4px;
            box-shadow: 0 0 60px var(--module-color, rgba(255, 255, 255, 0.5)),
                        inset 0 0 40px rgba(255, 255, 255, 0.15);
        }
        
        .module-node-ring {
            position: absolute;
            width: calc(100% + 15px);
            height: calc(100% + 15px);
            border-radius: 50%;
            border: 2px solid var(--module-color, rgba(255, 255, 255, 0.2));
            opacity: 0.5;
            transition: all 0.5s ease;
        }
        
        .module-node:hover .module-node-ring,
        .module-node.active .module-node-ring {
            opacity: 1;
            animation: rotate-ring 6s linear infinite;
        }
        
        @keyframes rotate-ring {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .module-icon {
            font-size: 52px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 15px var(--module-color, rgba(255, 255, 255, 0.5)));
            transition: transform 0.3s ease;
        }
        
        .module-node:hover .module-icon {
            transform: scale(1.2) rotate(10deg);
        }
        
        .module-title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 3px;
            text-align: center;
            margin-top: 12px;
            position: relative;
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,0,0,0.6));
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--module-color, rgba(255,255,255,0.2));
            box-shadow: 0 0 20px var(--module-color, rgba(255,255,255,0.1));
        }
        
        .module-title::before {
            content: '♦';
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--module-color);
            animation: sparkle 1.5s ease-in-out infinite;
        }
        
        .module-title::after {
            content: '♦';
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--module-color);
            animation: sparkle 1.5s ease-in-out infinite 0.75s;
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: translateY(-50%) scale(0.8); }
            50% { opacity: 1; transform: translateY(-50%) scale(1.2); }
        }
        
        /* 粒子尾迹 */
        .module-node::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, var(--module-color, transparent) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            animation: particle-pulse 2s ease-in-out infinite;
        }
        
        .module-node:hover::after {
            opacity: 0.3;
        }
        
        @keyframes particle-pulse {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.2); opacity: 0.4; }
        }
        
        /* 底部快捷入口 */
        .bottom-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: auto;
            width: 90%;
            max-width: 850px;
        }
        
        .bottom-bar.visible {
            opacity: 1;
        }
        
        .quick-links {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        
        .quick-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            background: rgba(20, 30, 50, 0.85);
            border: 2px solid var(--link-color, rgba(255, 255, 255, 0.2));
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(10px);
            /* 增强滑动感 */
            will-change: transform, box-shadow;
            position: relative;
            overflow: hidden;
        }
        
        .quick-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }
        
        .quick-link:hover::before {
            left: 100%;
        }
        
        .quick-link:hover {
            background: rgba(30, 45, 70, 0.95);
            border-color: var(--link-color, rgba(255, 255, 255, 0.6));
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                        0 0 40px var(--link-color, rgba(255, 255, 255, 0.4));
        }
        
        .quick-link:active {
            transform: translateY(-2px) scale(0.98);
            transition: transform 0.1s ease;
        }
        
        .quick-link-icon {
            font-size: 30px;
            transition: transform 0.3s ease;
        }
        
        .quick-link:hover .quick-link-icon {
            transform: scale(1.2) rotate(5deg);
            animation: bounce-icon 0.6s ease infinite;
        }
        
        .quick-link-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px var(--link-color, rgba(255,255,255,0.3));
        }
        
        @keyframes bounce-icon {
            0%, 100% { transform: scale(1.2) translateY(0); }
            50% { transform: scale(1.2) translateY(-3px); }
        }
        
        .quick-link-icon {
            font-size: 24px;
        }
        
        .quick-link-text {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
        }
        
        /* 底部说明 */
        .bottom-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
        }
        
        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            padding: 12px 24px;
            background: rgba(20, 30, 50, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .back-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .back-btn:hover {
            background: rgba(40, 60, 100, 0.9);
            transform: translateX(5px);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
                letter-spacing: 4px;
            }
            
            .header p {
                font-size: 13px;
            }
            
            .module-node {
                width: 110px;
                height: 110px;
            }
            
            .module-icon {
                font-size: 40px;
            }
            
            .module-title {
                font-size: 14px;
            }
            
            .center-circle {
                width: 110px;
                height: 110px;
            }
            
            .center-icon {
                font-size: 44px;
            }
            
            .quick-link {
                padding: 12px 20px;
            }
            
            .quick-link-text {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- 过渡动画遮罩 -->
    <div class="transition-overlay" id="transitionOverlay"></div>
    
    <!-- 返回按钮 -->
    <button class="back-btn" id="backBtn" onclick="goBack()">← 返回首页</button>
    
    <!-- Three.js Canvas 包装器 -->
    <div id="canvas-wrapper" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; transform-style: preserve-3d;">
        <canvas id="cosmic-canvas"></canvas>
    </div>
    
    <!-- 主界面 -->
    <div class="main-container" id="mainContainer">
        <!-- 标题 -->
        <div class="header" id="header">
            <h1>🌟 农大闲置 🌟</h1>
            <p>探索校园闲置 · 开启绿色循环</p>
        </div>
        
        <!-- 中心指示器 -->
        <div class="center-indicator" id="centerIndicator" onclick="awakenAll()">
            <div class="center-circle">
                <span class="center-icon">🎁</span>
                <span class="center-text">农大闲置</span>
            </div>
            <span>点击唤醒全部</span>
        </div>
    </div>
    
    <!-- 底部快捷入口 -->
    <div class="bottom-bar" id="bottomBar">
        <div class="quick-links">
            <div class="quick-link" style="--link-color: #ffd93d;" onclick="goToPage('user_login.html')">
                <span class="quick-link-icon">👕</span>
                <span class="quick-link-text">登录/注册</span>
            </div>
            <div class="quick-link" style="--link-color: #6bcb77;" onclick="goToPage('stu_check.html')">
                <span class="quick-link-icon">📱</span>
                <span class="quick-link-text">校园认证</span>
            </div>
            <div class="quick-link" style="--link-color: #4d96ff;" onclick="goToPage('carbon_ai.html')">
                <span class="quick-link-icon">💻</span>
                <span class="quick-link-text">碳足迹AI</span>
            </div>
            <div class="quick-link" style="--link-color: #ff9ff3;" onclick="goToPage('donation_list.html')">
                <span class="quick-link-icon">🎧</span>
                <span class="quick-link-text">公益转赠</span>
            </div>
        </div>
        <div class="bottom-hint">点击上方图标快速进入对应功能</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ========== 闲置物品配置 ==========
        var ITEMS = [
            '👟', '👕', '👖', '👗', '🧥', '👠', '👡', '👢',
            '🎒', '👝', '👜', '💼', '🎒', '🕶', '⌚', '📱',
            '💻', '⌨️', '🖥', '🖨', '📷', '🎮', '🎧', '📚',
            '🎸', '🎮', '⚽', '🏀', '🎯', '🎲', '🧸', '🎁',
            '💄', '💍', '🔧', '🔨', '✂️', '📏', '🖊',
            '🪑', '💡', '🏷️', '📦', '🧲', '🔑', '🎵'
        ];
        
        var ITEM_COLORS = [
            0xff6b6b, 0xffd93d, 0x6bcb77, 0x4d96ff, 0xff9ff3,
            0xa29bfe, 0xfd79a8, 0xfdcb6e, 0x00b894, 0x0984e3,
            0xe17055, 0x00cec9, 0x6c5ce7, 0xfab1a0, 0x74b9ff
        ];
        
        // ========== 模块配置 ==========
        var CONFIG = {
            modules: [
                {
                    id: 'publish',
                    icon: '📦',
                    title: '发布闲置',
                    color: '#ffd93d',
                    colorText: '#ffd93d',
                    desc: '一键发布闲置物品',
                    url: 'release_goods.html'
                },
                {
                    id: 'donation',
                    icon: '💝',
                    title: '公益转赠',
                    color: '#ff9ff3',
                    colorText: '#ff9ff3',
                    desc: '传递爱心温暖',
                    url: 'donation_list.html'
                },
                {
                    id: 'demand',
                    icon: '🔍',
                    title: '需求广场',
                    color: '#54a0ff',
                    colorText: '#54a0ff',
                    desc: '寻找有缘人',
                    url: 'demand_board.html'
                },
                {
                    id: 'carbon',
                    icon: '🌱',
                    title: '碳足迹',
                    color: '#6bcb77',
                    colorText: '#6bcb77',
                    desc: '记录环保行动',
                    url: 'carbon_ai.html'
                },
                {
                    id: 'profile',
                    icon: '👤',
                    title: '个人中心',
                    color: '#a29bfe',
                    colorText: '#a29bfe',
                    desc: '管理我的信息',
                    url: 'user_center.html'
                }
            ]
        };
        
        // ========== 状态 ==========
        var state = {
            isAnimating: false,
            allAwakened: false
        };
        
        // ========== Three.js ==========
        var scene, camera, renderer;
        var floatingItems = [];
        var glowParticles;
        var mouseX = 0, mouseY = 0;
        var targetX = 0, targetY = 0;
        var velocityX = 0, velocityY = 0;
        var isDragging = false;
        var lastX = 0, lastY = 0;
        var dragSensitivity = 3;
        var returnSpeed = 0.08;
        
        function initThree() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 8;
            
            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('cosmic-canvas'),
                antialias: true,
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            
            // 创建渐变背景
            createGradientBackground();
            
            // 创建漂浮的闲置物品
            createFloatingItems();
            
            // 创建发光粒子
            createGlowParticles();
            
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onDragStart);
            document.addEventListener('mouseup', onDragEnd);
            document.addEventListener('mouseleave', onDragEnd);
            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', onDragEnd);
            window.addEventListener('resize', onResize);
        }
        
        function createGradientBackground() {
            var canvas = document.createElement('canvas');
            canvas.width = 2;
            canvas.height = 512;
            var ctx = canvas.getContext('2d');
            
            var gradient = ctx.createLinearGradient(0, 0, 0, 512);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f0f23');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 2, 512);
            
            var texture = new THREE.CanvasTexture(canvas);
            scene.background = texture;
        }
        
        // 创建商品精灵图（emoji + 发光背景）
        function createGoodsSprite(emoji, color) {
            var canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            var ctx = canvas.getContext('2d');
            
            // 发光背景 - 统一处理颜色格式
            var hex;
            if (typeof color === 'number') {
                // 数字类型：转换为hex字符串
                hex = '#' + color.toString(16).padStart(6, '0');
            } else if (typeof color === 'string') {
                // 字符串类型：去除可能存在的#号
                hex = color.replace(/^#/, '');
                hex = '#' + hex;
            } else {
                hex = '#ffd93d'; // 默认颜色
            }
            
            var gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, hex + 'cc');
            gradient.addColorStop(0.5, hex + '44');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 128, 128);
            
            // 绘制emoji
            ctx.font = '72px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(emoji, 64, 64);
            
            var texture = new THREE.CanvasTexture(canvas);
            var material = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                opacity: 0.95,
                depthWrite: false
            });
            return new THREE.Sprite(material);
        }
        
        function createFloatingItems() {
            // 围绕5个模块的环形星轨效果
            var isMobile = window.innerWidth < 768;
            var baseRadius = isMobile ? 280 : 450; // 模块距离中心的距离
            var orbitGroup = new THREE.Group();
            
            CONFIG.modules.forEach(function(mod, moduleIndex) {
                // 计算模块的圆周角度位置
                var moduleAngle = (moduleIndex / CONFIG.modules.length) * Math.PI * 2 - Math.PI / 2;
                
                // 模块在3D空间中的位置
                var moduleX = Math.cos(moduleAngle) * baseRadius;
                var moduleZ = Math.sin(moduleAngle) * baseRadius * 0.4; // 压缩Z轴增加透视感
                var moduleY = Math.sin(moduleAngle) * baseRadius * 0.2; // Y轴弧度
                
                // 每个模块周围创建3层轨道（像素单位）
                var ringRadius = isMobile ? 100 : 160; // 轨道半径基础值
                var rings = [
                    { dist: ringRadius * 0.8, count: 6, speed: 0.04, dir: 1 },   // 内层轨道
                    { dist: ringRadius * 1.3, count: 8, speed: 0.025, dir: -1 }, // 中层轨道
                    { dist: ringRadius * 1.9, count: 10, speed: 0.015, dir: 1 }  // 外层轨道
                ];
                
                rings.forEach(function(ring, ringIndex) {
                    for (var i = 0; i < ring.count; i++) {
                        var itemGroup = new THREE.Group();
                        
                        // 随机商品emoji和颜色
                        var emoji = ITEMS[Math.floor(Math.random() * ITEMS.length)];
                        var color = mod.color; // 使用模块主题色
                        
                        // 远近层次：内圈物品大，外圈物品小
                        var baseSize = 1.4 - ringIndex * 0.3;
                        var size = baseSize + Math.random() * 0.2;
                        
                        // 创建sprite
                        var sprite = createGoodsSprite(emoji, color);
                        sprite.scale.set(size, size, 1);
                        itemGroup.add(sprite);
                        
                        // 轨道角度（均匀分布+随机偏移）
                        var angle = (i / ring.count) * Math.PI * 2 + Math.random() * 0.2;
                        var angleOffset = (Math.random() - 0.5) * 0.3;
                        
                        // 存储轨道参数
                        itemGroup.userData = {
                            // 轨道中心是模块位置
                            centerX: moduleX,
                            centerY: moduleY,
                            centerZ: moduleZ,
                            orbitRadius: ring.dist,
                            orbitSpeed: ring.speed + Math.random() * 0.005,
                            orbitDirection: ring.dir,
                            orbitAngle: angle + angleOffset,
                            ySpread: 0.15 - ringIndex * 0.03,
                            baseScale: size,
                            floatOffset: Math.random() * Math.PI * 2,
                            // 指向中心模块（用于让物品朝向中心）
                            toCenterAngle: moduleAngle
                        };
                        
                        // 初始位置
                        var px = moduleX + Math.cos(angle) * ring.dist;
                        var py = moduleY + Math.sin(angle + Math.random() * Math.PI) * ring.dist * 0.3;
                        var pz = moduleZ + Math.sin(angle) * ring.dist * 0.4;
                        itemGroup.position.set(px, py, pz);
                        
                        // 让物品朝向中心
                        itemGroup.lookAt(new THREE.Vector3(moduleX, moduleY, moduleZ));
                        
                        orbitGroup.add(itemGroup);
                        floatingItems.push(itemGroup);
                    }
                });
            });
            
            // 添加模块之间的连接星尘
            var connectorCount = isMobile ? 30 : 50;
            for (var i = 0; i < connectorCount; i++) {
                var itemGroup = new THREE.Group();
                
                var emoji = ITEMS[Math.floor(Math.random() * ITEMS.length)];
                var color = ITEM_COLORS[Math.floor(Math.random() * ITEM_COLORS.length)];
                
                var size = 0.6 + Math.random() * 0.4;
                var sprite = createGoodsSprite(emoji, color);
                sprite.scale.set(size, size, 1);
                sprite.material.opacity = 0.3 + Math.random() * 0.2;
                itemGroup.add(sprite);
                
                // 在两个模块之间的轨道上
                var startModule = i % CONFIG.modules.length;
                var endModule = (startModule + 1) % CONFIG.modules.length;
                
                var startAngle = (startModule / CONFIG.modules.length) * Math.PI * 2 - Math.PI / 2;
                var endAngle = (endModule / CONFIG.modules.length) * Math.PI * 2 - Math.PI / 2;
                var t = (i % 10) / 10;
                
                var midAngle = startAngle + (endAngle - startAngle) * t;
                var connectorRadius = baseRadius * 0.95 + Math.random() * baseRadius * 0.4;
                
                itemGroup.userData = {
                    isConnector: true,
                    centerX: Math.cos(midAngle) * connectorRadius,
                    centerY: Math.sin(midAngle) * baseRadius * 0.15,
                    centerZ: Math.sin(midAngle) * connectorRadius * 0.4,
                    orbitRadius: 0.08 + Math.random() * 0.1,
                    orbitSpeed: 0.01 + Math.random() * 0.008,
                    orbitDirection: Math.random() > 0.5 ? 1 : -1,
                    orbitAngle: Math.random() * Math.PI * 2,
                    baseScale: size,
                    floatOffset: Math.random() * Math.PI * 2
                };
                
                itemGroup.position.set(
                    itemGroup.userData.centerX,
                    itemGroup.userData.centerY,
                    itemGroup.userData.centerZ
                );
                
                orbitGroup.add(itemGroup);
                floatingItems.push(itemGroup);
            }
            
            scene.add(orbitGroup);
        }
        
        function createGlowParticles() {
            var geometry = new THREE.BufferGeometry();
            var count = 1500;
            var positions = new Float32Array(count * 3);
            var colors = new Float32Array(count * 3);
            var sizes = new Float32Array(count);
            
            for (var i = 0; i < count; i++) {
                var i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 80;
                positions[i3 + 1] = (Math.random() - 0.5) * 50;
                positions[i3 + 2] = -30 - Math.random() * 30;
                
                // 彩色粒子
                var colorChoice = Math.random();
                if (colorChoice < 0.25) {
                    colors[i3] = 1; colors[i3 + 1] = 0.42; colors[i3 + 2] = 0.42; // 红
                } else if (colorChoice < 0.5) {
                    colors[i3] = 1; colors[i3 + 1] = 0.85; colors[i3 + 2] = 0.24; // 黄
                } else if (colorChoice < 0.75) {
                    colors[i3] = 0.42; colors[i3 + 1] = 0.8; colors[i3 + 2] = 0.47; // 绿
                } else {
                    colors[i3] = 0.29; colors[i3 + 1] = 0.59; colors[i3 + 2] = 1; // 蓝
                }
                
                sizes[i] = Math.random() * 2 + 0.5;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            var material = new THREE.PointsMaterial({
                size: 0.08,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                sizeAttenuation: true
            });
            
            glowParticles = new THREE.Points(geometry, material);
            scene.add(glowParticles);
        }
        
        function onMouseMove(e) {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        }
        
        function onDragStart(e) {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
            velocityX = 0;
            velocityY = 0;
            document.body.style.cursor = 'grabbing';
        }
        
        function onDragEnd() {
            isDragging = false;
            document.body.style.cursor = 'default';
        }
        
        function onTouchStart(e) {
            if (e.touches.length === 1) {
                isDragging = true;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
                velocityX = 0;
                velocityY = 0;
            }
        }
        
        function onTouchMove(e) {
            if (isDragging && e.touches.length === 1) {
                e.preventDefault();
                var deltaX = e.touches[0].clientX - lastX;
                var deltaY = e.touches[0].clientY - lastY;
                
                velocityX = deltaX * 0.01;
                velocityY = -deltaY * 0.01;
                
                targetX += velocityX;
                targetY += velocityY;
                
                // 限制范围
                targetX = Math.max(-3, Math.min(3, targetX));
                targetY = Math.max(-2, Math.min(2, targetY));
                
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            }
        }
        
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            var time = Date.now() * 0.001;
            
            // 鼠标/拖拽驱动的目标位置
            if (!isDragging) {
                // 鼠标悬停影响
                targetX += (mouseX * 2 - targetX) * 0.05;
                targetY += (-mouseY * 1.5 - targetY) * 0.05;
                
                // 添加惯性滑动
                targetX += velocityX;
                targetY += velocityY;
                
                // 阻力衰减
                velocityX *= 0.95;
                velocityY *= 0.95;
                
                // 缓慢回归中心
                targetX *= 0.995;
                targetY *= 0.995;
            }
            
            // 限制范围
            targetX = Math.max(-3, Math.min(3, targetX));
            targetY = Math.max(-2, Math.min(2, targetY));
            
            // 相机跟随（增强滑动感）
            if (camera && camera.position) {
                camera.position.x += (targetX - camera.position.x) * 0.1;
                camera.position.y += (targetY - camera.position.y) * 0.1;
                
                // 相机旋转（视差效果）
                camera.rotation.y = -targetX * 0.08;
                camera.rotation.x = targetY * 0.05;
                
                camera.lookAt(0, 0, 0);
            }
            
            // 动画漂浮物品 - 围绕模块的环形星轨效果
            if (floatingItems && floatingItems.length > 0) {
                floatingItems.forEach(function(item, index) {
                    if (!item || !item.userData) return;
                    var data = item.userData;
                    if (!data) return;
                    if (typeof data.orbitAngle !== 'number') data.orbitAngle = 0;
                    if (typeof data.orbitSpeed !== 'number') data.orbitSpeed = 0.02;
                    if (typeof data.orbitDirection !== 'number') data.orbitDirection = 1;
                    if (typeof data.orbitRadius !== 'number') data.orbitRadius = 2;
                    if (typeof data.ySpread !== 'number') data.ySpread = 0.1;
                    if (typeof data.centerX !== 'number') data.centerX = 0;
                    if (typeof data.centerY !== 'number') data.centerY = 0;
                    if (typeof data.centerZ !== 'number') data.centerZ = 0;
                    if (typeof data.baseScale !== 'number') data.baseScale = 1;
                
                    // 沿轨道公转
                    data.orbitAngle += data.orbitSpeed * data.orbitDirection;
                    
                    // 计算相对中心的位置
                    var localX = Math.cos(data.orbitAngle) * data.orbitRadius;
                    var localZ = Math.sin(data.orbitAngle) * data.orbitRadius * 0.5;
                    var localY = Math.sin(data.orbitAngle * 3) * data.ySpread;
                    
                    // 加上中心位置（模块位置）
                    item.position.x = data.centerX + localX;
                    item.position.y = data.centerY + localY;
                    item.position.z = data.centerZ + localZ;
                    
                    // 物品自身旋转
                    var rotSpeed = data.baseScale * 0.02;
                    item.rotation.z += rotSpeed;
                    if (item.children && item.children[0]) {
                        item.children[0].rotation.z = Math.sin(time * 2 + index) * 0.2;
                    }
                    
                    // 近大远小效果（基于实际Z位置）
                    var distance = Math.abs(data.centerZ + localZ);
                    var scaleMod = Math.max(0.4, 1 - (distance / 20) * 0.5);
                    if (item.children && item.children[0]) {
                        item.children[0].scale.set(data.baseScale * scaleMod, data.baseScale * scaleMod, 1);
                    }
                    
                    // 鼠标拖拽视差效果
                    var parallaxFactor = Math.max(0.3, 1 - (distance / 20) * 0.5);
                    item.position.x += targetX * parallaxFactor * 1.5;
                    item.position.y += targetY * parallaxFactor * 1;
                    item.position.z += targetX * parallaxFactor * 0.3;
                });
            }
            
            // 粒子效果（跟随滑动）
            if (glowParticles && glowParticles.rotation) {
                glowParticles.rotation.y += 0.0005;
                glowParticles.rotation.x = Math.sin(time * 0.3) * 0.15;
                glowParticles.rotation.z = Math.cos(time * 0.2) * 0.1;
                
                // 粒子视差跟随
                if (glowParticles.position) {
                    glowParticles.position.x = targetX * 0.3;
                    glowParticles.position.y = -targetY * 0.2;
                }
            }
            
            if (renderer && scene) {
                renderer.render(scene, camera);
            }
        }
        
        // ========== DOM 操作 ==========
        function createModuleNodes() {
            var container = document.getElementById('mainContainer');
            var radius = window.innerWidth < 768 ? 170 : 240;
            
            CONFIG.modules.forEach(function(mod, index) {
                var node = document.createElement('div');
                node.className = 'module-node';
                node.id = 'module-' + mod.id;
                node.style.cssText = '--module-color: ' + mod.color + '; --module-color-text: ' + mod.colorText + ';';
                node.innerHTML = 
                    '<div class="module-node-bg"></div>' +
                    '<div class="module-node-ring"></div>' +
                    '<div class="module-icon">' + mod.icon + '</div>' +
                    '<div class="module-title">' + mod.title + '</div>';
                
                var angle = (index / CONFIG.modules.length) * Math.PI * 2 - Math.PI / 2;
                var x = Math.cos(angle) * radius;
                var y = Math.sin(angle) * radius;
                
                node.style.left = 'calc(50% + ' + x + 'px - 75px)';
                node.style.top = 'calc(50% + ' + y + 'px - 75px + 80px)'; // 往下偏移80px
                
                node.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    zoomAndNavigate(mod, node);
                });
                
                // 也给模块内的文字添加点击
                var moduleText = node.querySelector('.module-title');
                if (moduleText) {
                    moduleText.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        zoomAndNavigate(mod, node);
                    });
                }
                
                var moduleIcon = node.querySelector('.module-icon');
                if (moduleIcon) {
                    moduleIcon.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        zoomAndNavigate(mod, node);
                    });
                }
                
                node.addEventListener('mouseenter', function() {
                    dimOtherModules(mod.id);
                });
                
                node.addEventListener('mouseleave', function() {
                    if (!state.allAwakened) {
                        resetModules();
                    }
                });
                
                container.appendChild(node);
                
                setTimeout(function() {
                    node.classList.add('visible');
                }, 300 + index * 120);
            });
        }
        
        function dimOtherModules(activeId) {
            CONFIG.modules.forEach(function(mod) {
                var node = document.getElementById('module-' + mod.id);
                if (!node) return;
                if (mod.id !== activeId) {
                    node.classList.add('dimmed');
                    node.classList.remove('active');
                } else {
                    node.classList.remove('dimmed');
                    node.classList.add('active');
                }
            });
        }
        
        function resetModules() {
            CONFIG.modules.forEach(function(mod) {
                var node = document.getElementById('module-' + mod.id);
                if (node) {
                    node.classList.remove('dimmed', 'active');
                }
            });
        }
        
        function awakenAll() {
            state.allAwakened = true;
            CONFIG.modules.forEach(function(mod) {
                var node = document.getElementById('module-' + mod.id);
                if (node) {
                    node.classList.remove('dimmed');
                    node.classList.add('active');
                }
            });
            
            setTimeout(function() {
                state.allAwakened = false;
                resetModules();
            }, 3000);
        }
        
        // ========== 核心：物品漩涡旋转拉近效果 ==========
        function zoomAndNavigate(module, node) {
            if (state.isAnimating) return;
            if (!node) return;
            state.isAnimating = true;
            
            var mainContainer = document.getElementById('mainContainer');
            var overlay = document.getElementById('transitionOverlay');
            var canvasWrapper = document.getElementById('canvas-wrapper');
            
            // 获取点击位置
            var rect = node.getBoundingClientRect();
            var clickX = rect.left + rect.width / 2;
            var clickY = rect.top + rect.height / 2;
            
            // 模块节点放大高亮
            node.style.transform = 'scale(1.3)';
            node.style.zIndex = '100';
            
            // 其他模块变暗缩小
            document.querySelectorAll('.module-node').forEach(function(m) {
                if (m && m !== node) {
                    m.style.opacity = '0.3';
                    m.style.transform = 'scale(0.7)';
                }
            });
            
            // ========== 物品漩涡旋转聚拢动画 ==========
            var startTime = performance.now();
            var zoomDuration = 1200; // 1.2秒
            
            // 保存物品原始数据
            var itemsData = floatingItems.map(function(item) {
                return {
                    x: item ? item.position.x : 0,
                    y: item ? item.position.y : 0,
                    z: item ? item.position.z : 0,
                    rx: item ? item.rotation.x : 0,
                    ry: item ? item.rotation.y : 0,
                    rz: item ? item.rotation.z : 0
                };
            });
            
            // 目标点（点击位置对应的3D坐标）
            var targetX = (clickX / window.innerWidth - 0.5) * 30;
            var targetY = -(clickY / window.innerHeight - 0.5) * 15;
            
            function animateVortex(currentTime) {
                var elapsed = currentTime - startTime;
                var progress = Math.min(elapsed / zoomDuration, 1);
                
                // 平滑缓动
                var easeProgress = 1 - Math.pow(1 - progress, 3);
                
                // 物品漩涡旋转聚拢
                floatingItems.forEach(function(item, index) {
                    var data = itemsData[index];
                    if (!item || !data) return;
                    var delay = (index % 10) * 0.05; // 错开延迟
                    var localProgress = Math.max(0, Math.min(1, (easeProgress - delay) / (1 - delay)));
                    var easeLocal = 1 - Math.pow(1 - localProgress, 2);
                    
                    // 漩涡旋转效果（绕Z轴旋转）
                    var angle = easeLocal * Math.PI * 4; // 旋转2圈
                    var radius = (1 - easeLocal) * data.x; // 半径缩小
                    var spiralX = Math.cos(angle + index * 0.5) * radius;
                    var spiralY = Math.sin(angle + index * 0.5) * radius;
                    
                    // 聚拢到中心点
                    item.position.x = data.x + (targetX - data.x) * easeLocal * 0.8 + spiralX * (1 - easeLocal);
                    item.position.y = data.y + (targetY - data.y) * easeLocal * 0.8 + spiralY * (1 - easeLocal);
                    item.position.z = data.z + easeLocal * 10; // 向镜头靠近
                    
                    // 物品自身旋转
                    item.rotation.x = data.rx + easeLocal * Math.PI * 2;
                    item.rotation.y = data.ry + easeLocal * Math.PI * 3;
                    
                    // 物品缩放（聚拢时变小消失）
                    var scale = 1 - easeLocal * 0.7;
                    item.scale.set(scale, scale, scale);
                    
                    // 透明度（通过缩放到0实现淡出）
                    if (easeLocal > 0.7) {
                        item.visible = false;
                    }
                });
                
                // 相机拉近
                if (camera) {
                    camera.position.z = 15 - easeProgress * 10;
                }
                
                // 标题和底部栏淡出
                var uiOpacity = 1 - easeProgress;
                var headerEl = document.getElementById('header');
                var bottomBarEl = document.getElementById('bottomBar');
                if (headerEl) headerEl.style.opacity = uiOpacity;
                if (bottomBarEl) bottomBarEl.style.opacity = uiOpacity;
                
                // 遮罩淡入
                if (overlay) overlay.style.opacity = easeProgress * 0.5;
                
                if (progress < 1) {
                    requestAnimationFrame(animateVortex);
                } else {
                    // 恢复物品可见性
                    floatingItems.forEach(function(item) {
                        if (item) item.visible = true;
                    });
                    window.location.href = 'explore.html';
                }
            }
            
            requestAnimationFrame(animateVortex);
        }
        
        function goBack() {
            window.location.href = 'starfield.html';
        }
        
        function goToPage(url) {
            window.location.href = url;
        }
        
        // ========== 初始化 ==========
        function init() {
            initThree();
            createModuleNodes();
            
            // 显示标题和底部栏
            setTimeout(function() {
                document.getElementById('header').classList.add('visible');
                document.getElementById('bottomBar').classList.add('visible');
            }, 200);
            
            animate();
        }
        
        init();
    </script>
