<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="河南农业大学闲置物品交易平台">
    <title>农大闲置 - 3D星空首页</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* 顶部标题 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            text-align: center;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.5), 0 0 40px rgba(76,175,80,0.3);
            letter-spacing: 4px;
        }
        
        .header p {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-top: 8px;
            letter-spacing: 2px;
        }
        
        /* 中心麦穗区域提示 */
        .center-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .center-hint.visible {
            opacity: 1;
        }
        
        .center-hint .icon {
            font-size: 48px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .center-hint .text {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        
        /* 模块容器 - 麦穗形状排列 */
        .modules-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .module {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translate(-50%, -50%);
        }
        
        .module:hover {
            transform: translate(-50%, -50%) scale(1.15);
        }
        
        .module.dimmed {
            opacity: 0.3;
            filter: blur(2px);
            transform: translate(-50%, -50%) scale(0.9);
        }
        
        .module.far {
            opacity: 0.15;
            filter: blur(4px);
            transform: translate(-50%, -50%) scale(0.7);
        }
        
        .module-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(76,175,80,0.3) 0%, rgba(56,142,60,0.2) 100%);
            border: 3px solid rgba(129,199,132,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            box-shadow: 0 0 30px rgba(76,175,80,0.4), 
                        inset 0 0 20px rgba(76,175,80,0.2);
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
        }
        
        .module:hover .module-icon {
            border-color: rgba(255,255,255,0.9);
            box-shadow: 0 0 50px rgba(76,175,80,0.7), 
                        0 0 80px rgba(129,199,132,0.4),
                        inset 0 0 30px rgba(76,175,80,0.3);
        }
        
        .module-label {
            margin-top: 16px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 15px rgba(76,175,80,0.8), 
                         0 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 3px;
            white-space: nowrap;
            transition: all 0.3s ease;
        }
        
        .module:hover .module-label {
            color: #a5d6a7;
            text-shadow: 0 0 25px rgba(76,175,80,1), 
                         0 0 50px rgba(129,199,132,0.6);
        }
        
        /* 过渡动画覆盖层 */
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, #000 100%);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }
        
        .transition-overlay.active {
            opacity: 1;
        }
        
        /* 底部轮播区域 */
        .bottom-carousel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 30px 40px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 60%, transparent 100%);
        }
        
        .carousel-title {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 12px;
        }
        
        .carousel-wrapper {
            position: relative;
            overflow: hidden;
        }
        
        .carousel-track {
            display: flex;
            gap: 12px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: grab;
        }
        
        .carousel-track:active {
            cursor: grabbing;
        }
        
        .carousel-item {
            flex-shrink: 0;
            width: 140px;
            height: 80px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(76,175,80,0.2) 0%, rgba(56,142,60,0.1) 100%);
            border: 1px solid rgba(129,199,132,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .carousel-item:hover,
        .carousel-item.active {
            background: linear-gradient(135deg, rgba(76,175,80,0.4) 0%, rgba(56,142,60,0.3) 100%);
            border-color: rgba(129,199,132,0.8);
            box-shadow: 0 0 20px rgba(76,175,80,0.3);
            transform: scale(1.05);
        }
        
        .carousel-item .icon {
            font-size: 24px;
        }
        
        .carousel-item .label {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        
        /* 轮播指示器 */
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }
        
        .carousel-dot {
            width: 40px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .carousel-dot.active {
            background: rgba(129,199,132,0.9);
            box-shadow: 0 0 10px rgba(76,175,80,0.5);
        }
        
        /* 麦穗装饰 */
        .wheat-decoration {
            position: fixed;
            z-index: 5;
            pointer-events: none;
            opacity: 0.6;
        }
        
        .wheat-left {
            left: 5%;
            top: 50%;
            transform: translateY(-50%) rotate(-15deg);
        }
        
        .wheat-right {
            right: 5%;
            top: 50%;
            transform: translateY(-50%) rotate(15deg) scaleX(-1);
        }
        
        .wheat svg {
            width: 60px;
            height: 200px;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.3));
        }
        
        /* 响应式适配 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 22px;
                letter-spacing: 2px;
            }
            
            .header p {
                font-size: 11px;
            }
            
            .module-icon {
                width: 75px;
                height: 75px;
                font-size: 32px;
            }
            
            .module-label {
                font-size: 14px;
                margin-top: 12px;
            }
            
            .carousel-item {
                width: 110px;
                height: 65px;
            }
            
            .carousel-item .icon {
                font-size: 20px;
            }
            
            .carousel-item .label {
                font-size: 11px;
            }
            
            .wheat svg {
                width: 40px;
                height: 140px;
            }
        }
        
        @media (max-width: 480px) {
            .module-icon {
                width: 60px;
                height: 60px;
                font-size: 26px;
            }
            
            .module-label {
                font-size: 12px;
                letter-spacing: 1px;
            }
        }
    </style>
</head>

    <!-- 过渡动画 -->
    <div class="transition-overlay" id="transitionOverlay"></div>
    
    <!-- 底部轮播 -->
    <div class="bottom-carousel">
        <div class="carousel-title">快速分类</div>
        <div class="carousel-wrapper">
            <div class="carousel-track" id="carouselTrack">
                <div class="carousel-item active" data-index="0">

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // ========== 配置 ==========
        const CONFIG = {
            modules: [
                { icon: '🏪', label: '闲置市场', url: 'home.html', color: '#4CAF50' },
                { icon: '📦', label: '发布闲置', url: 'release_goods.html', color: '#2196F3' },
                { icon: '💝', label: '公益转赠', url: 'donation_list.html', color: '#E91E63' },
                { icon: '🔍', label: '需求广场', url: 'demand_board.html', color: '#FF9800' },
                { icon: '🌱', label: '碳足迹', url: 'carbon_ai.html', color: '#00BCD4' },
                { icon: '👤', label: '个人中心', url: 'user_center.html', color: '#9C27B0' },
                { icon: '✅', label: '校园认证', url: 'stu_check.html', color: '#FF5722' },
                { icon: '⚙️', label: '管理员', url: 'manage_admin.html', color: '#607D8B' }
            ],
            carouselItems: 8,
            visibleCarouselItems: { desktop: 5, tablet: 3, mobile: 2 }
        };
        
        // ========== Three.js 星空背景 ==========
        let scene, camera, renderer, stars, particles;
        let mouseX = 0, mouseY = 0;
        
        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            
            // 场景
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050510, 0.0008);
            
            // 相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.z = 500;
            
            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);
            
            // 星星
            createStars();
            
            // 粒子
            createParticles();
            
            // 动画循环
            animate();
        }
        
        function createStars() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 2,
                transparent: true,
                opacity: 0.8
            });
            
            const starsVertices = [];
            for (let i = 0; i < 3000; i++) {
                const x = (Math.random() - 0.5) * 2000;
                const y = (Math.random() - 0.5) * 2000;
                const z = (Math.random() - 0.5) * 2000;
                starsVertices.push(x, y, z);
            }
            
            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
            stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
            
            // 彩色星云
            const nebulaGeometry = new THREE.BufferGeometry();
            const nebulaMaterial = new THREE.PointsMaterial({
                color: 0x4CAF50,
                size: 4,
                transparent: true,
                opacity: 0.4
            });
            
            const nebulaVertices = [];
            for (let i = 0; i < 500; i++) {
                const x = (Math.random() - 0.5) * 1500;
                const y = (Math.random() - 0.5) * 1500;
                const z = (Math.random() - 0.5) * 1500;
                nebulaVertices.push(x, y, z);
            }
            
            nebulaGeometry.setAttribute('position', new THREE.Float32BufferAttribute(nebulaVertices, 3));
            const nebula = new THREE.Points(nebulaGeometry, nebulaMaterial);
            scene.add(nebula);
        }
        
        function createParticles() {
            const particleGeometry = new THREE.BufferGeometry();
            const particleMaterial = new THREE.PointsMaterial({
                color: 0x00ff88,
                size: 1.5,
                transparent: true,
                opacity: 0.6
            });
            
            const particleVertices = [];
            for (let i = 0; i < 200; i++) {
                particleVertices.push(
                    (Math.random() - 0.5) * 1000,
                    (Math.random() - 0.5) * 1000,
                    (Math.random() - 0.5) * 1000
                );
            }
            
            particleGeometry.setAttribute('position', new THREE.Float32BufferAttribute(particleVertices, 3));
            particles = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particles);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            // 旋转星空
            if (stars) {
                stars.rotation.y += 0.0002;
                stars.rotation.x += 0.0001;
            }
            
            if (particles) {
                particles.rotation.y -= 0.0003;
                particles.rotation.z += 0.0001;
            }
            
            // 鼠标跟随相机
            camera.position.x += (mouseX * 30 - camera.position.x) * 0.02;
            camera.position.y += (-mouseY * 20 - camera.position.y) * 0.02;
            camera.lookAt(scene.position);
            
            renderer.render(scene, camera);
        }
        
        // ========== 模块管理 ==========
        let modules = [];
        let hoveredModule = null;
        
        function initModules() {
            const container = document.getElementById('modulesContainer');
            container.innerHTML = '';
            modules = [];
            
            // 麦穗形状排列 - 分两层
            const positions = calculateWheatPositions();
            
            CONFIG.modules.forEach((config, index) => {
                const module = document.createElement('div');
                module.className = 'module';
                module.dataset.index = index;
                
                module.innerHTML = `
                    <div class="module-icon">${config.icon}</div>
                    <div class="module-label">${config.label}</div>
                `;
                
                const pos = positions[index];
                module.style.left = pos.x + '%';
                module.style.top = pos.top;
                module.style.transform = `translate(-50%, -50%) scale(${pos.scale})`;
                
                module.addEventListener('click', () => handleModuleClick(index));
                module.addEventListener('mouseenter', () => handleModuleHover(index));
                module.addEventListener('mouseleave', () => handleModuleLeave());
                
                container.appendChild(module);
                modules.push(module);
            });
        }
        
        function calculateWheatPositions() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const isMobile = width < 768;
            
            // 麦穗形状：中间密集，两边分散
            const positions = [];
            
            // 上层（4个）- 较大
            const upperCount = 4;
            for (let i = 0; i < upperCount; i++) {
                const progress = i / (upperCount - 1);
                const x = 15 + progress * 70; // 15% 到 85%
                positions.push({
                    x: x,
                    top: `${25 + Math.sin(progress * Math.PI) * 8}%`,
                    scale: 1 + (1 - Math.abs(progress - 0.5) * 2) * 0.15
                });
            }
            
            // 下层（4个）- 较小，交错
            const lowerCount = 4;
            for (let i = 0; i < lowerCount; i++) {
                const progress = i / (lowerCount - 1);
                const x = 20 + progress * 60; // 20% 到 80%
                positions.push({
                    x: x,
                    top: `${58 + Math.sin(progress * Math.PI) * 6}%`,
                    scale: 0.9 + (1 - Math.abs(progress - 0.5) * 2) * 0.1
                });
            }
            
            return positions;
        }
        
        function handleModuleHover(index) {
            hoveredModule = index;
            modules.forEach((mod, i) => {
                if (i === index) {
                    mod.classList.remove('dimmed', 'far');
                } else {
                    mod.classList.add('far');
                }
            });
        }
        
        function handleModuleLeave() {
            hoveredModule = null;
            modules.forEach(mod => {
                mod.classList.remove('dimmed', 'far');
            });
        }
        
        function handleModuleClick(index) {
            const module = CONFIG.modules[index];
            
            // 过渡动画
            const overlay = document.getElementById('transitionOverlay');
            overlay.classList.add('active');
            
            // 3D拉近效果
            gsapLikeZoom(module.url);
        }
        
        function gsapLikeZoom(url) {
            // 创建临时元素模拟缩放
            const overlay = document.getElementById('transitionOverlay');
            
            // 延迟跳转
            setTimeout(() => {
                window.location.href = url;
            }, 600);
        }
        
        // ========== 轮播管理 ==========
        let currentCarouselIndex = 0;
        let carouselTrack, visibleItems;
        
        function initCarousel() {
            carouselTrack = document.getElementById('carouselTrack');
            const items = carouselTrack.querySelectorAll('.carousel-item');
            const dotsContainer = document.getElementById('carouselDots');
            
            // 计算可见数量
            const width = window.innerWidth;
            if (width < 480) {
                visibleItems = 2;
            } else if (width < 768) {
                visibleItems = 3;
            } else {
                visibleItems = 5;
            }
            
            // 创建指示点
            const totalDots = CONFIG.carouselItems - visibleItems + 1;
            dotsContainer.innerHTML = '';
            for (let i = 0; i < totalDots; i++) {
                const dot = document.createElement('div');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.addEventListener('click', () => goToCarousel(i));
                dotsContainer.appendChild(dot);
            }
            
            // 绑定点击事件
            items.forEach((item, index) => {
                item.addEventListener('click', () => {
                    items.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    // 可以跳转对应筛选页面
                    console.log('切换到分类:', index);
                });
            });
            
            // 触摸滑动支持
            initTouchEvents();
        }
        
        function goToCarousel(index) {
            const maxIndex = CONFIG.carouselItems - visibleItems;
            currentCarouselIndex = Math.max(0, Math.min(index, maxIndex));
            
            const itemWidth = carouselTrack.querySelector('.carousel-item').offsetWidth + 12;
            carouselTrack.style.transform = `translateX(-${currentCarouselIndex * itemWidth}px)`;
            
            // 更新指示点
            document.querySelectorAll('.carousel-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentCarouselIndex);
            });
            
            // 更新选中项
            const items = carouselTrack.querySelectorAll('.carousel-item');
            items.forEach((item, i) => {
                item.classList.toggle('active', i === currentCarouselIndex + Math.floor(visibleItems / 2));
            });
        }
        
        function initTouchEvents() {
            let startX = 0;
            let currentX = 0;
            
            carouselTrack.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
            });
            
            carouselTrack.addEventListener('touchmove', (e) => {
                currentX = e.touches[0].clientX;
            });
            
            carouselTrack.addEventListener('touchend', () => {
                const diff = startX - currentX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) {
                        goToCarousel(currentCarouselIndex + 1);
                    } else {
                        goToCarousel(currentCarouselIndex - 1);
                    }
                }
            });
        }
        
        // ========== 鼠标追踪 ==========
        function initMouseTracking() {
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) - 0.5;
                mouseY = (e.clientY / window.innerHeight) - 0.5;
            });
        }
        
        // ========== 窗口调整 ==========
        function handleResize() {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
            
            initModules();
            initCarousel();
        }
        
        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            initThreeJS();
            initModules();
            initCarousel();
            initMouseTracking();
            
            window.addEventListener('resize', handleResize);
            
            // 显示中心提示
            setTimeout(() => {
                document.getElementById('centerHint').classList.add('visible');
            }, 1000);
        });
    </script>
</body>
</html>
