<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HNAU 闲置星球</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.cn/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
            background: #000;
            color: #fff;
            touch-action: none;
        }
        
        /* 过渡动画遮罩 */
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at var(--tx, 50%) var(--ty, 50%), #00ffc8 0%, #000 70%);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .transition-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        /* Three.js Canvas */
        #cosmic-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: grab;
        }
        
        #cosmic-canvas:active {
            cursor: grabbing;
        }
        
        /* 主界面容器 */
        .main-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
        }
        
        .main-container.zooming {
            transform: scale(0.3);
            opacity: 0;
        }
        
        /* 顶部标题 */
        .header {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        
        .header.visible {
            opacity: 1;
        }
        
        .header h1 {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 5s ease infinite;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
        }
        
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .header p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 6px;
            margin-top: 10px;
        }
        
        /* 中心指示器 */
        .center-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.5s ease;
        }
        
        .center-indicator.hidden {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
        }
        
        .center-circle {
            width: 120px;
            height: 120px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            animation: pulse-ring 2s ease-in-out infinite;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        }
        
        .center-indicator:hover .center-circle {
            border-color: rgba(255, 255, 255, 0.8);
            transform: scale(1.15);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.3);
        }
        
        .center-icon {
            font-size: 48px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .center-indicator span {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 255, 255, 0.1), 0 0 60px rgba(255, 255, 255, 0.05); }
            50% { box-shadow: 0 0 50px rgba(255, 255, 255, 0.2), 0 0 100px rgba(255, 255, 255, 0.1); }
        }
        
        /* 模块节点 - 放大版 */
        .module-node {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: scale(0);
        }
        
        .module-node.visible {
            opacity: 1;
            transform: scale(1);
        }
        
        .module-node.dimmed {
            opacity: 0.2 !important;
            transform: scale(0.7) !important;
            filter: blur(4px);
        }
        
        .module-node.active {
            opacity: 1 !important;
            transform: scale(1.3) !important;
            z-index: 100;
        }
        
        .module-node-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(40, 50, 70, 0.9), rgba(15, 20, 35, 0.95));
            border: 3px solid var(--module-color, rgba(255, 255, 255, 0.3));
            transition: all 0.5s ease;
            box-shadow: 0 0 30px var(--module-color, transparent),
                        inset 0 0 30px rgba(255, 255, 255, 0.05);
        }
        
        .module-node:hover .module-node-bg,
        .module-node.active .module-node-bg {
            border-width: 4px;
            box-shadow: 0 0 50px var(--module-color, rgba(255, 255, 255, 0.5)),
                        inset 0 0 40px rgba(255, 255, 255, 0.1);
        }
        
        .module-node-ring {
            position: absolute;
            width: calc(100% + 15px);
            height: calc(100% + 15px);
            border-radius: 50%;
            border: 2px solid var(--module-color, rgba(255, 255, 255, 0.2));
            opacity: 0.5;
            transition: all 0.5s ease;
        }
        
        .module-node:hover .module-node-ring,
        .module-node.active .module-node-ring {
            opacity: 1;
            animation: rotate-ring 6s linear infinite;
        }
        
        @keyframes rotate-ring {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .module-icon {
            font-size: 48px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 15px var(--module-color, rgba(255, 255, 255, 0.5)));
            transition: transform 0.3s ease;
        }
        
        .module-node:hover .module-icon {
            transform: scale(1.2) rotate(10deg);
        }
        
        .module-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--module-color-text, #fff);
            letter-spacing: 2px;
            text-shadow: 0 0 20px var(--module-color, rgba(255, 255, 255, 0.5));
            text-align: center;
        }
        
        /* 粒子尾迹 */
        .module-node::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, var(--module-color, transparent) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            animation: particle-pulse 2s ease-in-out infinite;
        }
        
        .module-node:hover::after {
            opacity: 0.3;
        }
        
        @keyframes particle-pulse {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.2); opacity: 0.4; }
        }
        
        /* 底部快捷入口 - 改进版 */
        .bottom-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: auto;
            width: 90%;
            max-width: 800px;
            z-index: 10;
        }
        
        .bottom-bar.visible {
            opacity: 1;
        }
        
        .quick-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .quick-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: rgba(20, 30, 50, 0.85);
            border: 1px solid var(--link-color, rgba(255, 255, 255, 0.2));
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-size: 0;
        }
        
        .quick-link * {
            pointer-events: none;
        }
        
        .quick-link:hover {
            background: rgba(30, 45, 70, 0.95);
            border-color: var(--link-color, rgba(255, 255, 255, 0.5));
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3),
                        0 0 20px var(--link-color, rgba(255, 255, 255, 0.2));
        }
        
        .quick-link:active {
            transform: scale(0.95);
        }
        
        .quick-link-icon {
            font-size: 24px;
        }
        
        .quick-link-text {
            font-size: 15px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }
        
        /* 底部说明 */
        .bottom-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
        }
        
        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            padding: 12px 24px;
            background: rgba(20, 30, 50, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .back-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .back-btn:hover {
            background: rgba(40, 60, 100, 0.9);
            transform: translateX(5px);
        }
        
        /* 拖拽提示 */
        .drag-hint {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
            z-index: 5;
        }
        
        .drag-hint.visible {
            opacity: 1;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 28px;
                letter-spacing: 6px;
            }
            
            .module-node {
                width: 100px;
                height: 100px;
            }
            
            .module-icon {
                font-size: 36px;
            }
            
            .module-title {
                font-size: 12px;
            }
            
            .quick-link {
                padding: 12px 20px;
            }
            
            .quick-link-icon {
                font-size: 20px;
            }
            
            .quick-link-text {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- 过渡动画遮罩 -->
    <div class="transition-overlay" id="transitionOverlay"></div>
    
    <!-- 返回按钮 -->
    <button class="back-btn" id="backBtn" onclick="goBack()">← 返回首页</button>
    
    <!-- Three.js Canvas -->
    <canvas id="cosmic-canvas"></canvas>
    
    <!-- 拖拽提示 -->
    <div class="drag-hint" id="dragHint">拖拽星空探索更多</div>
    
    <!-- 主界面 -->
    <div class="main-container" id="mainContainer">
        <!-- 标题 -->
        <div class="header" id="header">
            <h1>HNAU 闲置星球</h1>
            <p>探索校园闲置 · 开启绿色循环</p>
        </div>
        
        <!-- 中心指示器 -->
        <div class="center-indicator" id="centerIndicator" onclick="awakenAll()">
            <div class="center-circle">
                <span class="center-icon">🌟</span>
            </div>
            <span>点击唤醒全部</span>
        </div>
    </div>
    
    <!-- 底部快捷入口 - 独立于主容器 -->
    <div class="bottom-bar" id="bottomBar">
        <div class="quick-links">
            <div class="quick-link" style="--link-color: #ff6b6b;" onclick="goToPage('home.html')">
                <span class="quick-link-icon">🏪</span>
                <span class="quick-link-text">闲置市场</span>
            </div>
            <div class="quick-link" style="--link-color: #ffd93d;" onclick="goToPage('user_login.html')">
                <span class="quick-link-icon">🔑</span>
                <span class="quick-link-text">登录/注册</span>
            </div>
            <div class="quick-link" style="--link-color: #6bcb77;" onclick="goToPage('stu_check.html')">
                <span class="quick-link-icon">🎓</span>
                <span class="quick-link-text">校园认证</span>
            </div>
            <div class="quick-link" style="--link-color: #4d96ff;" onclick="goToPage('carbon_ai.html')">
                <span class="quick-link-icon">🤖</span>
                <span class="quick-link-text">碳足迹AI</span>
            </div>
        </div>
        <div class="bottom-hint">点击上方图标快速进入对应功能</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ========== 配置 ==========
        var CONFIG = {
            modules: [
                {
                    id: 'market',
                    icon: '🏪',
                    title: '闲置市场',
                    color: '#ff6b6b',
                    colorText: '#ff6b6b',
                    desc: '浏览校园二手好物',
                    url: 'home.html'
                },
                {
                    id: 'publish',
                    icon: '📦',
                    title: '发布闲置',
                    color: '#ffd93d',
                    colorText: '#ffd93d',
                    desc: '一键发布闲置物品',
                    url: 'release_goods.html'
                },
                {
                    id: 'donation',
                    icon: '💝',
                    title: '公益转赠',
                    color: '#ff9ff3',
                    colorText: '#ff9ff3',
                    desc: '传递爱心温暖',
                    url: 'donation_list.html'
                },
                {
                    id: 'demand',
                    icon: '🔍',
                    title: '需求广场',
                    color: '#54a0ff',
                    colorText: '#54a0ff',
                    desc: '寻找有缘人',
                    url: 'demand_board.html'
                },
                {
                    id: 'carbon',
                    icon: '🌱',
                    title: '碳足迹',
                    color: '#6bcb77',
                    colorText: '#6bcb77',
                    desc: '记录环保行动',
                    url: 'carbon_ai.html'
                },
                {
                    id: 'profile',
                    icon: '👤',
                    title: '个人中心',
                    color: '#a29bfe',
                    colorText: '#a29bfe',
                    desc: '管理我的信息',
                    url: 'user_center.html'
                }
            ]
        };
        
        // ========== 状态 ==========
        var state = {
            isAnimating: false,
            allAwakened: false,
            isDragging: false,
            hasInteracted: false,
            previousMouseX: 0,
            previousMouseY: 0,
            rotationVelocityX: 0,
            rotationVelocityY: 0
        };
        
        // ========== Three.js ==========
        var scene, camera, renderer;
        var starField, nebulaClouds, particles, shootingStars, dustClouds;
        var mouseX = 0, mouseY = 0;
        var rotationX = 0, rotationY = 0;
        var time = 0;
        
        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000510, 0.008);
            
            camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 6;
            
            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('cosmic-canvas'),
                antialias: true,
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000510, 1);
            
            createStarField();
            createNebulaClouds();
            createAmbientParticles();
            createDustClouds();
            createShootingStars();
            
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mouseup', onMouseUp);
            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', onTouchEnd);
            window.addEventListener('resize', onResize);
        }
        
        // 创建丰富星空
        function createStarField() {
            var geometry = new THREE.BufferGeometry();
            
            // 主星星 - 12000颗
            var mainCount = 12000;
            var positions = new Float32Array(mainCount * 3);
            var colors = new Float32Array(mainCount * 3);
            var sizes = new Float32Array(mainCount);
            var twinkle = new Float32Array(mainCount);
            
            for (var i = 0; i < mainCount; i++) {
                var i3 = i * 3;
                
                // 球形分布，更密集
                var theta = Math.random() * Math.PI * 2;
                var phi = Math.acos(2 * Math.random() - 1);
                var r = 30 + Math.random() * 150;
                
                positions[i3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i3 + 2] = r * Math.cos(phi);
                
                // 多彩星星
                var colorChoice = Math.random();
                if (colorChoice < 0.3) {
                    // 白色星星
                    colors[i3] = 1;
                    colors[i3 + 1] = 1;
                    colors[i3 + 2] = 1;
                } else if (colorChoice < 0.5) {
                    // 蓝白色
                    colors[i3] = 0.7;
                    colors[i3 + 1] = 0.85;
                    colors[i3 + 2] = 1;
                } else if (colorChoice < 0.7) {
                    // 淡黄色
                    colors[i3] = 1;
                    colors[i3 + 1] = 0.95;
                    colors[i3 + 2] = 0.8;
                } else if (colorChoice < 0.85) {
                    // 橙色
                    colors[i3] = 1;
                    colors[i3 + 1] = 0.7;
                    colors[i3 + 2] = 0.4;
                } else if (colorChoice < 0.95) {
                    // 蓝色
                    colors[i3] = 0.5;
                    colors[i3 + 1] = 0.7;
                    colors[i3 + 2] = 1;
                } else {
                    // 红色/粉色
                    colors[i3] = 1;
                    colors[i3 + 1] = 0.6;
                    colors[i3 + 2] = 0.7;
                }
                
                sizes[i] = Math.random() * 2 + 0.5;
                twinkle[i] = Math.random(); // 闪烁相位
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('twinkle', new THREE.BufferAttribute(twinkle, 1));
            
            var material = new THREE.PointsMaterial({
                size: 1.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.95,
                sizeAttenuation: true
            });
            
            starField = new THREE.Points(geometry, material);
            scene.add(starField);
            
            // 小星星层 - 更密集
            var smallGeometry = new THREE.BufferGeometry();
            var smallCount = 8000;
            var smallPositions = new Float32Array(smallCount * 3);
            
            for (var j = 0; j < smallCount; j++) {
                var j3 = j * 3;
                smallPositions[j3] = (Math.random() - 0.5) * 200;
                smallPositions[j3 + 1] = (Math.random() - 0.5) * 120;
                smallPositions[j3 + 2] = -20 - Math.random() * 80;
            }
            
            smallGeometry.setAttribute('position', new THREE.BufferAttribute(smallPositions, 3));
            
            var smallMaterial = new THREE.PointsMaterial({
                size: 0.3,
                color: 0xffffff,
                transparent: true,
                opacity: 0.6,
                sizeAttenuation: true
            });
            
            var smallStars = new THREE.Points(smallGeometry, smallMaterial);
            scene.add(smallStars);
        }
        
        // 创建星云
        function createNebulaClouds() {
            var geometry = new THREE.BufferGeometry();
            var count = 2000;
            var positions = new Float32Array(count * 3);
            var colors = new Float32Array(count * 3);
            var sizes = new Float32Array(count);
            
            for (var i = 0; i < count; i++) {
                var i3 = i * 3;
                
                // 集中在某个区域形成星云
                var cluster = Math.floor(Math.random() * 3);
                if (cluster === 0) {
                    // 紫色星云
                    positions[i3] = -30 + (Math.random() - 0.5) * 40;
                    positions[i3 + 1] = (Math.random() - 0.5) * 25;
                    positions[i3 + 2] = -50 - Math.random() * 30;
                    colors[i3] = 0.6;
                    colors[i3 + 1] = 0.3;
                    colors[i3 + 2] = 0.8;
                } else if (cluster === 1) {
                    // 蓝色星云
                    positions[i3] = 20 + (Math.random() - 0.5) * 35;
                    positions[i3 + 1] = -10 + (Math.random() - 0.5) * 20;
                    positions[i3 + 2] = -40 - Math.random() * 25;
                    colors[i3] = 0.2;
                    colors[i3 + 1] = 0.5;
                    colors[i3 + 2] = 0.9;
                } else {
                    // 青色星云
                    positions[i3] = (Math.random() - 0.5) * 50;
                    positions[i3 + 1] = 15 + (Math.random() - 0.5) * 20;
                    positions[i3 + 2] = -35 - Math.random() * 20;
                    colors[i3] = 0.1;
                    colors[i3 + 1] = 0.7;
                    colors[i3 + 2] = 0.7;
                }
                
                sizes[i] = Math.random() * 15 + 5;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            var material = new THREE.PointsMaterial({
                size: 12,
                vertexColors: true,
                transparent: true,
                opacity: 0.06,
                sizeAttenuation: true,
                blending: THREE.AdditiveBlending
            });
            
            nebulaClouds = new THREE.Points(geometry, material);
            scene.add(nebulaClouds);
        }
        
        // 环境粒子
        function createAmbientParticles() {
            var geometry = new THREE.BufferGeometry();
            var count = 1500;
            var positions = new Float32Array(count * 3);
            var colors = new Float32Array(count * 3);
            
            for (var i = 0; i < count; i++) {
                var i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 60;
                positions[i3 + 1] = (Math.random() - 0.5) * 40;
                positions[i3 + 2] = (Math.random() - 0.5) * 30;
                
                var c = Math.random();
                if (c < 0.33) {
                    colors[i3] = 0;
                    colors[i3 + 1] = 1;
                    colors[i3 + 2] = 0.8;
                } else if (c < 0.66) {
                    colors[i3] = 0.4;
                    colors[i3 + 1] = 0.6;
                    colors[i3 + 2] = 1;
                } else {
                    colors[i3] = 1;
                    colors[i3 + 1] = 1;
                    colors[i3 + 2] = 1;
                }
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            var material = new THREE.PointsMaterial({
                size: 0.2,
                vertexColors: true,
                transparent: true,
                opacity: 0.6
            });
            
            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }
        
        // 尘埃云
        function createDustClouds() {
            var geometry = new THREE.BufferGeometry();
            var count = 500;
            var positions = new Float32Array(count * 3);
            var sizes = new Float32Array(count);
            
            for (var i = 0; i < count; i++) {
                var i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 80;
                positions[i3 + 1] = (Math.random() - 0.5) * 50;
                positions[i3 + 2] = -10 - Math.random() * 50;
                sizes[i] = Math.random() * 8 + 3;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            var material = new THREE.PointsMaterial({
                size: 6,
                color: 0x4466aa,
                transparent: true,
                opacity: 0.03,
                sizeAttenuation: true,
                blending: THREE.AdditiveBlending
            });
            
            dustClouds = new THREE.Points(geometry, material);
            scene.add(dustClouds);
        }
        
        // 流星
        var shootingStarGeometries = [];
        var shootingStarMesh = null;
        
        function createShootingStars() {
            // 创建多个流星轨道
            var group = new THREE.Group();
            
            for (var i = 0; i < 3; i++) {
                var geometry = new THREE.BufferGeometry();
                var positions = new Float32Array(30); // 流星尾巴
                
                for (var j = 0; j < 30; j++) {
                    positions[j * 3] = j * 0.5;
                    positions[j * 3 + 1] = j * 0.1 * (Math.random() > 0.5 ? 1 : -1);
                    positions[j * 3 + 2] = -j * 0.3;
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                
                var material = new THREE.LineBasicMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0
                });
                
                var line = new THREE.Line(geometry, material);
                line.visible = false;
                line.userData = {
                    active: false,
                    progress: 0,
                    speed: 0.01 + Math.random() * 0.02,
                    delay: i * 3000 + Math.random() * 2000,
                    startTime: Date.now()
                };
                
                group.add(line);
            }
            
            scene.add(group);
            shootingStars = group;
        }
        
        function updateShootingStars() {
            if (!shootingStars) return;
            
            var now = Date.now();
            shootingStars.children.forEach(function(star) {
                if (!star.visible) {
                    // 检查是否应该激活
                    if (now - star.userData.startTime > star.userData.delay) {
                        star.visible = true;
                        star.userData.active = true;
                        star.userData.progress = 0;
                        
                        // 随机起点
                        var x = (Math.random() - 0.5) * 40;
                        var y = 15 + Math.random() * 10;
                        star.position.set(x, y, -20);
                        star.rotation.z = -Math.PI / 4 + (Math.random() - 0.5) * 0.3;
                    }
                }
                
                if (star.userData.active) {
                    star.userData.progress += star.userData.speed;
                    star.material.opacity = Math.sin(star.userData.progress * Math.PI);
                    star.scale.setScalar(1 + star.userData.progress * 2);
                    
                    if (star.userData.progress >= 1) {
                        star.visible = false;
                        star.userData.active = false;
                        star.userData.startTime = now;
                        star.material.opacity = 0;
                    }
                }
            });
        }
        
        // 鼠标/触摸事件
        function onMouseDown(e) {
            state.isDragging = true;
            state.previousMouseX = e.clientX;
            state.previousMouseY = e.clientY;
            hideDragHint();
        }
        
        function onMouseUp() {
            state.isDragging = false;
        }
        
        function onMouseMove(e) {
            if (state.isDragging) {
                var deltaX = e.clientX - state.previousMouseX;
                var deltaY = e.clientY - state.previousMouseY;
                
                state.rotationVelocityY = deltaX * 0.003;
                state.rotationVelocityX = deltaY * 0.003;
                
                rotationY += state.rotationVelocityY;
                rotationX += state.rotationVelocityX;
                
                state.previousMouseX = e.clientX;
                state.previousMouseY = e.clientY;
                
                hideDragHint();
            }
            
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        }
        
        function onTouchStart(e) {
            if (e.touches.length === 1) {
                state.isDragging = true;
                state.previousMouseX = e.touches[0].clientX;
                state.previousMouseY = e.touches[0].clientY;
                hideDragHint();
            }
        }
        
        function onTouchMove(e) {
            if (e.touches.length === 1 && state.isDragging) {
                e.preventDefault();
                var deltaX = e.touches[0].clientX - state.previousMouseX;
                var deltaY = e.touches[0].clientY - state.previousMouseY;
                
                state.rotationVelocityY = deltaX * 0.003;
                state.rotationVelocityX = deltaY * 0.003;
                
                rotationY += state.rotationVelocityY;
                rotationX += state.rotationVelocityX;
                
                state.previousMouseX = e.touches[0].clientX;
                state.previousMouseY = e.touches[0].clientY;
            }
        }
        
        function onTouchEnd() {
            state.isDragging = false;
        }
        
        function hideDragHint() {
            if (!state.hasInteracted) {
                state.hasInteracted = true;
                document.getElementById('dragHint').classList.remove('visible');
            }
        }
        
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            // 惯性旋转
            if (!state.isDragging) {
                rotationY += state.rotationVelocityY;
                rotationX += state.rotationVelocityX;
                state.rotationVelocityY *= 0.98;
                state.rotationVelocityX *= 0.98;
                
                // 自动缓慢旋转
                rotationY += 0.0003;
            }
            
            if (starField) {
                starField.rotation.x = rotationX;
                starField.rotation.y = rotationY;
                
                // 星星闪烁效果
                var sizes = starField.geometry.attributes.size;
                var twinkle = starField.geometry.attributes.twinkle;
                for (var i = 0; i < sizes.count; i += 50) {
                    var base = sizes.array[i];
                    var phase = twinkle.array[i];
                    sizes.array[i] = base * (0.7 + 0.3 * Math.sin(time * 3 + phase * 10));
                }
                sizes.needsUpdate = true;
            }
            
            if (nebulaClouds) {
                nebulaClouds.rotation.x = rotationX * 0.5 + Math.sin(time * 0.5) * 0.05;
                nebulaClouds.rotation.y = rotationY * 0.5 + Math.cos(time * 0.3) * 0.05;
            }
            
            if (dustClouds) {
                dustClouds.rotation.x = rotationX * 0.3;
                dustClouds.rotation.y = rotationY * 0.3;
            }
            
            if (particles) {
                particles.rotation.y += 0.001;
                var positions = particles.geometry.attributes.position.array;
                for (var k = 0; k < positions.length; k += 3) {
                    positions[k + 1] += Math.sin(time * 2 + k) * 0.002;
                }
                particles.geometry.attributes.position.needsUpdate = true;
            }
            
            // 更新流星
            updateShootingStars();
            
            // 相机轻微跟随
            camera.position.x += (mouseX * 0.3 - camera.position.x) * 0.02;
            camera.position.y += (-mouseY * 0.2 - camera.position.y) * 0.02;
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
        }
        
        // ========== DOM 操作 ==========
        function createModuleNodes() {
            var container = document.getElementById('mainContainer');
            var radius = window.innerWidth < 768 ? 160 : 220;
            
            CONFIG.modules.forEach(function(mod, index) {
                var node = document.createElement('div');
                node.className = 'module-node';
                node.id = 'module-' + mod.id;
                node.style.cssText = '--module-color: ' + mod.color + '; --module-color-text: ' + mod.colorText + ';';
                node.innerHTML = 
                    '<div class="module-node-bg"></div>' +
                    '<div class="module-node-ring"></div>' +
                    '<div class="module-icon">' + mod.icon + '</div>' +
                    '<div class="module-title">' + mod.title + '</div>';
                
                var angle = (index / CONFIG.modules.length) * Math.PI * 2 - Math.PI / 2;
                var x = Math.cos(angle) * radius;
                var y = Math.sin(angle) * radius;
                
                node.style.left = 'calc(50% + ' + x + 'px - 70px)';
                node.style.top = 'calc(50% + ' + y + 'px - 70px)';
                
                node.addEventListener('click', function(e) {
                    zoomAndNavigate(mod, e);
                });
                
                node.addEventListener('mouseenter', function() {
                    dimOtherModules(mod.id);
                });
                
                node.addEventListener('mouseleave', function() {
                    if (!state.allAwakened) {
                        resetModules();
                    }
                });
                
                container.appendChild(node);
                
                setTimeout(function() {
                    node.classList.add('visible');
                }, 300 + index * 120);
            });
        }
        
        function dimOtherModules(activeId) {
            CONFIG.modules.forEach(function(mod) {
                var node = document.getElementById('module-' + mod.id);
                if (mod.id !== activeId) {
                    node.classList.add('dimmed');
                    node.classList.remove('active');
                } else {
                    node.classList.remove('dimmed');
                    node.classList.add('active');
                }
            });
        }
        
        function resetModules() {
            CONFIG.modules.forEach(function(mod) {
                var node = document.getElementById('module-' + mod.id);
                node.classList.remove('dimmed', 'active');
            });
        }
        
        function awakenAll() {
            state.allAwakened = true;
            CONFIG.modules.forEach(function(mod) {
                var node = document.getElementById('module-' + mod.id);
                node.classList.remove('dimmed');
                node.classList.add('active');
            });
            
            setTimeout(function() {
                state.allAwakened = false;
                resetModules();
            }, 3000);
        }
        
        // ========== 核心：拉近导航效果 ==========
        function zoomAndNavigate(module, event) {
            if (state.isAnimating) return;
            state.isAnimating = true;
            
            var mainContainer = document.getElementById('mainContainer');
            var overlay = document.getElementById('transitionOverlay');
            
            // 获取点击位置
            var tx, ty;
            if (event.clientX !== undefined) {
                tx = (event.clientX / window.innerWidth) * 100;
                ty = (event.clientY / window.innerHeight) * 100;
            } else {
                tx = 50;
                ty = 50;
            }
            
            // 设置渐变中心
            overlay.style.setProperty('--tx', tx + '%');
            overlay.style.setProperty('--ty', ty + '%');
            
            // 相机拉近动画
            var startZ = camera.position.z;
            var targetZ = 1.5;
            var zoomDuration = 600;
            var startTime = Date.now();
            
            function zoomIn() {
                var elapsed = Date.now() - startTime;
                var progress = Math.min(elapsed / zoomDuration, 1);
                var easeProgress = 1 - Math.pow(1 - progress, 3);
                
                camera.position.z = startZ + (targetZ - startZ) * easeProgress;
                
                if (progress < 1) {
                    requestAnimationFrame(zoomIn);
                } else {
                    // 缩放主容器
                    mainContainer.classList.add('zooming');
                    overlay.classList.add('active');
                    
                    // 等待动画完成后跳转
                    setTimeout(function() {
                        window.location.href = module.url;
                    }, 400);
                }
            }
            
            zoomIn();
        }
        
        function goBack() {
            window.location.href = 'starfield.html';
        }
        
        function goToPage(url) {
            window.location.href = url;
        }
        
        // ========== 初始化 ==========
        function init() {
            initThree();
            createModuleNodes();
            
            // 显示标题和底部栏
            setTimeout(function() {
                document.getElementById('header').classList.add('visible');
                document.getElementById('bottomBar').classList.add('visible');
            }, 200);
            
            // 显示拖拽提示
            setTimeout(function() {
                document.getElementById('dragHint').classList.add('visible');
            }, 1500);
            
            animate();
        }
        
        init();
    </script>
