<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNAU 闲置星球</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.cn/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            color: #fff;
        }
        
        /* 过渡动画遮罩 */
        /* 过渡动画遮罩 - 透明 */
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: none;
        }
        
        .transition-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        /* Three.js Canvas */
        #cosmic-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* 主界面容器 */
        .main-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
        }
        
        .main-container.zooming {
            transform: scale(0.3);
            opacity: 0;
        }
        
        /* 顶部标题 */
        .header {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        
        .header.visible {
            opacity: 1;
        }
        
        .header h1 {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: 10px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 5s ease infinite;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
            position: relative;
        }
        
        .header h1::before,
        .header h1::after {
            content: '✨';
            position: absolute;
            -webkit-text-fill-color: initial;
            font-size: 24px;
            animation: twinkle 2s ease-in-out infinite;
        }
        
        .header h1::before {
            left: -50px;
            animation-delay: 0s;
        }
        
        .header h1::after {
            right: -50px;
            animation-delay: 1s;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        
        .header p {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 6px;
            margin-top: 15px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* 中心指示器 */
        .center-indicator {
            position: absolute;
            top: calc(50% + 80px);
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.5s ease;
        }
        
        .center-indicator.hidden {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
        }
        
        .center-circle {
            width: 160px;
            height: 160px;
            border: 4px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            animation: pulse-ring 2s ease-in-out infinite;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            position: relative;
        }
        
        .center-circle::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .center-indicator:hover .center-circle {
            border-color: rgba(255, 255, 255, 0.9);
            transform: scale(1.15);
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.4),
                        0 0 100px rgba(255, 215, 0, 0.3);
        }
        
        .center-icon {
            font-size: 50px;
            animation: float 3s ease-in-out infinite;
        }
        
        .center-text {
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            margin-top: 8px;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8),
                         0 0 40px rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, #ffd700, #ff6b6b, #ffd700);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: text-shine 3s ease-in-out infinite;
        }
        
        @keyframes text-shine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .center-indicator span {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 255, 255, 0.1), 0 0 60px rgba(255, 255, 255, 0.05); }
            50% { box-shadow: 0 0 50px rgba(255, 255, 255, 0.2), 0 0 100px rgba(255, 255, 255, 0.1); }
        }
        
        /* 模块节点 - 放大版 */
        .module-node {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.1s ease-out;
            opacity: 0;
            transform: scale(0);
            /* 增强悬浮滑动感 */
            will-change: transform, opacity, left, top;
        }
        
        .module-node.visible {
            opacity: 1;
            transform: scale(1);
            animation: float-in 0.8s ease-out forwards;
        }
        
        @keyframes float-in {
            0% {
                opacity: 0;
                transform: scale(0) translateY(50px);
            }
            60% {
                transform: scale(1.1) translateY(-5px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        /* 鼠标悬浮时的滑动效果 */
        .module-node:hover {
            transform: scale(1.15) translateY(-8px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        box-shadow 0.3s ease,
                        border-color 0.3s ease;
        }
        
        .module-node:active {
            transform: scale(1.05);
            transition: transform 0.1s ease;
        }
        
        .module-node.dimmed {
            opacity: 0.15 !important;
            transform: scale(0.6) translateY(0) !important;
            filter: blur(3px);
        }
        
        .module-node.active {
            opacity: 1 !important;
            transform: scale(1.35) translateY(-15px) !important;
            z-index: 100;
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% {
                filter: brightness(1) drop-shadow(0 0 20px var(--module-color, rgba(255, 255, 255, 0.5)));
            }
            50% {
                filter: brightness(1.2) drop-shadow(0 0 40px var(--module-color, rgba(255, 255, 255, 0.8)));
            }
        }
        
        .module-node-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(40, 50, 70, 0.95), rgba(15, 20, 35, 0.98));
            border: 3px solid var(--module-color, rgba(255, 255, 255, 0.3));
            transition: all 0.5s ease;
            box-shadow: 0 0 30px var(--module-color, transparent),
                        inset 0 0 30px rgba(255, 255, 255, 0.05);
        }
        
        .module-node:hover .module-node-bg,
        .module-node.active .module-node-bg {
            border-width: 4px;
            box-shadow: 0 0 60px var(--module-color, rgba(255, 255, 255, 0.5)),
                        inset 0 0 40px rgba(255, 255, 255, 0.15);
        }
        
        .module-node-ring {
            position: absolute;
            width: calc(100% + 15px);
            height: calc(100% + 15px);
            border-radius: 50%;
            border: 2px solid var(--module-color, rgba(255, 255, 255, 0.2));
            opacity: 0.5;
            transition: all 0.5s ease;
        }
        
        .module-node:hover .module-node-ring,
        .module-node.active .module-node-ring {
            opacity: 1;
            animation: rotate-ring 6s linear infinite;
        }
        
        @keyframes rotate-ring {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .module-icon {
            font-size: 52px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 15px var(--module-color, rgba(255, 255, 255, 0.5)));
            transition: transform 0.3s ease;
        }
        
        .module-node:hover .module-icon {
            transform: scale(1.2) rotate(10deg);
        }
        
        .module-title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 3px;
            text-align: center;
            margin-top: 12px;
            position: relative;
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,0,0,0.6));
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--module-color, rgba(255,255,255,0.2));
            box-shadow: 0 0 20px var(--module-color, rgba(255,255,255,0.1));
        }
        
        .module-title::before {
            content: '♦';
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--module-color);
            animation: sparkle 1.5s ease-in-out infinite;
        }
        
        .module-title::after {
            content: '♦';
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--module-color);
            animation: sparkle 1.5s ease-in-out infinite 0.75s;
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: translateY(-50%) scale(0.8); }
            50% { opacity: 1; transform: translateY(-50%) scale(1.2); }
        }
        
        /* 粒子尾迹 */
        .module-node::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, var(--module-color, transparent) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            animation: particle-pulse 2s ease-in-out infinite;
        }
        
        .module-node:hover::after {
            opacity: 0.3;
        }
        
        @keyframes particle-pulse {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.2); opacity: 0.4; }
        }
        
        /* 底部快捷入口 */
        .bottom-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: auto;
            width: 90%;
            max-width: 850px;
        }
        
        .bottom-bar.visible {
            opacity: 1;
        }
        
        .quick-links {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        
        .quick-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            background: rgba(20, 30, 50, 0.85);
            border: 2px solid var(--link-color, rgba(255, 255, 255, 0.2));
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(10px);
            /* 增强滑动感 */
            will-change: transform, box-shadow;
            position: relative;
            overflow: hidden;
        }
        
        .quick-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }
        
        .quick-link:hover::before {
            left: 100%;
        }
        
        .quick-link:hover {
            background: rgba(30, 45, 70, 0.95);
            border-color: var(--link-color, rgba(255, 255, 255, 0.6));
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                        0 0 40px var(--link-color, rgba(255, 255, 255, 0.4));
        }
        
        .quick-link:active {
            transform: translateY(-2px) scale(0.98);
            transition: transform 0.1s ease;
        }
        
        .quick-link-icon {
            font-size: 30px;
            transition: transform 0.3s ease;
        }
        
        .quick-link:hover .quick-link-icon {
            transform: scale(1.2) rotate(5deg);
            animation: bounce-icon 0.6s ease infinite;
        }
        
        .quick-link-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px var(--link-color, rgba(255,255,255,0.3));
        }
        
        @keyframes bounce-icon {
            0%, 100% { transform: scale(1.2) translateY(0); }
            50% { transform: scale(1.2) translateY(-3px); }
        }
        
        .quick-link-icon {
            font-size: 24px;
        }
        
        .quick-link-text {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
        }
        
        /* 底部说明 */
        .bottom-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
        }
        
        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            padding: 12px 24px;
            background: rgba(20, 30, 50, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .back-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .back-btn:hover {
            background: rgba(40, 60, 100, 0.9);
            transform: translateX(5px);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
                letter-spacing: 4px;
            }
            
            .header p {
                font-size: 13px;
            }
            
            .module-node {
                width: 110px;
                height: 110px;
            }
            
            .module-icon {
                font-size: 40px;
            }
            
            .module-title {
                font-size: 14px;
            }
            
            .center-circle {
                width: 110px;
                height: 110px;
            }
            
            .center-icon {
                font-size: 44px;
            }
            
            .quick-link {
                padding: 12px 20px;
            }
            
            .quick-link-text {
                font-size: 13px;
            }
        }
        
        /* ========== 登录提示组件 ========== */
        .login-prompt {
            position: fixed;
            top: auto;
            bottom: 100px;
            right: 30px;
            left: auto;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            animation: sleepyBounce 3s ease-in-out infinite;
        }
        
        .login-prompt.show {
            display: flex;
        }
        
        @keyframes sleepyBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        /* 猫咪容器 */
        /* 清新治愈风格 - 柔和的猫咪阴影 */
        .cat-container {
            position: relative;
            width: 140px;
            height: 110px;
            cursor: grab;
            user-select: none;
            animation: catCute 4s ease-in-out infinite;
        }
        
        @keyframes catCute {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        
        .cat-container:hover {
            animation: catWake 0.5s ease-in-out infinite;
        }
        
        @keyframes catWake {
            0%, 100% { transform: scale(1.05); }
            50% { transform: scale(1.08); }
        }
        
        .cat-container:active {
            cursor: grabbing;
        }
        
        /* 猫咪身体 - 趴着的椭圆 */
        .cat-body {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 85px;
            height: 42px;
            background: linear-gradient(180deg, #FFECD2 0%, #FCB69F 100%);
            border-radius: 50% 50% 45% 45%;
            box-shadow: 
                0 4px 15px rgba(252, 182, 159, 0.4),
                inset 0 -5px 15px rgba(255, 154, 123, 0.3);
        }
        
        /* 肚子白色区域 */
        .cat-body::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 55px;
            height: 26px;
            background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,252,248,0.85));
            border-radius: 50%;
        }
        
        /* 猫咪头 - 趴着的圆圆头 */
        .cat-head {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 55px;
            background: linear-gradient(160deg, #FFFAF0 0%, #FFE4D6 50%, #FFDAB9 100%);
            border-radius: 50%;
            box-shadow: 
                0 4px 15px rgba(255, 218, 185, 0.5),
                inset 0 -2px 8px rgba(255, 180, 150, 0.2),
                inset 0 5px 15px rgba(255, 255, 255, 0.6);
            z-index: 2;
        }
        
        /* 猫咪耳朵 - 小巧的耳朵 */
        .cat-ear {
            position: absolute;
            top: -2px;
            width: 22px;
            height: 20px;
            background: linear-gradient(160deg, #FFE4D6 0%, #FFDAB9 100%);
            border-radius: 50% 50% 0 0;
        }
        
        .cat-ear.left { 
            left: 5px; 
            transform: rotate(-15deg); 
        }
        .cat-ear.right { 
            right: 5px; 
            transform: rotate(15deg); 
        }
        
        /* 粉色耳内 */
        .cat-ear::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 11px;
            height: 10px;
            background: linear-gradient(180deg, #FFB6C1, #FFA0AA);
            border-radius: 50% 50% 0 0;
        }
        
        .cat-container:hover .cat-ear.left {
            transform: rotate(-25deg) translateY(-3px);
        }
        
        .cat-container:hover .cat-ear.right {
            transform: rotate(25deg) translateY(-3px);
        }
        
        /* 猫咪眼睛 - 清澈的蓝眼睛 */
        .cat-eyes {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
        }
        
        .cat-eye {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #87CEEB 0%, #5DADE2 100%);
            border-radius: 50%;
            position: relative;
            animation: catBlink 4s ease-in-out infinite;
            overflow: hidden;
            border: 2px solid #4A90D9;
            box-shadow: inset 0 -2px 4px rgba(0,0,0,0.15), 0 0 6px rgba(135,206,235,0.5);
        }
        
        /* 眼睛瞳孔 */
        .cat-eye-pupil {
            position: absolute;
            width: 9px;
            height: 11px;
            background: #333;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
            z-index: 1;
        }
        
        .cat-eye-pupil::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 3px;
            height: 3px;
            background: #fff;
            border-radius: 50%;
        }
        
        @keyframes catBlink {
            0%, 92%, 100% { transform: scaleY(1); }
            96% { transform: scaleY(0.1); }
        }
        
        /* 猫咪鼻子 - 小三角 - 粉色 */
        .cat-nose {
            position: absolute;
            top: 38px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 5px solid #FF9999;
        }
        
        /* 猫咪嘴巴 - 可爱W - 淡淡的颜色 */
        .cat-mouth {
            position: absolute;
            top: 43px;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 7px;
        }
        
        .cat-mouth::before,
        .cat-mouth::after {
            content: '';
            position: absolute;
            top: 0;
            width: 7px;
            height: 7px;
            border-bottom: 2px solid #999;
            border-radius: 0 0 50% 50%;
        }
        
        .cat-mouth::before {
            left: 0;
        }
        
        .cat-mouth::after {
            right: 0;
        }
        
        /* 猫咪胡须 */
        .cat-whiskers {
            position: absolute;
            top: 40px;
            width: 100%;
        }
        
        .whisker {
            position: absolute;
            width: 20px;
            height: 1.5px;
            background: linear-gradient(90deg, #666, #999);
            border-radius: 2px;
            animation: whiskerWave 3s ease-in-out infinite;
        }
        
        .whisker.left-1 { left: -6px; top: 0; transform: rotate(-5deg); animation-delay: 0s; }
        .whisker.left-2 { left: -8px; top: 6px; transform: rotate(0deg); animation-delay: 0.3s; }
        .whisker.left-3 { left: -6px; top: 12px; transform: rotate(5deg); animation-delay: 0.6s; }
        .whisker.right-1 { right: -6px; top: 0; transform: rotate(5deg); animation-delay: 0.1s; }
        .whisker.right-2 { right: -8px; top: 6px; transform: rotate(0deg); animation-delay: 0.4s; }
        .whisker.right-3 { right: -6px; top: 12px; transform: rotate(-5deg); animation-delay: 0.5s; }
        
        @keyframes whiskerWave {
            0%, 100% { transform: rotate(var(--base-rotate, 0deg)); }
            50% { transform: rotate(calc(var(--base-rotate, 0deg) + 3deg)); }
        }
        
        /* 猫咪腮红 - 更清新的粉色 */
        .cat-blush {
            position: absolute;
            top: 36px;
            width: 10px;
            height: 7px;
            background: radial-gradient(ellipse, rgba(255, 160, 170, 0.6), rgba(255, 180, 190, 0.3));
            border-radius: 50%;
            animation: blushPulse 3s ease-in-out infinite;
        }
        
        .cat-blush.left { left: 7px; animation-delay: 0.5s; }
        .cat-blush.right { right: 7px; animation-delay: 0.8s; }
        
        @keyframes blushPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        
        .cat-container:hover .cat-blush {
            background: radial-gradient(ellipse, rgba(255, 130, 150, 0.7), rgba(255, 160, 170, 0.4));
            width: 16px;
            height: 10px;
        }
        
        /* 猫咪尾巴 - 粉色的小尾巴 */
        .cat-tail {
            position: absolute;
            bottom: 8px;
            right: -8px;
            width: 30px;
            height: 12px;
            background: linear-gradient(90deg, #FFDAB9, #FFE4D6, #FFF0F5);
            border-radius: 20px 20px 20px 12px;
            transform-origin: left center;
            animation: tailCurl 3s ease-in-out infinite;
        }
        
        .cat-tail::after {
            content: '';
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 11px;
            height: 11px;
            background: linear-gradient(135deg, #FFF0F5, #FFE4D6);
            border-radius: 50%;
        }
        
        @keyframes tailCurl {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(8deg); }
        }
        
        .cat-container:hover .cat-tail {
            animation: tailWagFast 0.6s ease-in-out infinite;
        }
        
        @keyframes tailWagFast {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }
        
        /* 猫咪爪子 - 收在身下 - 粉嫩的颜色 */
        .cat-paws {
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 22px;
        }
        
        .cat-paw {
            width: 18px;
            height: 11px;
            background: linear-gradient(180deg, #FFF0F5, #FFE4D6);
            border-radius: 50% 50% 40% 40%;
            position: relative;
            animation: pawRelax 4s ease-in-out infinite;
        }
        
        .cat-paw:first-child { animation-delay: 0s; }
        .cat-paw:last-child { animation-delay: 0.5s; }
        
        @keyframes pawRelax {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.9); }
        }
        
        /* 肉垫 - 粉粉的 */
        .cat-paw::before {
            content: '';
            position: absolute;
            bottom: 1px;
            left: 50%;
            transform: translateX(-50%);
            width: 9px;
            height: 5px;
            background: rgba(255, 180, 180, 0.6);
            border-radius: 50%;
        }
        
        /* 提示气泡 */
        .speech-bubble {
            position: absolute;
            bottom: 190px;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background: linear-gradient(135deg, #fff, #fef9f3);
            padding: 15px 22px;
            border-radius: 25px;
            box-shadow: 
                0 8px 30px rgba(255, 140, 0, 0.3),
                0 0 0 3px rgba(255, 180, 100, 0.3);
            font-size: 15px;
            color: #555;
            white-space: nowrap;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
            font-weight: 500;
        }
        
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 16px solid #fef9f3;
        }
        
        .cat-container:hover .speech-bubble {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            animation: bubbleWobble 1s ease-in-out infinite;
        }
        
        @keyframes bubbleWobble {
            0%, 100% { transform: translateX(-50%) scale(1) rotate(-1deg); }
            50% { transform: translateX(-50%) scale(1.02) rotate(1deg); }
        }
        
        /* 登录按钮 */
        .login-btn {
            margin-top: 15px;
            padding: 14px 35px;
            background: linear-gradient(135deg, #FF7EB3 0%, #FF758C 50%, #FF6B9D 100%);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 
                0 8px 25px rgba(255, 126, 179, 0.5),
                0 0 0 3px rgba(255, 126, 179, 0.2);
            transition: all 0.3s ease;
            animation: btnBounce 2s ease-in-out infinite;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        
        @keyframes btnBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        
        .login-btn:hover {
            transform: scale(1.08);
            box-shadow: 
                0 12px 35px rgba(255, 126, 179, 0.6),
                0 0 0 5px rgba(255, 126, 179, 0.3);
            animation: btnBounceFast 0.5s ease-in-out infinite;
        }
        
        @keyframes btnBounceFast {
            0%, 100% { transform: scale(1.08); }
            50% { transform: scale(1.12); }
        }
        
        /* ========== 增强交互样式 ========== */
        
        /* 害羞脸红加强 */
        .cat-container:hover .cat-blush {
            background: rgba(255, 100, 100, 0.7);
            width: 22px;
            height: 14px;
            animation: blushPulse 1s ease-in-out infinite;
        }
        
        @keyframes blushPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        
        /* 耳朵跟随动画 */
        .cat-ear {
            transition: transform 0.3s ease;
        }
        
        .cat-container:hover .cat-ear.left {
            transform: rotate(-25deg) translateY(-3px);
        }
        
        .cat-container:hover .cat-ear.right {
            transform: rotate(25deg) translateY(-3px);
        }
        
        /* 点击抖动效果 */
        .cat-container.shake {
            animation: catShake 0.7s ease-in-out !important;
        }
        
        @keyframes catShake {
            0%, 100% { transform: scale(1.1) rotate(0deg) translateY(0); }
            10% { transform: scale(1.18) rotate(-10deg) translateX(-8px); }
            20% { transform: scale(1.12) rotate(10deg) translateX(8px); }
            30% { transform: scale(1.16) rotate(-8deg) translateX(-6px); }
            40% { transform: scale(1.1) rotate(8deg) translateX(6px); }
            50% { transform: scale(1.14) rotate(-5deg) translateX(-4px); }
            60% { transform: scale(1.1) rotate(5deg) translateX(4px); }
            70% { transform: scale(1.12) rotate(-3deg); }
            80% { transform: scale(1.1) rotate(3deg); }
        }
        
        /* 点击特效 - 爱心飘落 */
        .click-effect {
            position: absolute;
            pointer-events: none;
            font-size: 30px;
            animation: clickEffectFloat 1.3s ease-out forwards;
            z-index: 1000;
            filter: drop-shadow(0 0 12px rgba(255, 100, 150, 0.7));
        }
        
        @keyframes clickEffectFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.3) rotate(0deg);
            }
            40% {
                opacity: 1;
                transform: translateY(-70px) scale(1.3) rotate(180deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-120px) scale(0.2) rotate(360deg);
            }
        }
        
        /* 打字机效果气泡 */
        .speech-bubble {
            opacity: 0;
            transform: translateX(-50%) translateY(0);
            overflow: hidden;
        }
        
        .speech-bubble .typewriter {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid #667eea;
            animation: typing 2s steps(20) forwards, blink 0.5s step-end infinite;
        }
        
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
        
        @keyframes blink {
            50% { border-color: transparent; }
        }
        
        /* 悬停时的气泡 */
        .cat-container:hover .speech-bubble {
            opacity: 1;
            transform: translateX(-50%) translateY(-5px);
        }
        
        /* 详情展开面板 */
        .cat-info-panel {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.9));
            backdrop-filter: blur(10px);
            padding: 20px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            min-width: 200px;
            text-align: center;
            z-index: 300;
        }
        
        .cat-info-panel.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            pointer-events: auto;
        }
        
        .cat-info-panel h4 {
            margin: 0 0 10px 0;
            color: #667eea;
            font-size: 16px;
        }
        
        .cat-info-panel p {
            margin: 0;
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .cat-info-panel .close-panel {
            position: absolute;
            top: 8px;
            right: 12px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #999;
            transition: color 0.2s;
        }
        
        .cat-info-panel .close-panel:hover {
            color: #667eea;
        }
        
        /* 猫爪点击波纹 */
        .cat-body::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }
        
        .cat-container:active .cat-body::before {
            width: 100px;
            height: 60px;
        }
        
        /* 尾巴兴奋摇动 */
        .cat-container:hover .cat-tail {
            animation: tailWagFast 0.3s ease-in-out infinite;
        }
        
        @keyframes tailWagFast {
            0%, 100% { transform: rotate(-20deg); }
            50% { transform: rotate(30deg); }
        }
        
        /* 猫咪弹跳入场 */
        .login-prompt.show .cat-container {
            animation: catBounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }
        
        @keyframes catBounceIn {
            0% {
                opacity: 0;
                transform: scale(0) translateY(100px);
            }
            60% {
                opacity: 1;
                transform: scale(1.2) translateY(-20px);
            }
            80% {
                transform: scale(0.9) translateY(10px);
            }
            100% {
                transform: scale(1) translateY(0);
            }
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            .login-prompt {
                top: 80px;
                right: 15px;
            }
            
            .cat-container {
                width: 80px;
                height: 80px;
            }
            
            .cat-body {
                width: 60px;
                height: 35px;
            }
            
            .cat-head {
                bottom: 22px;
                width: 55px;
                height: 45px;
            }
            
            .cat-eye {
                width: 16px;
                height: 16px;
            }
            
            .login-btn {
                padding: 10px 20px;
                font-size: 13px;
            }
            
            .speech-bubble {
                font-size: 12px;
                padding: 10px 15px;
            }
            
            .cat-info-panel {
                bottom: 180px;
                min-width: 160px;
                padding: 15px;
            }
        }
    </style>
</head>

    <script>
        // ========== 闲置物品配置 ==========
        var ITEMS = [
            '👟', '👕', '👖', '👗', '🧥', '👠', '👡', '👢',

            0xa29bfe, 0xfd79a8, 0xfdcb6e, 0x00b894, 0x0984e3,
            0xe17055, 0x00cec9, 0x6c5ce7, 0xfab1a0, 0x74b9ff
        ];
        
        // ========== 模块配置 ==========
        var CONFIG = {
            modules: [
                {
                    id: 'publish',

        var velocityX = 0, velocityY = 0;
        var catDragging = false;
        var lastX = 0, lastY = 0;

        function initThree() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 8;
            
            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('cosmic-canvas'),
                antialias: true,
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            
            // 创建渐变背景
            createGradientBackground();
            
            // 创建漂浮的闲置物品
            createFloatingItems();
            
            // 创建发光粒子
            createGlowParticles();
            
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onDragStart);
            document.addEventListener('mouseup', onDragEnd);
            document.addEventListener('mouseleave', onDragEnd);
            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', onDragEnd);
            window.addEventListener('resize', onResize);
        }
        
        function createGradientBackground() {
            var canvas = document.createElement('canvas');
            canvas.width = 2;
            canvas.height = 512;
            var ctx = canvas.getContext('2d');
            
            var gradient = ctx.createLinearGradient(0, 0, 0, 512);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f0f23');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 2, 512);
            
            var texture = new THREE.CanvasTexture(canvas);
            scene.background = texture;
        }
        
        // 创建商品精灵图（emoji + 发光背景）
        function createGoodsSprite(emoji, color) {
            var canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            var ctx = canvas.getContext('2d');
            
            // 发光背景
            var hex = '#' + color.toString(16).padStart(6, '0');
            var gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, hex + 'aa');

            ctx.fillStyle = gradient;

            ctx.textBaseline = 'middle';
            ctx.fillText(emoji, 64, 64);
            
            var texture = new THREE.CanvasTexture(canvas);
            var material = new THREE.SpriteMaterial({

            });

        function createGlowParticles() {
            var geometry = new THREE.BufferGeometry();
            var count = 1500;
            var positions = new Float32Array(count * 3);
            var colors = new Float32Array(count * 3);
            var sizes = new Float32Array(count);
            
            for (var i = 0; i < count; i++) {
                var i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 80;
                positions[i3 + 1] = (Math.random() - 0.5) * 50;
                positions[i3 + 2] = -30 - Math.random() * 30;
                
                // 彩色粒子
                var colorChoice = Math.random();
                if (colorChoice < 0.25) {
                    colors[i3] = 1; colors[i3 + 1] = 0.42; colors[i3 + 2] = 0.42; // 红
                } else if (colorChoice < 0.5) {
                    colors[i3] = 1; colors[i3 + 1] = 0.85; colors[i3 + 2] = 0.24; // 黄
                } else if (colorChoice < 0.75) {
                    colors[i3] = 0.42; colors[i3 + 1] = 0.8; colors[i3 + 2] = 0.47; // 绿
                } else {
                    colors[i3] = 0.29; colors[i3 + 1] = 0.59; colors[i3 + 2] = 1; // 蓝
                }
                
                sizes[i] = Math.random() * 2 + 0.5;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            var material = new THREE.PointsMaterial({
                size: 0.08,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                sizeAttenuation: true
            });
            
            glowParticles = new THREE.Points(geometry, material);
            scene.add(glowParticles);

        function onTouchStart(e) {
            if (e.touches.length === 1) {
                catDragging = true;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
                velocityX = 0;
                velocityY = 0;
            }
        }
        
        function onTouchMove(e) {
            if (catDragging && e.touches.length === 1) {
                e.preventDefault();
                var deltaX = e.touches[0].clientX - lastX;
                var deltaY = e.touches[0].clientY - lastY;
                
                velocityX = deltaX * 0.01;
                velocityY = -deltaY * 0.01;
                
                targetX += velocityX;
                targetY += velocityY;
                
                // 限制范围
                targetX = Math.max(-3, Math.min(3, targetX));
                targetY = Math.max(-2, Math.min(2, targetY));
                
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            }
        }
        
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            var time = Date.now() * 0.001;
            
            // 鼠标/拖拽驱动的目标位置
            if (!catDragging) {
                // 鼠标悬停影响
                targetX += (mouseX * 2 - targetX) * 0.05;
                targetY += (-mouseY * 1.5 - targetY) * 0.05;
                
                // 添加惯性滑动
                targetX += velocityX;
                targetY += velocityY;
                
                // 阻力衰减
                velocityX *= 0.95;
                velocityY *= 0.95;
                
                // 缓慢回归中心
                targetX *= 0.995;
                targetY *= 0.995;
            }
            
            // 限制范围
            targetX = Math.max(-3, Math.min(3, targetX));
            targetY = Math.max(-2, Math.min(2, targetY));
            
            // 相机跟随（增强滑动感）
            camera.position.x += (targetX - camera.position.x) * 0.1;
            camera.position.y += (targetY - camera.position.y) * 0.1;
            
            // 相机旋转（视差效果）
            camera.rotation.y = -targetX * 0.08;
            camera.rotation.x = targetY * 0.05;
            
            camera.lookAt(0, 0, 0);
            
            // 动画漂浮物品（固定范围浮动，不飘走）
            floatingItems.forEach(function(item, index) {
                var data = item.userData;
                
                // 无规则浮动动画（基于初始位置浮动，不累积位移）
                var floatY = Math.sin(time * data.floatSpeed + data.floatOffset) * data.floatRange;
                var floatX = Math.cos(time * data.floatSpeed * 0.6 + data.floatOffset * 1.3) * data.floatRange * 0.6;
                
                // 基于深度的视差效果
                var depthFactor = Math.max(0.3, 1 - (Math.abs(data.baseX - 0) / 20));
                var parallaxX = targetX * depthFactor * 1.5;
                var parallaxY = targetY * depthFactor * 1.2;
                
                // 拖拽滑动效果
                var dragFactor = Math.max(0.2, 0.5 + (Math.abs(data.baseX - 0) / 20) * 0.5);
                var dragX = catDragging ? velocityX * 50 * dragFactor * 0.03 : 0;
                var dragY = catDragging ? -velocityY * 30 * dragFactor * 0.03 : 0;
                
                // 物品位置 = 初始位置 + 浮动 + 视差 + 拖拽（无累积）
                item.position.x = data.baseX + floatX * 0.3 + parallaxX + dragX;
                item.position.y = data.baseY + floatY + parallaxY + dragY;
                
                // 物品自旋转（多轴旋转）
                item.rotation.x = Math.sin(time * data.floatSpeed * 0.7 + data.floatOffset) * 0.3;
                item.rotation.y = Math.cos(time * data.floatSpeed * 0.5 + data.floatOffset * 0.8) * 0.4;
                item.rotation.z = Math.sin(time * data.floatSpeed + data.floatOffset) * 0.15;
            });
            
            // 粒子效果（跟随滑动）
            if (glowParticles) {
                glowParticles.rotation.y += 0.0005;
                glowParticles.rotation.x = Math.sin(time * 0.3) * 0.15;
                glowParticles.rotation.z = Math.cos(time * 0.2) * 0.1;
                
                // 粒子视差跟随
                glowParticles.position.x = targetX * 0.3;
                glowParticles.position.y = -targetY * 0.2;
            }
            
            renderer.render(scene, camera);
        }

        // ========== 核心：物品漩涡旋转拉近效果 ==========
        function zoomAndNavigate(module, node) {
            if (state.isAnimating) return;
            state.isAnimating = true;
            
            var mainContainer = document.getElementById('mainContainer');
            var overlay = document.getElementById('transitionOverlay');
            var canvasWrapper = document.getElementById('canvas-wrapper');
            
            // 获取点击位置
            var rect = node.getBoundingClientRect();
            var clickX = rect.left + rect.width / 2;
            var clickY = rect.top + rect.height / 2;
            
            // 模块节点放大高亮
            node.style.transform = 'scale(1.3)';
            node.style.zIndex = '100';
            
            // 其他模块变暗缩小
            document.querySelectorAll('.module-node').forEach(function(m) {
                if (m !== node) {
                    m.style.opacity = '0.3';
                    m.style.transform = 'scale(0.7)';
                }
            });
            
            // ========== 物品漩涡旋转聚拢动画 ==========
            var startTime = performance.now();
            var zoomDuration = 1200; // 1.2秒
            
            // 保存物品原始数据
            var itemsData = floatingItems.map(function(item) {
                return {
                    x: item.position.x,
                    y: item.position.y,
                    z: item.position.z,
                    rx: item.rotation.x,
                    ry: item.rotation.y,
                    rz: item.rotation.z
                };
            });
            
            // 目标点（点击位置对应的3D坐标）
            var targetX = (clickX / window.innerWidth - 0.5) * 30;
            var targetY = -(clickY / window.innerHeight - 0.5) * 15;
            
            function animateVortex(currentTime) {
                var elapsed = currentTime - startTime;
                var progress = Math.min(elapsed / zoomDuration, 1);
                
                // 平滑缓动
                var easeProgress = 1 - Math.pow(1 - progress, 3);
                
                // 物品漩涡旋转聚拢
                floatingItems.forEach(function(item, index) {
                    var data = itemsData[index];
                    var delay = (index % 10) * 0.05; // 错开延迟
                    var localProgress = Math.max(0, Math.min(1, (easeProgress - delay) / (1 - delay)));
                    var easeLocal = 1 - Math.pow(1 - localProgress, 2);
                    
                    // 漩涡旋转效果（绕Z轴旋转）
                    var angle = easeLocal * Math.PI * 4; // 旋转2圈
                    var radius = (1 - easeLocal) * data.x; // 半径缩小
                    var spiralX = Math.cos(angle + index * 0.5) * radius;
                    var spiralY = Math.sin(angle + index * 0.5) * radius;
                    
                    // 聚拢到中心点
                    item.position.x = data.x + (targetX - data.x) * easeLocal * 0.8 + spiralX * (1 - easeLocal);
                    item.position.y = data.y + (targetY - data.y) * easeLocal * 0.8 + spiralY * (1 - easeLocal);
                    item.position.z = data.z + easeLocal * 10; // 向镜头靠近
                    
                    // 物品自身旋转
                    item.rotation.x = data.rx + easeLocal * Math.PI * 2;
                    item.rotation.y = data.ry + easeLocal * Math.PI * 3;
                    
                    // 物品缩放（聚拢时变小消失）
                    var scale = 1 - easeLocal * 0.7;
                    item.scale.set(scale, scale, scale);
                    
                    // 透明度（通过缩放到0实现淡出）
                    if (easeLocal > 0.7) {
                        item.visible = false;
                    }
                });
                
                // 相机拉近
                if (camera) {
                    camera.position.z = 15 - easeProgress * 10;
                }
                
                // 标题和底部栏淡出
                var uiOpacity = 1 - easeProgress;
                document.getElementById('header').style.opacity = uiOpacity;
                document.getElementById('bottomBar').style.opacity = uiOpacity;
                
                // 遮罩淡入
                overlay.style.opacity = easeProgress * 0.5;
                
                if (progress < 1) {
                    requestAnimationFrame(animateVortex);
                } else {
                    // 恢复物品可见性
                    floatingItems.forEach(function(item) {
                        item.visible = true;
                    });
                    window.location.href = 'explore.html';
                }
            }
            
            requestAnimationFrame(animateVortex);
        }

        ];
        let currentTextIndex = 0;
        let isTyping = false;
        
        function typeWriter(element, text, callback) {
            isTyping = true;
            element.textContent = '';
            let i = 0;
            const interval = setInterval(() => {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(interval);
                    isTyping = false;
                    if (callback) callback();
                }
            }, 50);
        }
        
        function cycleSpeechText() {
            const speechBubble = document.querySelector('.speech-bubble .typewriter');
            if (speechBubble && !isTyping) {
                const currentText = speechTexts[currentTextIndex];
                typeWriter(speechBubble, currentText, () => {
                    setTimeout(() => {
                        currentTextIndex = (currentTextIndex + 1) % speechTexts.length;
                        cycleSpeechText();
                    }, 3000);
                });
            }
        }
        
        // 眼睛跟随鼠标
        function initEyeFollow() {
            const catContainer = document.querySelector('.cat-container');

            if (!catContainer || pupils.length === 0) return;

                const rect = catContainer.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                const deltaX = e.clientX - centerX;
                const deltaY = e.clientY - centerY;
                
                const angle = Math.atan2(deltaY, deltaX);
                const distance = Math.min(5, Math.sqrt(deltaX * deltaX + deltaY * deltaY) / 30);
                
                const moveX = Math.cos(angle) * distance;
                const moveY = Math.sin(angle) * distance;
                
                pupils.forEach(pupil => {
                    pupil.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
                });
            });
            
            // 鼠标离开时眼睛归位
            document.addEventListener('mouseleave', function() {
                pupils.forEach(pupil => {

        // 初始化增强交互 - 自动触发
        function initCatInteraction() {
            if (!document.querySelector('.cat-container')) return;
            
            // 初始化眼睛跟随
            initEyeFollow();
            
            // 启动自动效果
            autoSpawnEffects();      // 自动喷发爱心
            startAutoShake();        // 自动抖动
            cycleSpeechText();       // 打字机效果
            
            // 初始化拖动
            initDrag();
            
            // 点击显示详情面板
            const catContainer = document.querySelector('.cat-container');
            catContainer.addEventListener('click', function(e) {
                if (e.target.closest('.login-btn')) return;
                
                const panel = document.getElementById('catInfoPanel');
                if (panel) {
                    panel.classList.add('show');
                }
            });
            
            // 点击外部关闭面板
            document.addEventListener('click', function(e) {
                if (!catContainer.contains(e.target) && !e.target.classList.contains('login-btn')) {
                    closeCatPanel();
                }
            });
        }
        
        // 页面加载后初始化交互
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initCatInteraction, 1200);
        });
        
        // 页面加载时检查登录状态
        checkLoginAndShowPrompt();
        
        // 监听storage事件，登录成功后自动隐藏提示
        window.addEventListener('storage', function(e) {
            if (e.key === 'hnau_login_info' || 
                e.key === 'hnau_user_info' || 
                e.key === 'hnau_verify_info') {
                checkLoginAndShowPrompt();
            }
        });
    </script>
</body>
</html>
