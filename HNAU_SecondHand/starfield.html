<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNAU 闲置星球</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.cn/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            color: #fff;
        }
        
        /* 过渡动画遮罩 */
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at var(--tx, 50%) var(--ty, 50%), #00ffc8 0%, #000 70%);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .transition-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        /* Three.js Canvas */
        #cosmic-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* 主界面容器 */
        .main-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
        }
        
        .main-container.zooming {
            transform: scale(0.3);
            opacity: 0;
        }
        
        /* 顶部标题 */
        .header {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        
        .header.visible {
            opacity: 1;
        }
        
        .header h1 {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 5s ease infinite;
        }
        
        .header p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 4px;
            margin-top: 12px;
        }
        
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* 中心指示器 */
        .center-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.5s ease;
        }
        
        .center-indicator.hidden {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
        }
        
        .center-circle {
            width: 140px;
            height: 140px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            animation: pulse-ring 2s ease-in-out infinite;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        }
        
        .center-indicator:hover .center-circle {
            border-color: rgba(255, 255, 255, 0.8);
            transform: scale(1.15);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.3);
        }
        
        .center-icon {
            font-size: 56px;
            animation: float 3s ease-in-out infinite;
        }
        
        .center-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 5px;
            font-weight: 500;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .center-indicator span {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 255, 255, 0.1), 0 0 60px rgba(255, 255, 255, 0.05); }
            50% { box-shadow: 0 0 50px rgba(255, 255, 255, 0.2), 0 0 100px rgba(255, 255, 255, 0.1); }
        }
        
        /* 模块节点 - 放大版 */
        .module-node {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: scale(0);
        }
        
        .module-node.visible {
            opacity: 1;
            transform: scale(1);
        }
        
        .module-node.dimmed {
            opacity: 0.15 !important;
            transform: scale(0.6) !important;
            filter: blur(3px);
        }
        
        .module-node.active {
            opacity: 1 !important;
            transform: scale(1.35) !important;
            z-index: 100;
        }
        
        .module-node-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(40, 50, 70, 0.95), rgba(15, 20, 35, 0.98));
            border: 3px solid var(--module-color, rgba(255, 255, 255, 0.3));
            transition: all 0.5s ease;
            box-shadow: 0 0 30px var(--module-color, transparent),
                        inset 0 0 30px rgba(255, 255, 255, 0.05);
        }
        
        .module-node:hover .module-node-bg,
        .module-node.active .module-node-bg {
            border-width: 4px;
            box-shadow: 0 0 60px var(--module-color, rgba(255, 255, 255, 0.5)),
                        inset 0 0 40px rgba(255, 255, 255, 0.15);
        }
        
        .module-node-ring {
            position: absolute;
            width: calc(100% + 15px);
            height: calc(100% + 15px);
            border-radius: 50%;
            border: 2px solid var(--module-color, rgba(255, 255, 255, 0.2));
            opacity: 0.5;
            transition: all 0.5s ease;
        }
        
        .module-node:hover .module-node-ring,
        .module-node.active .module-node-ring {
            opacity: 1;
            animation: rotate-ring 6s linear infinite;
        }
        
        @keyframes rotate-ring {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .module-icon {
            font-size: 52px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 15px var(--module-color, rgba(255, 255, 255, 0.5)));
            transition: transform 0.3s ease;
        }
        
        .module-node:hover .module-icon {
            transform: scale(1.2) rotate(10deg);
        }
        
        .module-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--module-color-text, #fff);
            letter-spacing: 2px;
            text-shadow: 0 0 20px var(--module-color, rgba(255, 255, 255, 0.5));
            text-align: center;
        }
        
        /* 粒子尾迹 */
        .module-node::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, var(--module-color, transparent) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            animation: particle-pulse 2s ease-in-out infinite;
        }
        
        .module-node:hover::after {
            opacity: 0.3;
        }
        
        @keyframes particle-pulse {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.2); opacity: 0.4; }
        }
        
        /* 底部快捷入口 */
        .bottom-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: auto;
            width: 90%;
            max-width: 850px;
        }
        
        .bottom-bar.visible {
            opacity: 1;
        }
        
        .quick-links {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        
        .quick-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: rgba(20, 30, 50, 0.85);
            border: 2px solid var(--link-color, rgba(255, 255, 255, 0.2));
            border-radius: 35px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .quick-link:hover {
            background: rgba(30, 45, 70, 0.95);
            border-color: var(--link-color, rgba(255, 255, 255, 0.6));
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4),
                        0 0 30px var(--link-color, rgba(255, 255, 255, 0.3));
        }
        
        .quick-link-icon {
            font-size: 24px;
        }
        
        .quick-link-text {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
        }
        
        /* 底部说明 */
        .bottom-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
        }
        
        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            padding: 12px 24px;
            background: rgba(20, 30, 50, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .back-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .back-btn:hover {
            background: rgba(40, 60, 100, 0.9);
            transform: translateX(5px);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
                letter-spacing: 4px;
            }
            
            .header p {
                font-size: 13px;
            }
            
            .module-node {
                width: 110px;
                height: 110px;
            }
            
            .module-icon {
                font-size: 40px;
            }
            
            .module-title {
                font-size: 14px;
            }
            
            .center-circle {
                width: 110px;
                height: 110px;
            }
            
            .center-icon {
                font-size: 44px;
            }
            
            .quick-link {
                padding: 12px 20px;
            }
            
            .quick-link-text {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- 过渡动画遮罩 -->
    <div class="transition-overlay" id="transitionOverlay"></div>
    
    <!-- 返回按钮 -->
    <button class="back-btn" id="backBtn" onclick="goBack()">← 返回首页</button>
    
    <!-- Three.js Canvas -->
    <canvas id="cosmic-canvas"></canvas>
    
    <!-- 主界面 -->
    <div class="main-container" id="mainContainer">
        <!-- 标题 -->
        <div class="header" id="header">
            <h1>HNAU 闲置星球</h1>
            <p>探索校园闲置 · 开启绿色循环</p>
        </div>
        
        <!-- 中心指示器 -->
        <div class="center-indicator" id="centerIndicator" onclick="awakenAll()">
            <div class="center-circle">
                <span class="center-icon">🎁</span>
                <span class="center-text">闲置星球</span>
            </div>
            <span>点击唤醒全部</span>
        </div>
    </div>
    
    <!-- 底部快捷入口 -->
    <div class="bottom-bar" id="bottomBar">
        <div class="quick-links">
            <div class="quick-link" style="--link-color: #ff6b6b;" onclick="goToPage('home.html')">
                <span class="quick-link-icon">👟</span>
                <span class="quick-link-text">闲置市场</span>
            </div>
            <div class="quick-link" style="--link-color: #ffd93d;" onclick="goToPage('user_login.html')">
                <span class="quick-link-icon">👕</span>
                <span class="quick-link-text">登录/注册</span>
            </div>
            <div class="quick-link" style="--link-color: #6bcb77;" onclick="goToPage('stu_check.html')">
                <span class="quick-link-icon">📱</span>
                <span class="quick-link-text">校园认证</span>
            </div>
            <div class="quick-link" style="--link-color: #4d96ff;" onclick="goToPage('carbon_ai.html')">
                <span class="quick-link-icon">💻</span>
                <span class="quick-link-text">碳足迹AI</span>
            </div>
            <div class="quick-link" style="--link-color: #ff9ff3;" onclick="goToPage('donation_list.html')">
                <span class="quick-link-icon">🎧</span>
                <span class="quick-link-text">公益转赠</span>
            </div>
        </div>
        <div class="bottom-hint">点击上方图标快速进入对应功能</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ========== 闲置物品配置 ==========
        var ITEMS = [
            '👟', '👕', '👖', '👗', '🧥', '👠', '👡', '👢',
            '🎒', '👝', '👜', '💼', '🎒', '🕶', '⌚', '📱',
            '💻', '⌨️', '🖥', '🖨', '📷', '🎮', '🎧', '📚',
            '🎸', '🎮', '⚽', '🏀', '🎯', '🎲', '🧸', '🎁',
            '💄', '💍', '📱', '🔧', '🔨', '✂️', '📏', '🖊',
            '🪑', '💡', '🏷️', '📦', '🎁', '🧲', '🔑', '🎵'
        ];
        
        var ITEM_COLORS = [
            0xff6b6b, 0xffd93d, 0x6bcb77, 0x4d96ff, 0xff9ff3,
            0xa29bfe, 0xfd79a8, 0xfdcb6e, 0x00b894, 0x0984e3
        ];
        
        // ========== 模块配置 ==========
        var CONFIG = {
            modules: [
                {
                    id: 'market',
                    icon: '👟',
                    title: '闲置市场',
                    color: '#ff6b6b',
                    colorText: '#ff6b6b',
                    desc: '浏览校园二手好物',
                    url: 'home.html'
                },
                {
                    id: 'publish',
                    icon: '📦',
                    title: '发布闲置',
                    color: '#ffd93d',
                    colorText: '#ffd93d',
                    desc: '一键发布闲置物品',
                    url: 'release_goods.html'
                },
                {
                    id: 'donation',
                    icon: '💝',
                    title: '公益转赠',
                    color: '#ff9ff3',
                    colorText: '#ff9ff3',
                    desc: '传递爱心温暖',
                    url: 'donation_list.html'
                },
                {
                    id: 'demand',
                    icon: '🔍',
                    title: '需求广场',
                    color: '#54a0ff',
                    colorText: '#54a0ff',
                    desc: '寻找有缘人',
                    url: 'demand_board.html'
                },
                {
                    id: 'carbon',
                    icon: '🌱',
                    title: '碳足迹',
                    color: '#6bcb77',
                    colorText: '#6bcb77',
                    desc: '记录环保行动',
                    url: 'carbon_ai.html'
                },
                {
                    id: 'profile',
                    icon: '👤',
                    title: '个人中心',
                    color: '#a29bfe',
                    colorText: '#a29bfe',
                    desc: '管理我的信息',
                    url: 'user_center.html'
                }
            ]
        };
        
        // ========== 状态 ==========
        var state = {
            isAnimating: false,
            allAwakened: false
        };
        
        // ========== Three.js ==========
        var scene, camera, renderer;
        var floatingItems = [];
        var glowParticles;
        var mouseX = 0, mouseY = 0;
        
        function initThree() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 8;
            
            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('cosmic-canvas'),
                antialias: true,
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            
            // 创建渐变背景
            createGradientBackground();
            
            // 创建漂浮的闲置物品
            createFloatingItems();
            
            // 创建发光粒子
            createGlowParticles();
            
            document.addEventListener('mousemove', onMouseMove);
            window.addEventListener('resize', onResize);
        }
        
        function createGradientBackground() {
            var canvas = document.createElement('canvas');
            canvas.width = 2;
            canvas.height = 512;
            var ctx = canvas.getContext('2d');
            
            var gradient = ctx.createLinearGradient(0, 0, 0, 512);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f0f23');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 2, 512);
            
            var texture = new THREE.CanvasTexture(canvas);
            scene.background = texture;
        }
        
        function createFloatingItems() {
            // 使用简单的几何图形代表物品
            var itemCount = 60;
            
            for (var i = 0; i < itemCount; i++) {
                var itemGroup = new THREE.Group();
                
                // 随机选择物品类型（用不同几何形状表示）
                var shapeType = Math.floor(Math.random() * 4);
                var color = ITEM_COLORS[Math.floor(Math.random() * ITEM_COLORS.length)];
                var size = 0.15 + Math.random() * 0.25;
                
                var geometry, material;
                
                if (shapeType === 0) {
                    // 球体（代表鞋子/球类）
                    geometry = new THREE.SphereGeometry(size, 16, 16);
                } else if (shapeType === 1) {
                    // 立方体（代表书籍/盒子）
                    geometry = new THREE.BoxGeometry(size * 1.2, size * 1.5, size * 0.6);
                } else if (shapeType === 2) {
                    // 圆柱体（代表瓶子/罐子）
                    geometry = new THREE.CylinderGeometry(size * 0.5, size * 0.5, size * 2, 16);
                } else {
                    // 八面体（代表配饰/珠宝）
                    geometry = new THREE.OctahedronGeometry(size * 0.8);
                }
                
                material = new THREE.MeshPhongMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 0.3,
                    transparent: true,
                    opacity: 0.85,
                    shininess: 100
                });
                
                var mesh = new THREE.Mesh(geometry, material);
                itemGroup.add(mesh);
                
                // 添加发光效果
                var glowGeometry = geometry.clone();
                var glowMaterial = new THREE.MeshBasicMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0.15
                });
                var glowMesh = new THREE.Mesh(glowGeometry, glowMaterial);
                glowMesh.scale.multiplyScalar(1.3);
                itemGroup.add(glowMesh);
                
                // 随机位置
                var angle = Math.random() * Math.PI * 2;
                var radius = 3 + Math.random() * 8;
                itemGroup.position.x = Math.cos(angle) * radius;
                itemGroup.position.y = (Math.random() - 0.5) * 8;
                itemGroup.position.z = -5 - Math.random() * 10;
                
                // 随机旋转
                itemGroup.rotation.x = Math.random() * Math.PI;
                itemGroup.rotation.y = Math.random() * Math.PI;
                
                // 存储动画参数
                itemGroup.userData = {
                    baseX: itemGroup.position.x,
                    baseY: itemGroup.position.y,
                    baseZ: itemGroup.position.z,
                    rotSpeedX: (Math.random() - 0.5) * 0.02,
                    rotSpeedY: (Math.random() - 0.5) * 0.02,
                    floatSpeed: 0.5 + Math.random() * 1,
                    floatOffset: Math.random() * Math.PI * 2
                };
                
                scene.add(itemGroup);
                floatingItems.push(itemGroup);
            }
        }
        
        function createGlowParticles() {
            var geometry = new THREE.BufferGeometry();
            var count = 500;
            var positions = new Float32Array(count * 3);
            var colors = new Float32Array(count * 3);
            var sizes = new Float32Array(count);
            
            for (var i = 0; i < count; i++) {
                var i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 50;
                positions[i3 + 1] = (Math.random() - 0.5) * 30;
                positions[i3 + 2] = -20 - Math.random() * 20;
                
                // 彩色粒子
                var colorChoice = Math.random();
                if (colorChoice < 0.25) {
                    colors[i3] = 1; colors[i3 + 1] = 0.42; colors[i3 + 2] = 0.42; // 红
                } else if (colorChoice < 0.5) {
                    colors[i3] = 1; colors[i3 + 1] = 0.85; colors[i3 + 2] = 0.24; // 黄
                } else if (colorChoice < 0.75) {
                    colors[i3] = 0.42; colors[i3 + 1] = 0.8; colors[i3 + 2] = 0.47; // 绿
                } else {
                    colors[i3] = 0.29; colors[i3 + 1] = 0.59; colors[i3 + 2] = 1; // 蓝
                }
                
                sizes[i] = Math.random() * 2 + 0.5;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            var material = new THREE.PointsMaterial({
                size: 0.08,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                sizeAttenuation: true
            });
            
            glowParticles = new THREE.Points(geometry, material);
            scene.add(glowParticles);
        }
        
        function onMouseMove(e) {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        }
        
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            var time = Date.now() * 0.001;
            
            // 动画漂浮物品
            floatingItems.forEach(function(item) {
                var data = item.userData;
                item.rotation.x += data.rotSpeedX;
                item.rotation.y += data.rotSpeedY;
                item.position.y = data.baseY + Math.sin(time * data.floatSpeed + data.floatOffset) * 0.5;
            });
            
            // 粒子效果
            if (glowParticles) {
                glowParticles.rotation.y += 0.0003;
                glowParticles.rotation.x = Math.sin(time * 0.2) * 0.1;
            }
            
            // 相机轻微跟随
            camera.position.x += (mouseX * 0.3 - camera.position.x) * 0.02;
            camera.position.y += (-mouseY * 0.2 - camera.position.y) * 0.02;
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
        }
        
        // ========== DOM 操作 ==========
        function createModuleNodes() {
            var container = document.getElementById('mainContainer');
            var radius = window.innerWidth < 768 ? 170 : 240;
            
            CONFIG.modules.forEach(function(mod, index) {
                var node = document.createElement('div');
                node.className = 'module-node';
                node.id = 'module-' + mod.id;
                node.style.cssText = '--module-color: ' + mod.color + '; --module-color-text: ' + mod.colorText + ';';
                node.innerHTML = 
                    '<div class="module-node-bg"></div>' +
                    '<div class="module-node-ring"></div>' +
                    '<div class="module-icon">' + mod.icon + '</div>' +
                    '<div class="module-title">' + mod.title + '</div>';
                
                var angle = (index / CONFIG.modules.length) * Math.PI * 2 - Math.PI / 2;
                var x = Math.cos(angle) * radius;
                var y = Math.sin(angle) * radius;
                
                node.style.left = 'calc(50% + ' + x + 'px - 75px)';
                node.style.top = 'calc(50% + ' + y + 'px - 75px)';
                
                node.addEventListener('click', function(e) {
                    zoomAndNavigate(mod, e);
                });
                
                node.addEventListener('mouseenter', function() {
                    dimOtherModules(mod.id);
                });
                
                node.addEventListener('mouseleave', function() {
                    if (!state.allAwakened) {
                        resetModules();
                    }
                });
                
                container.appendChild(node);
                
                setTimeout(function() {
                    node.classList.add('visible');
                }, 300 + index * 120);
            });
        }
        
        function dimOtherModules(activeId) {
            CONFIG.modules.forEach(function(mod) {
                var node = document.getElementById('module-' + mod.id);
                if (mod.id !== activeId) {
                    node.classList.add('dimmed');
                    node.classList.remove('active');
                } else {
                    node.classList.remove('dimmed');
                    node.classList.add('active');
                }
            });
        }
        
        function resetModules() {
            CONFIG.modules.forEach(function(mod) {
                var node = document.getElementById('module-' + mod.id);
                node.classList.remove('dimmed', 'active');
            });
        }
        
        function awakenAll() {
            state.allAwakened = true;
            CONFIG.modules.forEach(function(mod) {
                var node = document.getElementById('module-' + mod.id);
                node.classList.remove('dimmed');
                node.classList.add('active');
            });
            
            setTimeout(function() {
                state.allAwakened = false;
                resetModules();
            }, 3000);
        }
        
        // ========== 核心：拉近导航效果 ==========
        function zoomAndNavigate(module, event) {
            if (state.isAnimating) return;
            state.isAnimating = true;
            
            var mainContainer = document.getElementById('mainContainer');
            var overlay = document.getElementById('transitionOverlay');
            var backBtn = document.getElementById('backBtn');
            
            // 获取点击位置
            var rect = event.target.getBoundingClientRect();
            var tx = ((rect.left + rect.width / 2) / window.innerWidth) * 100;
            var ty = ((rect.top + rect.height / 2) / window.innerHeight) * 100;
            
            // 设置渐变中心
            overlay.style.setProperty('--tx', tx + '%');
            overlay.style.setProperty('--ty', ty + '%');
            
            // 相机拉近动画
            var startZ = camera.position.z;
            var targetZ = 1.5;
            var zoomDuration = 600;
            var startTime = Date.now();
            
            function zoomIn() {
                var elapsed = Date.now() - startTime;
                var progress = Math.min(elapsed / zoomDuration, 1);
                var easeProgress = 1 - Math.pow(1 - progress, 3);
                
                camera.position.z = startZ + (targetZ - startZ) * easeProgress;
                
                if (progress < 1) {
                    requestAnimationFrame(zoomIn);
                } else {
                    // 缩放主容器
                    mainContainer.classList.add('zooming');
                    overlay.classList.add('active');
                    
                    // 等待动画完成后跳转
                    setTimeout(function() {
                        window.location.href = module.url;
                    }, 400);
                }
            }
            
            zoomIn();
        }
        
        function goBack() {
            window.location.href = 'starfield.html';
        }
        
        function goToPage(url) {
            window.location.href = url;
        }
        
        // ========== 初始化 ==========
        function init() {
            initThree();
            createModuleNodes();
            
            // 显示标题和底部栏
            setTimeout(function() {
                document.getElementById('header').classList.add('visible');
                document.getElementById('bottomBar').classList.add('visible');
            }, 200);
            
            animate();
        }
        
        init();
    </script>
</body>
</html>
