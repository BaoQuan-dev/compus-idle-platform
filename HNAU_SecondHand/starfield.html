<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNAU 闲置星球</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.cn/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            color: #fff;
        }
        
        /* 过渡动画遮罩 */
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at var(--tx, 50%) var(--ty, 50%), #00ffc8 0%, #000 70%);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .transition-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        /* Three.js Canvas */
        #cosmic-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* 主界面容器 */
        .main-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
        }
        
        .main-container.zooming {
            transform: scale(0.3);
            opacity: 0;
        }
        
        /* 顶部标题 */
        .header {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        
        .header.visible {
            opacity: 1;
        }
        
        .header h1 {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: 10px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 5s ease infinite;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
            position: relative;
        }
        
        .header h1::before,
        .header h1::after {
            content: '✨';
            position: absolute;
            -webkit-text-fill-color: initial;
            font-size: 24px;
            animation: twinkle 2s ease-in-out infinite;
        }
        
        .header h1::before {
            left: -50px;
            animation-delay: 0s;
        }
        
        .header h1::after {
            right: -50px;
            animation-delay: 1s;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        
        .header p {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 6px;
            margin-top: 15px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* 中心指示器 */
        .center-indicator {
            position: absolute;
            top: calc(50% + 80px);
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.5s ease;
        }
        
        .center-indicator.hidden {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
        }
        
        .center-circle {
            width: 160px;
            height: 160px;
            border: 4px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            animation: pulse-ring 2s ease-in-out infinite;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            position: relative;
        }
        
        .center-circle::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .center-indicator:hover .center-circle {
            border-color: rgba(255, 255, 255, 0.9);
            transform: scale(1.15);
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.4),
                        0 0 100px rgba(255, 215, 0, 0.3);
        }
        
        .center-icon {
            font-size: 50px;
            animation: float 3s ease-in-out infinite;
        }
        
        .center-text {
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            margin-top: 8px;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8),
                         0 0 40px rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, #ffd700, #ff6b6b, #ffd700);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: text-shine 3s ease-in-out infinite;
        }
        
        @keyframes text-shine {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .center-indicator span {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 255, 255, 0.1), 0 0 60px rgba(255, 255, 255, 0.05); }
            50% { box-shadow: 0 0 50px rgba(255, 255, 255, 0.2), 0 0 100px rgba(255, 255, 255, 0.1); }
        }
        
        /* 模块节点 - 放大版 */
        .module-node {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.1s ease-out;
            opacity: 0;
            transform: scale(0);
            /* 增强悬浮滑动感 */
            will-change: transform, opacity, left, top;
        }
        
        .module-node.visible {
            opacity: 1;
            transform: scale(1);
            animation: float-in 0.8s ease-out forwards;
        }
        
        @keyframes float-in {
            0% {
                opacity: 0;
                transform: scale(0) translateY(50px);
            }
            60% {
                transform: scale(1.1) translateY(-5px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        /* 鼠标悬浮时的滑动效果 */
        .module-node:hover {
            transform: scale(1.15) translateY(-8px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        box-shadow 0.3s ease,
                        border-color 0.3s ease;
        }
        
        .module-node:active {
            transform: scale(1.05);
            transition: transform 0.1s ease;
        }
        
        .module-node.dimmed {
            opacity: 0.15 !important;
            transform: scale(0.6) translateY(0) !important;
            filter: blur(3px);
        }
        
        .module-node.active {
            opacity: 1 !important;
            transform: scale(1.35) translateY(-15px) !important;
            z-index: 100;
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% {
                filter: brightness(1) drop-shadow(0 0 20px var(--module-color, rgba(255, 255, 255, 0.5)));
            }
            50% {
                filter: brightness(1.2) drop-shadow(0 0 40px var(--module-color, rgba(255, 255, 255, 0.8)));
            }
        }
        
        .module-node-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(40, 50, 70, 0.95), rgba(15, 20, 35, 0.98));
            border: 3px solid var(--module-color, rgba(255, 255, 255, 0.3));
            transition: all 0.5s ease;
            box-shadow: 0 0 30px var(--module-color, transparent),
                        inset 0 0 30px rgba(255, 255, 255, 0.05);
        }
        
        .module-node:hover .module-node-bg,
        .module-node.active .module-node-bg {
            border-width: 4px;
            box-shadow: 0 0 60px var(--module-color, rgba(255, 255, 255, 0.5)),
                        inset 0 0 40px rgba(255, 255, 255, 0.15);
        }
        
        .module-node-ring {
            position: absolute;
            width: calc(100% + 15px);
            height: calc(100% + 15px);
            border-radius: 50%;
            border: 2px solid var(--module-color, rgba(255, 255, 255, 0.2));
            opacity: 0.5;
            transition: all 0.5s ease;
        }
        
        .module-node:hover .module-node-ring,
        .module-node.active .module-node-ring {
            opacity: 1;
            animation: rotate-ring 6s linear infinite;
        }
        
        @keyframes rotate-ring {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .module-icon {
            font-size: 52px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 15px var(--module-color, rgba(255, 255, 255, 0.5)));
            transition: transform 0.3s ease;
        }
        
        .module-node:hover .module-icon {
            transform: scale(1.2) rotate(10deg);
        }
        
        .module-title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 3px;
            text-align: center;
            margin-top: 12px;
            position: relative;
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,0,0,0.6));
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--module-color, rgba(255,255,255,0.2));
            box-shadow: 0 0 20px var(--module-color, rgba(255,255,255,0.1));
        }
        
        .module-title::before {
            content: '♦';
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--module-color);
            animation: sparkle 1.5s ease-in-out infinite;
        }
        
        .module-title::after {
            content: '♦';
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--module-color);
            animation: sparkle 1.5s ease-in-out infinite 0.75s;
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: translateY(-50%) scale(0.8); }
            50% { opacity: 1; transform: translateY(-50%) scale(1.2); }
        }
        
        /* 粒子尾迹 */
        .module-node::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, var(--module-color, transparent) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            animation: particle-pulse 2s ease-in-out infinite;
        }
        
        .module-node:hover::after {
            opacity: 0.3;
        }
        
        @keyframes particle-pulse {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.2); opacity: 0.4; }
        }
        
        /* 底部快捷入口 */
        .bottom-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: auto;
            width: 90%;
            max-width: 850px;
        }
        
        .bottom-bar.visible {
            opacity: 1;
        }
        
        .quick-links {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        
        .quick-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            background: rgba(20, 30, 50, 0.85);
            border: 2px solid var(--link-color, rgba(255, 255, 255, 0.2));
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(10px);
            /* 增强滑动感 */
            will-change: transform, box-shadow;
            position: relative;
            overflow: hidden;
        }
        
        .quick-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }
        
        .quick-link:hover::before {
            left: 100%;
        }
        
        .quick-link:hover {
            background: rgba(30, 45, 70, 0.95);
            border-color: var(--link-color, rgba(255, 255, 255, 0.6));
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                        0 0 40px var(--link-color, rgba(255, 255, 255, 0.4));
        }
        
        .quick-link:active {
            transform: translateY(-2px) scale(0.98);
            transition: transform 0.1s ease;
        }
        
        .quick-link-icon {
            font-size: 30px;
            transition: transform 0.3s ease;
        }
        
        .quick-link:hover .quick-link-icon {
            transform: scale(1.2) rotate(5deg);
            animation: bounce-icon 0.6s ease infinite;
        }
        
        .quick-link-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px var(--link-color, rgba(255,255,255,0.3));
        }
        
        @keyframes bounce-icon {
            0%, 100% { transform: scale(1.2) translateY(0); }
            50% { transform: scale(1.2) translateY(-3px); }
        }
        
        .quick-link-icon {
            font-size: 24px;
        }
        
        .quick-link-text {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
        }
        
        /* 底部说明 */
        .bottom-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
        }
        
        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            padding: 12px 24px;
            background: rgba(20, 30, 50, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .back-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .back-btn:hover {
            background: rgba(40, 60, 100, 0.9);
            transform: translateX(5px);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
                letter-spacing: 4px;
            }
            
            .header p {
                font-size: 13px;
            }
            
            .module-node {
                width: 110px;
                height: 110px;
            }
            
            .module-icon {
                font-size: 40px;
            }
            
            .module-title {
                font-size: 14px;
            }
            
            .center-circle {
                width: 110px;
                height: 110px;
            }
            
            .center-icon {
                font-size: 44px;
            }
            
            .quick-link {
                padding: 12px 20px;
            }
            
            .quick-link-text {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- 过渡动画遮罩 -->
    <div class="transition-overlay" id="transitionOverlay"></div>
    
    <!-- 返回按钮 -->
    <button class="back-btn" id="backBtn" onclick="goBack()">← 返回首页</button>
    
    <!-- Three.js Canvas -->
    <canvas id="cosmic-canvas"></canvas>
    
    <!-- 主界面 -->
    <div class="main-container" id="mainContainer">
        <!-- 标题 -->
        <div class="header" id="header">
            <h1>🌟 农大闲置 🌟</h1>
            <p>探索校园闲置 · 开启绿色循环</p>
        </div>
        
        <!-- 中心指示器 -->
        <div class="center-indicator" id="centerIndicator" onclick="awakenAll()">
            <div class="center-circle">
                <span class="center-icon">🎁</span>
                <span class="center-text">农大闲置</span>
            </div>
            <span>点击唤醒全部</span>
        </div>
    </div>
    
    <!-- 底部快捷入口 -->
    <div class="bottom-bar" id="bottomBar">
        <div class="quick-links">
            <div class="quick-link" style="--link-color: #ffd93d;" onclick="goToPage('user_login.html')">
                <span class="quick-link-icon">👕</span>
                <span class="quick-link-text">登录/注册</span>
            </div>
            <div class="quick-link" style="--link-color: #6bcb77;" onclick="goToPage('stu_check.html')">
                <span class="quick-link-icon">📱</span>
                <span class="quick-link-text">校园认证</span>
            </div>
            <div class="quick-link" style="--link-color: #4d96ff;" onclick="goToPage('carbon_ai.html')">
                <span class="quick-link-icon">💻</span>
                <span class="quick-link-text">碳足迹AI</span>
            </div>
            <div class="quick-link" style="--link-color: #ff9ff3;" onclick="goToPage('donation_list.html')">
                <span class="quick-link-icon">🎧</span>
                <span class="quick-link-text">公益转赠</span>
            </div>
        </div>
        <div class="bottom-hint">点击上方图标快速进入对应功能</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ========== 闲置物品配置 ==========
        var ITEMS = [
            '👟', '👕', '👖', '👗', '🧥', '👠', '👡', '👢',
            '🎒', '👝', '👜', '💼', '🎒', '🕶', '⌚', '📱',
            '💻', '⌨️', '🖥', '🖨', '📷', '🎮', '🎧', '📚',
            '🎸', '🎮', '⚽', '🏀', '🎯', '🎲', '🧸', '🎁',
            '💄', '💍', '🔧', '🔨', '✂️', '📏', '🖊',
            '🪑', '💡', '🏷️', '📦', '🧲', '🔑', '🎵'
        ];
        
        var ITEM_COLORS = [
            0xff6b6b, 0xffd93d, 0x6bcb77, 0x4d96ff, 0xff9ff3,
            0xa29bfe, 0xfd79a8, 0xfdcb6e, 0x00b894, 0x0984e3,
            0xe17055, 0x00cec9, 0x6c5ce7, 0xfab1a0, 0x74b9ff
        ];
        
        // ========== 模块配置 ==========
        var CONFIG = {
            modules: [
                {
                    id: 'publish',
                    icon: '📦',
                    title: '发布闲置',
                    color: '#ffd93d',
                    colorText: '#ffd93d',
                    desc: '一键发布闲置物品',
                    url: 'release_goods.html'
                },
                {
                    id: 'donation',
                    icon: '💝',
                    title: '公益转赠',
                    color: '#ff9ff3',
                    colorText: '#ff9ff3',
                    desc: '传递爱心温暖',
                    url: 'donation_list.html'
                },
                {
                    id: 'demand',
                    icon: '🔍',
                    title: '需求广场',
                    color: '#54a0ff',
                    colorText: '#54a0ff',
                    desc: '寻找有缘人',
                    url: 'demand_board.html'
                },
                {
                    id: 'carbon',
                    icon: '🌱',
                    title: '碳足迹',
                    color: '#6bcb77',
                    colorText: '#6bcb77',
                    desc: '记录环保行动',
                    url: 'carbon_ai.html'
                },
                {
                    id: 'profile',
                    icon: '👤',
                    title: '个人中心',
                    color: '#a29bfe',
                    colorText: '#a29bfe',
                    desc: '管理我的信息',
                    url: 'user_center.html'
                }
            ]
        };
        
        // ========== 状态 ==========
        var state = {
            isAnimating: false,
            allAwakened: false
        };
        
        // ========== Three.js ==========
        var scene, camera, renderer;
        var floatingItems = [];
        var glowParticles;
        var mouseX = 0, mouseY = 0;
        var targetX = 0, targetY = 0;
        var velocityX = 0, velocityY = 0;
        var isDragging = false;
        var lastX = 0, lastY = 0;
        var dragSensitivity = 3;
        var returnSpeed = 0.08;
        
        function initThree() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 8;
            
            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('cosmic-canvas'),
                antialias: true,
                alpha: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            
            // 创建渐变背景
            createGradientBackground();
            
            // 创建漂浮的闲置物品
            createFloatingItems();
            
            // 创建发光粒子
            createGlowParticles();
            
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onDragStart);
            document.addEventListener('mouseup', onDragEnd);
            document.addEventListener('mouseleave', onDragEnd);
            document.addEventListener('touchstart', onTouchStart, { passive: false });
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', onDragEnd);
            window.addEventListener('resize', onResize);
        }
        
        function createGradientBackground() {
            var canvas = document.createElement('canvas');
            canvas.width = 2;
            canvas.height = 512;
            var ctx = canvas.getContext('2d');
            
            var gradient = ctx.createLinearGradient(0, 0, 0, 512);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f0f23');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 2, 512);
            
            var texture = new THREE.CanvasTexture(canvas);
            scene.background = texture;
        }
        
        // 创建商品精灵图（emoji + 发光背景）
        function createGoodsSprite(emoji, color) {
            var canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            var ctx = canvas.getContext('2d');
            
            // 发光背景
            var hex = '#' + color.toString(16).padStart(6, '0');
            var gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0, hex + 'aa');
            gradient.addColorStop(0.5, hex + '44');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 128, 128);
            
            // 绘制emoji
            ctx.font = '72px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(emoji, 64, 64);
            
            var texture = new THREE.CanvasTexture(canvas);
            var material = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                opacity: 0.95,
                depthWrite: false
            });
            return new THREE.Sprite(material);
        }
        
        function createFloatingItems() {
            // 使用emoji商品代表物品
            var itemCount = 250;
            
            for (var i = 0; i < itemCount; i++) {
                var itemGroup = new THREE.Group();
                
                // 随机选择商品emoji
                var emoji = ITEMS[Math.floor(Math.random() * ITEMS.length)];
                var color = ITEM_COLORS[Math.floor(Math.random() * ITEM_COLORS.length)];
                var size = 0.6 + Math.random() * 0.8;
                
                // 创建emoji精灵
                var sprite = createGoodsSprite(emoji, color);
                sprite.scale.set(size, size, 1);
                itemGroup.add(sprite);
                
                // 随机位置 - 覆盖整个屏幕
                itemGroup.position.x = (Math.random() - 0.5) * 45;
                itemGroup.position.y = (Math.random() - 0.5) * 25;
                itemGroup.position.z = -5 - Math.random() * 20;
                
                // 存储动画参数
                itemGroup.userData = {
                    baseX: itemGroup.position.x,
                    baseY: itemGroup.position.y,
                    baseZ: itemGroup.position.z,
                    baseScale: size,
                    rotSpeedX: 0,
                    rotSpeedY: 0,
                    floatSpeed: 0.3 + Math.random() * 0.8,
                    floatOffset: Math.random() * Math.PI * 2
                };
                
                scene.add(itemGroup);
                floatingItems.push(itemGroup);
            }
        }
        
        function createGlowParticles() {
            var geometry = new THREE.BufferGeometry();
            var count = 1500;
            var positions = new Float32Array(count * 3);
            var colors = new Float32Array(count * 3);
            var sizes = new Float32Array(count);
            
            for (var i = 0; i < count; i++) {
                var i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 80;
                positions[i3 + 1] = (Math.random() - 0.5) * 50;
                positions[i3 + 2] = -30 - Math.random() * 30;
                
                // 彩色粒子
                var colorChoice = Math.random();
                if (colorChoice < 0.25) {
                    colors[i3] = 1; colors[i3 + 1] = 0.42; colors[i3 + 2] = 0.42; // 红
                } else if (colorChoice < 0.5) {
                    colors[i3] = 1; colors[i3 + 1] = 0.85; colors[i3 + 2] = 0.24; // 黄
                } else if (colorChoice < 0.75) {
                    colors[i3] = 0.42; colors[i3 + 1] = 0.8; colors[i3 + 2] = 0.47; // 绿
                } else {
                    colors[i3] = 0.29; colors[i3 + 1] = 0.59; colors[i3 + 2] = 1; // 蓝
                }
                
                sizes[i] = Math.random() * 2 + 0.5;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            var material = new THREE.PointsMaterial({
                size: 0.08,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                sizeAttenuation: true
            });
            
            glowParticles = new THREE.Points(geometry, material);
            scene.add(glowParticles);
        }
        
        function onMouseMove(e) {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        }
        
        function onDragStart(e) {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
            velocityX = 0;
            velocityY = 0;
            document.body.style.cursor = 'grabbing';
        }
        
        function onDragEnd() {
            isDragging = false;
            document.body.style.cursor = 'default';
        }
        
        function onTouchStart(e) {
            if (e.touches.length === 1) {
                isDragging = true;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
                velocityX = 0;
                velocityY = 0;
            }
        }
        
        function onTouchMove(e) {
            if (isDragging && e.touches.length === 1) {
                e.preventDefault();
                var deltaX = e.touches[0].clientX - lastX;
                var deltaY = e.touches[0].clientY - lastY;
                
                velocityX = deltaX * 0.01;
                velocityY = -deltaY * 0.01;
                
                targetX += velocityX;
                targetY += velocityY;
                
                // 限制范围
                targetX = Math.max(-3, Math.min(3, targetX));
                targetY = Math.max(-2, Math.min(2, targetY));
                
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            }
        }
        
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            var time = Date.now() * 0.001;
            
            // 鼠标/拖拽驱动的目标位置
            if (!isDragging) {
                // 鼠标悬停影响
                targetX += (mouseX * 2 - targetX) * 0.05;
                targetY += (-mouseY * 1.5 - targetY) * 0.05;
                
                // 添加惯性滑动
                targetX += velocityX;
                targetY += velocityY;
                
                // 阻力衰减
                velocityX *= 0.95;
                velocityY *= 0.95;
                
                // 缓慢回归中心
                targetX *= 0.995;
                targetY *= 0.995;
            }
            
            // 限制范围
            targetX = Math.max(-3, Math.min(3, targetX));
            targetY = Math.max(-2, Math.min(2, targetY));
            
            // 相机跟随（增强滑动感）
            camera.position.x += (targetX - camera.position.x) * 0.1;
            camera.position.y += (targetY - camera.position.y) * 0.1;
            
            // 相机旋转（视差效果）
            camera.rotation.y = -targetX * 0.08;
            camera.rotation.x = targetY * 0.05;
            
            camera.lookAt(0, 0, 0);
            
            // 动画漂浮物品（增强视差层次感）
            floatingItems.forEach(function(item, index) {
                var data = item.userData;
                
                // 物品本身的漂浮动画
                var floatY = Math.sin(time * data.floatSpeed + data.floatOffset) * 0.8;
                var floatX = Math.cos(time * data.floatSpeed * 0.7 + data.floatOffset) * 0.3;
                
                // 基于深度的视差效果（远处的物品跟随少）
                var depthFactor = Math.max(0.3, 1 - (Math.abs(data.baseZ) / 25));
                var parallaxX = targetX * depthFactor * 1.5;
                var parallaxY = targetY * depthFactor * 1.2;
                
                // 拖拽滑动效果（远处的物品跟随更多）
                var dragFactor = Math.max(0.2, 0.5 + (Math.abs(data.baseZ) / 25) * 0.5);
                
                item.position.x = data.baseX + floatX + parallaxX * dragFactor + (isDragging ? velocityX * 50 * dragFactor : 0);
                item.position.y = data.baseY + floatY + parallaxY * dragFactor + (isDragging ? -velocityY * 30 * dragFactor : 0);
                
                // 物品轻微旋转
                item.rotation.z = Math.sin(time * 0.5 + data.floatOffset) * 0.1;
                
                // 物品大小随距离变化
                var scaleMod = 0.7 + (1 - Math.abs(data.baseZ) / 25) * 0.6;
                item.children[0].scale.set(data.baseScale || 1, data.baseScale || 1, 1);
            });
            
            // 粒子效果（跟随滑动）
            if (glowParticles) {
                glowParticles.rotation.y += 0.0005;
                glowParticles.rotation.x = Math.sin(time * 0.3) * 0.15;
                glowParticles.rotation.z = Math.cos(time * 0.2) * 0.1;
                
                // 粒子视差跟随
                glowParticles.position.x = targetX * 0.3;
                glowParticles.position.y = -targetY * 0.2;
            }
            
            renderer.render(scene, camera);
        }
        
        // ========== DOM 操作 ==========
        function createModuleNodes() {
            var container = document.getElementById('mainContainer');
            var radius = window.innerWidth < 768 ? 170 : 240;
            
            CONFIG.modules.forEach(function(mod, index) {
                var node = document.createElement('div');
                node.className = 'module-node';
                node.id = 'module-' + mod.id;
                node.style.cssText = '--module-color: ' + mod.color + '; --module-color-text: ' + mod.colorText + ';';
                node.innerHTML = 
                    '<div class="module-node-bg"></div>' +
                    '<div class="module-node-ring"></div>' +
                    '<div class="module-icon">' + mod.icon + '</div>' +
                    '<div class="module-title">' + mod.title + '</div>';
                
                var angle = (index / CONFIG.modules.length) * Math.PI * 2 - Math.PI / 2;
                var x = Math.cos(angle) * radius;
                var y = Math.sin(angle) * radius;
                
                node.style.left = 'calc(50% + ' + x + 'px - 75px)';
                node.style.top = 'calc(50% + ' + y + 'px - 75px + 80px)'; // 往下偏移80px
                
                node.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    zoomAndNavigate(mod, node);
                });
                
                // 也给模块内的文字添加点击
                var moduleText = node.querySelector('.module-title');
                if (moduleText) {
                    moduleText.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        zoomAndNavigate(mod, node);
                    });
                }
                
                var moduleIcon = node.querySelector('.module-icon');
                if (moduleIcon) {
                    moduleIcon.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        zoomAndNavigate(mod, node);
                    });
                }
                
                node.addEventListener('mouseenter', function() {
                    dimOtherModules(mod.id);
                });
                
                node.addEventListener('mouseleave', function() {
                    if (!state.allAwakened) {
                        resetModules();
                    }
                });
                
                container.appendChild(node);
                
                setTimeout(function() {
                    node.classList.add('visible');
                }, 300 + index * 120);
            });
        }
        
        function dimOtherModules(activeId) {
            CONFIG.modules.forEach(function(mod) {
                var node = document.getElementById('module-' + mod.id);
                if (mod.id !== activeId) {
                    node.classList.add('dimmed');
                    node.classList.remove('active');
                } else {
                    node.classList.remove('dimmed');
                    node.classList.add('active');
                }
            });
        }
        
        function resetModules() {
            CONFIG.modules.forEach(function(mod) {
                var node = document.getElementById('module-' + mod.id);
                node.classList.remove('dimmed', 'active');
            });
        }
        
        function awakenAll() {
            state.allAwakened = true;
            CONFIG.modules.forEach(function(mod) {
                var node = document.getElementById('module-' + mod.id);
                node.classList.remove('dimmed');
                node.classList.add('active');
            });
            
            setTimeout(function() {
                state.allAwakened = false;
                resetModules();
            }, 3000);
        }
        
        // ========== 核心：拉近导航效果 ==========
        function zoomAndNavigate(module, node) {
            if (state.isAnimating) return;
            state.isAnimating = true;
            
            var mainContainer = document.getElementById('mainContainer');
            var overlay = document.getElementById('transitionOverlay');
            var backBtn = document.getElementById('backBtn');
            
            // 获取点击位置
            var rect = node.getBoundingClientRect();
            var tx = ((rect.left + rect.width / 2) / window.innerWidth) * 100;
            var ty = ((rect.top + rect.height / 2) / window.innerHeight) * 100;
            
            // 设置渐变中心
            overlay.style.setProperty('--tx', tx + '%');
            overlay.style.setProperty('--ty', ty + '%');
            
            // 相机拉近动画
            var startZ = camera.position.z;
            var targetZ = 1.5;
            var zoomDuration = 600;
            var startTime = Date.now();
            
            function zoomIn() {
                var elapsed = Date.now() - startTime;
                var progress = Math.min(elapsed / zoomDuration, 1);
                var easeProgress = 1 - Math.pow(1 - progress, 3);
                
                camera.position.z = startZ + (targetZ - startZ) * easeProgress;
                
                if (progress < 1) {
                    requestAnimationFrame(zoomIn);
                } else {
                    // 缩放主容器
                    mainContainer.classList.add('zooming');
                    overlay.classList.add('active');
                    
                    // 等待动画完成后跳转
                    setTimeout(function() {
                        window.location.href = module.url;
                    }, 400);
                }
            }
            
            zoomIn();
        }
        
        function goBack() {
            window.location.href = 'starfield.html';
        }
        
        function goToPage(url) {
            window.location.href = url;
        }
        
        // ========== 初始化 ==========
        function init() {
            initThree();
            createModuleNodes();
            
            // 显示标题和底部栏
            setTimeout(function() {
                document.getElementById('header').classList.add('visible');
                document.getElementById('bottomBar').classList.add('visible');
            }, 200);
            
            animate();
        }
        
        init();
    </script>

        var targetRotX = 0, targetRotY = 0;
        var currentRotX = 0, currentRotY = 0;
        var isHover = false;
        var isJumping = false, jumpVelocity = 0, catY = 0;
        var glowParts = [];
        var pupilL = null, pupilR = null;
        var eyeL = null, eyeR = null;
        var glowIntensity = 0.4;
        var clickGlow = 0;
        var lastInteraction = Date.now();
        var idleTimer = null;
        var isBlinking = false, blinkProgress = 0;
        var bubbleTimer = null;
        
        function showBubble(text, duration) {
            if (bubbleTimer) clearTimeout(bubbleTimer);
            bubbleTxt.textContent = text;
            bubble.style.display = 'block';
            bubbleTimer = setTimeout(function() { bubble.style.display = 'none'; }, duration || CONFIG.bubbleDuration);
        }
        
        function getGreeting() {
            var hour = new Date().getHours();
            for (var i = 0; i < CONFIG.greetings.length; i++) {
                var g = CONFIG.greetings[i];
                if (hour >= g.hour[0] && hour < g.hour[1]) return g.text;
            }
            return '你好呀!';
        }
        
        function createCat() {
            catGroup = new THREE.Group();
            var holoColor = 0x40ffaa;
            
            function glowMat(o) { return new THREE.MeshBasicMaterial({ color: holoColor, transparent: true, opacity: o || 0.35, wireframe: true }); }
            function solidMat(o) { return new THREE.MeshBasicMaterial({ color: holoColor, transparent: true, opacity: o || 0.7 }); }
            
            // 头
            var headGeo = new THREE.SphereGeometry(0.48, 20, 16);
            var head = new THREE.Mesh(headGeo, glowMat(0.3));
            head.scale.set(1.1, 0.95, 0.9);
            head.position.y = 1.75;
            head.name = 'head';
            glowParts.push(head);
            catGroup.add(head);
            
            // 角
            var hornGeo = new THREE.ConeGeometry(0.06, 0.15, 6);
            var horn = new THREE.Mesh(hornGeo, solidMat(0.6));
            horn.position.set(0, 2.25, 0);
            horn.name = 'horn';
            glowParts.push(horn);
            catGroup.add(horn);
            
            // 耳朵
            var earGeo = new THREE.ConeGeometry(0.16, 0.4, 4);
            var earL = new THREE.Mesh(earGeo, glowMat(0.3));
            earL.position.set(-0.32, 2.15, 0.05);
            earL.rotation.z = 0.25;
            glowParts.push(earL);
            catGroup.add(earL);
            var earR = new THREE.Mesh(earGeo, glowMat(0.3));
            earR.position.set(0.32, 2.15, 0.05);
            earR.rotation.z = -0.25;
            glowParts.push(earR);
            catGroup.add(earR);
            
            // 眼睛
            var eyeGeo = new THREE.SphereGeometry(0.12, 12, 10);
            eyeL = new THREE.Mesh(eyeGeo, solidMat(0.9));
            eyeL.position.set(-0.2, 1.85, 0.4);
            eyeL.scale.set(1.4, 0.7, 0.6);
            eyeL.name = 'eyeL';
            glowParts.push(eyeL);
            catGroup.add(eyeL);
            eyeR = new THREE.Mesh(eyeGeo, solidMat(0.9));
            eyeR.position.set(0.2, 1.85, 0.4);
            eyeR.scale.set(1.4, 0.7, 0.6);
            eyeR.name = 'eyeR';
            glowParts.push(eyeR);
            catGroup.add(eyeR);
            
            // 瞳孔
            var pupilGeo = new THREE.SphereGeometry(0.06, 8, 6);
            pupilL = new THREE.Mesh(pupilGeo, new THREE.MeshBasicMaterial({ color: 0x001a0d }));
            pupilL.position.set(-0.2, 1.85, 0.5);
            pupilL.scale.set(1, 2.5, 0.5);
            catGroup.add(pupilL);
            pupilR = new THREE.Mesh(pupilGeo, new THREE.MeshBasicMaterial({ color: 0x001a0d }));
            pupilR.position.set(0.2, 1.85, 0.5);
            pupilR.scale.set(1, 2.5, 0.5);
            catGroup.add(pupilR);
            
            // 鼻子
            var noseGeo = new THREE.SphereGeometry(0.04, 8, 6);
            var nose = new THREE.Mesh(noseGeo, solidMat(0.8));
            nose.position.set(0, 1.7, 0.45);
            glowParts.push(nose);
            catGroup.add(nose);
            
            // 身体
            var bodyGeo = new THREE.SphereGeometry(0.45, 16, 12);
            var body = new THREE.Mesh(bodyGeo, glowMat(0.25));
            body.scale.set(0.9, 1.1, 0.75);
            body.position.y = 0.95;
            glowParts.push(body);
            catGroup.add(body);
            
            // 核心
            var coreGeo = new THREE.SphereGeometry(0.12, 16, 12);
            var core = new THREE.Mesh(coreGeo, solidMat(0.6));
            core.position.set(0, 1.1, 0.25);
            core.name = 'core';
            glowParts.push(core);
            catGroup.add(core);
            
            // 前爪
            var pawGeo = new THREE.CapsuleGeometry(0.1, 0.15, 4, 8);
            var pawL = new THREE.Mesh(pawGeo, glowMat(0.3));
            pawL.position.set(-0.32, 0.55, 0.2);
            pawL.rotation.x = 0.5;
            glowParts.push(pawL);
            catGroup.add(pawL);
            var pawR = new THREE.Mesh(pawGeo, glowMat(0.3));
            pawR.position.set(0.32, 0.55, 0.2);
            pawR.rotation.x = 0.5;
            glowParts.push(pawR);
            catGroup.add(pawR);
            
            // 后腿
            var legGeo = new THREE.CapsuleGeometry(0.1, 0.2, 4, 8);
            var legL = new THREE.Mesh(legGeo, glowMat(0.3));
            legL.position.set(-0.35, 0.5, -0.1);
            legL.rotation.x = 0.8;
            legL.rotation.z = 0.4;
            glowParts.push(legL);
            catGroup.add(legL);
            var legR = new THREE.Mesh(legGeo, glowMat(0.3));
            legR.position.set(0.35, 0.5, -0.1);
            legR.rotation.x = 0.8;
            legR.rotation.z = -0.4;
            glowParts.push(legR);
            catGroup.add(legR);
            
            // 尾巴
            var tailCurve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(0, 0.7, -0.35),
                new THREE.Vector3(-0.15, 0.5, -0.5),
                new THREE.Vector3(-0.2, 0.85, -0.4),
                new THREE.Vector3(-0.1, 1.15, -0.25),
                new THREE.Vector3(0.05, 1.35, -0.2)
            ]);
            var tailGeo = new THREE.TubeGeometry(tailCurve, 16, 0.07, 8, false);
            var tail = new THREE.Mesh(tailGeo, glowMat(0.35));
            tail.name = 'tail';
            glowParts.push(tail);
            catGroup.add(tail);
            
            // 尾巴尖
            var tailTipGeo = new THREE.SphereGeometry(0.08, 8, 6);
            var tailTip = new THREE.Mesh(tailTipGeo, solidMat(0.6));
            tailTip.position.set(0.05, 1.35, -0.2);
            glowParts.push(tailTip);
            catGroup.add(tailTip);
            
            // 底座
            var ringGeo = new THREE.TorusGeometry(0.55, 0.02, 8, 32);
            var ring = new THREE.Mesh(ringGeo, solidMat(0.4));
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.12;
            ring.name = 'ring';
            glowParts.push(ring);
            catGroup.add(ring);
            
            var discGeo = new THREE.CircleGeometry(0.45, 32);
            var disc = new THREE.Mesh(discGeo, solidMat(0.1));
            disc.rotation.x = -Math.PI / 2;
            disc.position.y = 0.13;
            glowParts.push(disc);
            catGroup.add(disc);
            
            createParticles();
            scene.add(catGroup);
        }
        
        function createParticles() {
            var geo = new THREE.BufferGeometry();
            var count = 60;
            var positions = new Float32Array(count * 3);
            var colors = new Float32Array(count * 3);
            for (var i = 0; i < count; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 2.5;
                positions[i * 3 + 1] = Math.random() * 2.5 + 0.3;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 2.5;
                colors[i * 3] = 0.25; colors[i * 3 + 1] = 1; colors[i * 3 + 2] = 0.67;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            var mat = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, transparent: true, opacity: 0, blending: THREE.AdditiveBlending });
            particles = new THREE.Points(geo, mat);
            scene.add(particles);
        }
        
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, box.offsetWidth / box.offsetHeight, 0.1, 100);
            camera.position.set(0, 1.5, 3.5);
            camera.lookAt(0, 1, 0);
            renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
            renderer.setSize(box.offsetWidth, box.offsetHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);
            var ambient = new THREE.AmbientLight(0x404040, 0.3);
            scene.add(ambient);
            var point = new THREE.PointLight(0x40ffaa, 0.8, 10);
            point.position.set(0, 3, 2);
            scene.add(point);
            createCat();
            animate();
        }
        
        function animate() {
            requestAnimationFrame(animate);
            var time = Date.now();
            
            if (catGroup) {
                targetRotY = mouseX * 0.5;
                targetRotX = mouseY * 0.3;
                currentRotY += (targetRotY - currentRotY) * 0.1;
                currentRotX += (targetRotX - currentRotX) * 0.1;
                catGroup.rotation.y = currentRotY;
                catGroup.rotation.x = currentRotX;
                
                var tail = catGroup.getObjectByName('tail');
                if (tail) tail.rotation.z = Math.sin(time * 0.003) * (isHover ? 0.4 : 0.15);
                
                var ring = catGroup.getObjectByName('ring');
                if (ring) ring.rotation.z += isHover ? 0.015 : 0.004;
                
                catGroup.position.y = catY;
                if (!isJumping) catGroup.position.y += Math.sin(time * 0.002) * 0.025;
                
                if (pupilL && pupilR) {
                    var px = currentPupilX + (targetPupilX - currentPupilX) * 0.15;
                    var py = currentPupilY + (targetPupilY - currentPupilY) * 0.15;
                    pupilL.position.x = -0.2 + px * 0.03;
                    pupilL.position.y = 1.85 + py * 0.03;
                    pupilR.position.x = 0.2 + px * 0.03;
                    pupilR.position.y = 1.85 + py * 0.03;
                    currentPupilX = px;
                    currentPupilY = py;
                }
                
                updateBlink();
                updateGlow(time);
            }
            
            if (particles) {
                particles.material.opacity += ((isHover ? 1 : 0) - particles.material.opacity) * 0.06;
                var pos = particles.geometry.attributes.position.array;
                for (var i = 0; i < pos.length / 3; i++) {
                    pos[i * 3 + 1] += 0.003;
                    if (pos[i * 3 + 1] > 2.8) {
                        pos[i * 3 + 1] = 0.3;
                        pos[i * 3] = (Math.random() - 0.5) * 2.5;
                        pos[i * 3 + 2] = (Math.random() - 0.5) * 2.5;
                    }
                }
                particles.geometry.attributes.position.needsUpdate = true;
            }
            
            renderer.render(scene, camera);
        }
        
        function updateBlink() {
            if (!isBlinking) {
                if (Math.random() < 0.004) { isBlinking = true; blinkProgress = 0; }
            } else {
                blinkProgress += 0.15;
                var bs = Math.sin(blinkProgress * Math.PI);
                if (eyeL) eyeL.scale.y = 0.7 * (1 - bs * 0.85);
                if (eyeR) eyeR.scale.y = 0.7 * (1 - bs * 0.85);
                if (blinkProgress >= 1) {
                    isBlinking = false;
                    if (eyeL) eyeL.scale.y = 0.7;
                    if (eyeR) eyeR.scale.y = 0.7;
                }
            }
        }
        
        function updateGlow(time) {
            var targetGlow = 0.35 + (isHover ? 0.4 : 0) + clickGlow;
            glowIntensity += (targetGlow - glowIntensity) * 0.08;
            if (clickGlow > 0) clickGlow *= 0.92;
            
            glowParts.forEach(function(part) {
                if (part.material) {
                    var isEye = part.name && part.name.indexOf('eye') === 0;
                    var isCore = part.name === 'core';
                    var intensity = glowIntensity;
                    if (isEye && clickGlow > 0) intensity += 0.5;
                    if (isCore && clickGlow > 0) intensity += 0.3;
                    part.material.opacity = Math.min(intensity, 1);
                    if (clickGlow > 0.2 && isEye) part.material.color.setHex(0x88ffcc);
                    else part.material.color.setHex(0x40ffaa);
                }
            });
            
            var horn = catGroup.getObjectByName('horn');
            if (horn) horn.material.opacity = glowIntensity * (0.5 + Math.sin(time * 0.003) * 0.2);
        }
        
        function doJump() {
            if (isJumping) return;
            isJumping = true;
            jumpVelocity = 0.12;
            function jumpFrame() {
                catY += jumpVelocity;
                jumpVelocity -= 0.006;
                if (catY <= 0) { catY = 0; isJumping = false; }
                else requestAnimationFrame(jumpFrame);
            }
            requestAnimationFrame(jumpFrame);
        }
        
        overlay.addEventListener('mouseenter', function() {
            isHover = true;
            lastInteraction = Date.now();
            clearTimeout(idleTimer);
        });
        
        overlay.addEventListener('mouseleave', function() {
            isHover = false;
            lastInteraction = Date.now();
            startIdleTimer();
        });
        
        overlay.addEventListener('mousemove', function(e) {
            var rect = box.getBoundingClientRect();
            mouseX = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
            mouseY = ((e.clientY - rect.top) / rect.height - 0.5) * 2;
            targetPupilX = mouseX;
            targetPupilY = -mouseY;
        });
        
        overlay.addEventListener('click', function() {
            lastInteraction = Date.now();
            clickGlow = 1;
            doJump();
            var text = CONFIG.clickTexts[Math.floor(Math.random() * CONFIG.clickTexts.length)];
            showBubble(text);
            box.clickCount = (box.clickCount || 0) + 1;
            if (box.clickCount >= 3) {
                box.clickCount = 0;
                setTimeout(function() { showLoginGuide(); }, 500);
            }
        });
        
        function startIdleTimer() {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(function() {
                if (!isHover) {
                    var text = CONFIG.idleTexts[Math.floor(Math.random() * CONFIG.idleTexts.length)];
                    showBubble(text, 5000);
                    startIdleTimer();
                }
            }, 15000);
        }
        
        window.showLoginGuide = function() {
            document.getElementById('login-guide-modal').classList.add('show');
        };
        
        window.closeLoginGuide = function() {
            document.getElementById('login-guide-modal').classList.remove('show');
        };
        
        window.goLogin = function() {
            closeLoginGuide();
            window.location.href = 'user_login.html';
        };
        
        initThree();
        setTimeout(function() { showBubble(getGreeting()); }, 1000);
        setTimeout(function() { doJump(); }, 2000);
        startIdleTimer();
    })();
    </script>
</body>
</html>
