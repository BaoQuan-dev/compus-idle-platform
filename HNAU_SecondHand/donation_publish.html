        }

            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(96,165,250,0.3);
        }
        
        .donation-form {
            background: transparent;
            backdrop-filter: blur(20px);

            padding-bottom: 8px;
            border-bottom: 2px solid #3b82f6;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 6px;
        }
        
        .form-label .required {
            color: #f44336;
        }
        
        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #0f172a;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        
        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #2563eb;
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-hint {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        
        .donation-target-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .target-option {
            position: relative;
        }
        
        .target-option input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .target-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 10px;
            background: #1e293b;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .target-option input:checked + label {
            background: #0f172a;
            border-color: #2563eb;
            background: transparent;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .target-option label:hover {
            border-color: #2563eb;
        }
        
        .target-icon {
            font-size: 1.8rem;
            margin-bottom: 6px;
        }
        
        .target-name {
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .price-display {
            background: #0f172a;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            border: 2px dashed #2563eb;
        }
        
        .price-display .price {
            font-size: 1.8rem;
            font-weight: bold;
            background: transparent;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .price-display .price-label {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
            margin-top: 4px;
        }
        
        .image-upload-area {

            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #fafafa;
        }
        
        .image-upload-area:hover {
            border-color: #2563eb;
            background: #1e293b;
        }
        
        .image-upload-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .image-upload-text {
            color: rgba(255,255,255,0.8);
            font-size: 0.95rem;
        }
        
        .image-preview-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 16px;
        }
        
        .image-preview {
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background: #f0f0f0;
        }
        
        .image-preview img {
            width: 100%;
            height: 100%;

                        <option value="其他">📦 其他物品</option>
                    </select>
                </div>
            </div>
            
            <!-- 转赠对象 -->
            <div class="form-section">
                <div class="form-section-title">
                    <span class="charity-badge">🎯</span> 转赠对象
                </div>
                
                <div class="donation-target-grid">
                    <div class="target-option">
                        <input type="radio" name="targetType" id="targetClub" value="club" required>
                        <label for="targetClub">
                            <span class="target-icon">🏛️</span>
                            <span class="target-name">公益社团</span>
                        </label>
                    </div>
                    <div class="target-option">
                        <input type="radio" name="targetType" id="targetWork" value="work">
                        <label for="targetWork">
                            <span class="target-icon">💼</span>
                            <span class="target-name">勤工助学点</span>
                        </label>
                    </div>
                    <div class="target-option">
                        <input type="radio" name="targetType" id="targetPersonal" value="personal">
                        <label for="targetPersonal">
                            <span class="target-icon">👤</span>
                            <span class="target-name">个人定向</span>
                        </label>
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 16px;">
                    <label class="form-label">
                        转赠说明 <span class="required">*</span>
                    </label>
                    <textarea class="form-textarea" id="description" placeholder="请描述物品的使用状况、转赠原因或对接收者的期望..." required maxlength="500"></textarea>
                    <div class="form-hint">建议包含：物品新旧程度、功能完好情况、使用建议等</div>
                </div>
            </div>
            
            <!-- 价格提示 -->
            <div class="form-section">
                <div class="form-section-title">
                    <span class="charity-badge">💚</span> 转赠价格
                </div>
                <div class="price-display">
                    <div class="price">¥0.00</div>
                    <div class="price-label">公益转赠，无需支付 · 爱心传递</div>
                </div>
            </div>
            
            <!-- 图片上传 -->
            <div class="form-section">
                <div class="form-section-title">
                    <span class="charity-badge">📷</span> 物品图片
                </div>
                <div class="image-upload-area" id="imageUploadArea">
                    <div class="image-upload-icon">📷</div>
                    <div class="image-upload-text">点击上传物品图片（最多4张）</div>
                </div>
                <input type="file" id="imageInput" accept="image/*" multiple style="display: none;">
                <div class="image-preview-grid" id="imagePreview"></div>
            </div>
            
            <!-- 提交按钮 -->
            <button type="submit" class="submit-btn" id="submitBtn">
                <span>🌟</span>
                <span>发布公益转赠</span>
            </button>
            
            <!-- 删除按钮 -->
            <button type="button" class="delete-btn" id="deleteBtn" style="display: none;">
                <span>🗑️</span>
                <span>删除发布</span>
            </button>
        </form>

        // ========== DOM ==========
        var form = document.getElementById('donationForm');
        var imageUploadArea = document.getElementById('imageUploadArea');
        var imageInput = document.getElementById('imageInput');
        var imagePreview = document.getElementById('imagePreview');
        var submitBtn = document.getElementById('submitBtn');
        var successModal = document.getElementById('successModal');
        var successBtn = document.getElementById('successBtn');
        deleteModal = document.getElementById('deleteModal');
        
        // ========== 检查编辑模式 ==========
        function checkEditMode() {
            var urlParams = new URLSearchParams(window.location.search);
            editId = urlParams.get('editId');
            if (editId) {
                loadEditData();
            }
        }
        
        // ========== 加载编辑数据 ==========
        function loadEditData() {
            var list = getDonationList();
            var item = list.find(function(d) { return d.id === editId; });
            if (item) {
                document.getElementById('itemName').value = item.itemName || '';
                document.getElementById('category').value = item.category || '';
                document.getElementById('description').value = item.description || '';
                if (item.targetType) {
                    var radio = document.querySelector('input[name="targetType"][value="' + item.targetType + '"]');
                    if (radio) radio.checked = true;
                }
                uploadedImages = item.images || [];
                renderImagePreviews();
                
                // 切换到编辑模式标题
                var titleEl = document.querySelector('.page-title');
                if (titleEl) titleEl.textContent = '编辑转赠';
                
                // 显示删除按钮
                var deleteBtn = document.getElementById('deleteBtn');
                if (deleteBtn) deleteBtn.style.display = 'flex';
                
                // 修改按钮文字
                submitBtn.textContent = '保存修改';
            }
        }
        
        // ========== 删除确认弹窗 ==========
        function showDeleteConfirm() {
            if (deleteModal) {
                deleteModal.classList.add('active');
            }
        }
        
        function hideDeleteConfirm() {
            if (deleteModal) {
                deleteModal.classList.remove('active');
            }
        }
        
        function confirmDelete() {
            var list = getDonationList();
            var newList = list.filter(function(d) { return d.id !== editId; });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(newList));
            hideDeleteConfirm();
            Toast.show('删除成功', 'success');
            setTimeout(function() {
                window.location.href = 'donation_my.html';
            }, 1000);
        }
        
        // 绑定删除按钮事件
        document.addEventListener('DOMContentLoaded', function() {
            var deleteBtn = document.getElementById('deleteBtn');
            var cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
            var confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
            
            if (deleteBtn) {
                deleteBtn.addEventListener('click', showDeleteConfirm);
            }
            if (cancelDeleteBtn) {
                cancelDeleteBtn.addEventListener('click', hideDeleteConfirm);
            }
            if (confirmDeleteBtn) {
                confirmDeleteBtn.addEventListener('click', confirmDelete);
            }
            if (deleteModal) {
                deleteModal.addEventListener('click', function(e) {
                    if (e.target === deleteModal) {
                        hideDeleteConfirm();
                    }
                });
            }
        });
        
        // ========== 图片预览 ==========
        var uploadedImages = [];
        
        imageUploadArea.addEventListener('click', function() {
            imageInput.click();
        });
        
        imageInput.addEventListener('change', function(e) {
            var files = Array.from(e.target.files);
            if (uploadedImages.length + files.length > 4) {
                alert('最多只能上传4张图片');
                return;
            }
            
            files.forEach(function(file) {
                var reader = new FileReader();
                reader.onload = function(event) {
                    uploadedImages.push(event.target.result);
                    renderImagePreviews();
                };
                reader.readAsDataURL(file);
            });
        });
        
        function renderImagePreviews() {
            imagePreview.innerHTML = uploadedImages.map(function(img, index) {
                return '<div class="image-preview">' +
                       '<img src="' + img + '" alt="预览' + (index + 1) + '">' +
                       '</div>';
            }).join('');
        }
        
        // ========== 表单提交 ==========
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            console.log('[Donation] 表单提交开始');
            
            // 获取表单数据
            var formData = {
                id: 'D' + Date.now(),
                itemName: document.getElementById('itemName').value.trim(),
                category: document.getElementById('category').value,
                targetType: document.querySelector('input[name="targetType"]:checked')?.value,
                description: document.getElementById('description').value.trim(),
                images: uploadedImages,
                price: 0,
                status: 'pending', // pending | receiving | completed | cancelled
                publishTime: new Date().toISOString(),
                publisher: getCurrentUser(),
                receiver: null,
                confirmTime: null,
                feedback: null
            };
            
            // 验证
            if (!formData.targetType) {
                console.log('[Donation] 未选择转赠对象类型');
                alert('请选择转赠对象类型');
                return;
            }
            
            console.log('[Donation] 开始保存数据:', formData);
            
            // 保存到localStorage
            try {
                var list = getDonationList();
                
                if (editId) {
                    // 编辑模式：更新现有项
                    for (var i = 0; i < list.length; i++) {
                        if (list[i].id === editId) {
                            formData.id = editId;
                            formData.publishTime = list[i].publishTime;
                            list[i] = formData;
                            break;
                        }
                    }
                } else {
                    // 新增模式
                    list.unshift(formData);
                }
                
                localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
                console.log('[Donation] 保存成功，列表长度:', list.length);
            } catch (err) {
                console.error('[Donation] 保存失败:', err);
                alert('存储失败，请清理浏览器缓存后重试');
                return;
            }
            
            console.log('[Donation] 显示成功弹窗');
            // 显示成功弹窗
            successModal.classList.add('active');
            
            // 禁用按钮
            submitBtn.disabled = true;
            console.log('[Donation] 表单提交完成');
        });
        
        // ========== 页面加载时检查编辑模式 ==========
        checkEditMode();
        
        // ========== 成功弹窗 ==========
        successBtn.addEventListener('click', function() {
            window.location.href = 'donation_my.html';
        });
        
        // ========== 获取当前用户 ==========
        function getCurrentUser() {
            var userStr = localStorage.getItem(USER_KEY);
            if (userStr) {
                return JSON.parse(userStr);
            }
            // 模拟用户数据
            return {
                id: 'user_' + Date.now(),
                name: '爱心同学',
                studentId: '2024****',
                college: '爱心学院'
            };
        }
        
        // ========== 获取转赠列表 ==========
        function getDonationList() {
            var listStr = localStorage.getItem(STORAGE_KEY);
            return listStr ? JSON.parse(listStr) : [];
        }
        
        // ========== 移动端菜单 ==========
        var navbarToggle = document.getElementById('navbarToggle');
        if (navbarToggle) {
            navbarToggle.addEventListener('click', function() {
                var menu = document.getElementById('mobileMenu');
                if (menu) {
                    menu.classList.toggle('active');
                }
            });
        }
        
        console.log('[HNAU Donation] 公益转赠发布页已加载');
    })();
    </script>
</body>
</html>
