        <!-- 商品展示区 -->

    <!-- ========== 3D科技风宠物猫组件 ========== -->
    <div id="hnau-cat-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; pointer-events: auto;">
        <!-- 消息气泡 -->
        <div id="hnau-cat-bubble" class="hnau-cat-bubble" style="display: none;">
            <div class="hnau-cat-bubble-content"></div>
            <div class="hnau-cat-bubble-arrow"></div>
        </div>
        
        <!-- 快捷菜单 -->
        <div id="hnau-cat-menu" class="hnau-cat-menu" style="display: none;">
            <div class="hnau-cat-menu-item" data-action="publish">📦 发布闲置</div>
            <div class="hnau-cat-menu-item" data-action="favorites">❤️ 我的收藏</div>
            <div class="hnau-cat-menu-item" data-action="center">👤 个人中心</div>
        </div>
        
        <!-- 粒子特效层 -->
        <canvas id="hnau-cat-particles" class="hnau-cat-particles"></canvas>
        
        <!-- 猫咪主体 -->
        <div id="hnau-cat-body" class="hnau-cat-body">
            <!-- 底座光环 -->
            <div class="hnau-cat-base">
                <div class="hnau-cat-base-ring"></div>
                <div class="hnau-cat-base-glow"></div>
            </div>
            
            <!-- 猫咪3D容器 -->
            <div class="hnau-cat-scene">
                <!-- 猫咪头部 -->
                <div class="hnau-cat-head">
                    <!-- 全息头顶 -->
                    <div class="hnau-cat-holo"></div>
                    <!-- 耳朵 -->
                    <div class="hnau-cat-ear hnau-cat-ear-left"></div>
                    <div class="hnau-cat-ear hnau-cat-ear-right"></div>
                    <!-- 面部 -->
                    <div class="hnau-cat-face">
                        <!-- 眼睛 -->
                        <div class="hnau-cat-eye hnau-cat-eye-left">
                            <div class="hnau-cat-pupil"></div>
                            <div class="hnau-cat-glint"></div>
                        </div>
                        <div class="hnau-cat-eye hnau-cat-eye-right">
                            <div class="hnau-cat-pupil"></div>
                            <div class="hnau-cat-glint"></div>
                        </div>
                        <!-- 鼻子 -->
                        <div class="hnau-cat-nose"></div>
                        <!-- 嘴巴 -->
                        <div class="hnau-cat-mouth"></div>
                        <!-- 腮须 -->
                        <div class="hnau-cat-whiskers"></div>
                    </div>
                    <!-- 数据流 -->
                    <div class="hnau-cat-dataflow"></div>
                </div>
                
                <!-- 身体 -->
                <div class="hnau-cat-torso">
                    <!-- 能量核心 -->
                    <div class="hnau-cat-core"></div>
                    <!-- 扫描线 -->
                    <div class="hnau-cat-scanline"></div>
                </div>
                
                <!-- 尾巴 -->
                <div class="hnau-cat-tail"></div>
                
                <!-- 爪子 -->
                <div class="hnau-cat-paws">
                    <div class="hnau-cat-paw hnau-cat-paw-left"></div>
                    <div class="hnau-cat-paw hnau-cat-paw-right"></div>
                </div>
            </div>
        </div>
        
        <!-- 状态指示器 -->
        <div class="hnau-cat-status">
            <span class="hnau-cat-status-dot"></span>
            <span class="hnau-cat-status-text">在线</span>
        </div>
    </div>
    
    <!-- 宠物猫组件样式 -->
    <style>
        /* ===== 容器与基础 ===== */
        #hnau-cat-container {
            width: 200px;
            height: 300px;
            position: relative;
            cursor: pointer;
            user-select: none;
        }
        
        /* ===== 消息气泡 ===== */
        .hnau-cat-bubble {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid #00d4ff;
            border-radius: 12px;
            padding: 10px 16px;
            max-width: 200px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            animation: hnau-cat-bubble-in 0.3s ease;
            z-index: 10;
        }
        
        .hnau-cat-bubble::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #16213e;
        }
        
        .hnau-cat-bubble-content {
            color: #00d4ff;
            font-size: 12px;
            text-align: center;
            line-height: 1.4;
        }
        
        @keyframes hnau-cat-bubble-in {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        /* ===== 快捷菜单 ===== */
        .hnau-cat-menu {
            position: absolute;
            bottom: 80px;
            right: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid #00d4ff;
            border-radius: 12px;
            padding: 8px;
            min-width: 160px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            z-index: 10;
        }
        
        .hnau-cat-menu::before {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 30px;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #16213e;
        }
        
        .hnau-cat-menu-item {
            padding: 10px 14px;
            color: #e4e4e7;
            font-size: 13px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .hnau-cat-menu-item:hover {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }
        
        /* ===== 粒子画布 ===== */
        .hnau-cat-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        
        /* ===== 猫咪主体 ===== */
        .hnau-cat-body {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }
        
        /* ===== 底座光环 ===== */
        .hnau-cat-base {
            position: absolute;
            bottom: 0;
            width: 160px;
            height: 40px;
        }
        
        .hnau-cat-base-ring {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 30px;
            border: 2px solid rgba(0, 212, 255, 0.5);
            border-radius: 50%;
            animation: hnau-cat-pulse 2s ease-in-out infinite;
        }
        
        .hnau-cat-base-glow {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 20px;
            background: radial-gradient(ellipse, rgba(0, 212, 255, 0.3) 0%, transparent 70%);
            filter: blur(5px);
        }
        
        @keyframes hnau-cat-pulse {
            0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
        }
        
        /* ===== 3D场景 ===== */
        .hnau-cat-scene {
            position: relative;
            width: 120px;
            height: 180px;
            transform-style: preserve-3d;
            perspective: 500px;
            animation: hnau-cat-float 3s ease-in-out infinite;
            z-index: 2;
        }
        
        @keyframes hnau-cat-float {
            0%, 100% { transform: translateY(0) rotateY(0deg); }
            25% { transform: translateY(-5px) rotateY(3deg); }
            75% { transform: translateY(-3px) rotateY(-3deg); }
        }
        
        /* ===== 猫咪头部 ===== */
        .hnau-cat-head {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 70px;
            background: linear-gradient(180deg, #2a3f5f 0%, #1a2a40 100%);
            border-radius: 40% 40% 45% 45%;
            box-shadow: 
                inset 0 -10px 20px rgba(0, 0, 0, 0.3),
                0 5px 15px rgba(0, 0, 0, 0.3),
                0 0 30px rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        
        /* 全息头顶 */
        .hnau-cat-holo {
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 20px;
            background: linear-gradient(180deg, rgba(0, 212, 255, 0.5) 0%, transparent 100%);
            border-radius: 50% 50% 0 0;
            animation: hnau-cat-holo-glow 1.5s ease-in-out infinite;
        }
        
        @keyframes hnau-cat-holo-glow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        /* 耳朵 */
        .hnau-cat-ear {
            position: absolute;
            top: -15px;
            width: 25px;
            height: 30px;
            background: linear-gradient(180deg, #3a4f6f 0%, #2a3f5f 100%);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        
        .hnau-cat-ear-left {
            left: 5px;
            transform: rotate(-15deg);
            border-radius: 50% 50% 0 50%;
        }
        
        .hnau-cat-ear-right {
            right: 5px;
            transform: rotate(15deg);
            border-radius: 50% 50% 50% 0;
        }
        
        .hnau-cat-ear::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 12px;
            background: rgba(0, 212, 255, 0.3);
            border-radius: 50%;
        }
        
        /* 面部 */
        .hnau-cat-face {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 50px;
        }
        
        /* 眼睛 */
        .hnau-cat-eye {
            position: absolute;
            top: 5px;
            width: 20px;
            height: 16px;
            background: linear-gradient(180deg, #00d4ff 0%, #0066cc 100%);
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        
        .hnau-cat-eye-left { left: 8px; }
        .hnau-cat-eye-right { right: 8px; }
        
        .hnau-cat-pupil {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 12px;
            background: #0a0a1a;
            border-radius: 50%;
            animation: hnau-cat-blink 4s ease-in-out infinite;
        }
        
        .hnau-cat-glint {
            position: absolute;
            top: 3px;
            left: 4px;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
        }
        
        @keyframes hnau-cat-blink {
            0%, 90%, 100% { transform: translate(-50%, -50%) scaleY(1); }
            95% { transform: translate(-50%, -50%) scaleY(0.1); }
        }
        
        /* 鼻子 */
        .hnau-cat-nose {
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 6px;
            background: #ff6b9d;
            border-radius: 50% 50% 40% 40%;
            box-shadow: 0 0 5px rgba(255, 107, 157, 0.5);
        }
        
        /* 嘴巴 */
        .hnau-cat-mouth {
            position: absolute;
            top: 27px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 10px;
            border-bottom: 2px solid rgba(0, 212, 255, 0.5);
            border-left: 2px solid transparent;
            border-right: 2px solid transparent;
            border-radius: 0 0 50% 50%;
        }
        
        /* 腮须 */
        .hnau-cat-whiskers {
            position: absolute;
            top: 25px;
            left: 0;
            right: 0;
        }
        
        .hnau-cat-whiskers::before,
        .hnau-cat-whiskers::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 1px;
            background: rgba(0, 212, 255, 0.5);
        }
        
        .hnau-cat-whiskers::before {
            left: -5px;
            top: 0;
            transform: rotate(-10deg);
        }
        
        .hnau-cat-whiskers::after {
            right: -5px;
            top: 0;
            transform: rotate(10deg);
        }
        
        /* 数据流 */
        .hnau-cat-dataflow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                180deg,
                transparent 0%,
                rgba(0, 212, 255, 0.1) 50%,
                transparent 100%
            );
            background-size: 100% 20px;
            animation: hnau-cat-dataflow-move 1s linear infinite;
            border-radius: 40% 40% 45% 45%;
            pointer-events: none;
        }
        
        @keyframes hnau-cat-dataflow-move {
            from { background-position: 0 -20px; }
            to { background-position: 0 70px; }
        }
        
        /* ===== 身体 ===== */
        .hnau-cat-torso {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 70px;
            background: linear-gradient(180deg, #1a2a40 0%, #0f1a2a 100%);
            border-radius: 30% 30% 40% 40%;
            border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: inset 0 -10px 20px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        /* 能量核心 */
        .hnau-cat-core {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #00d4ff 0%, #0066cc 50%, transparent 70%);
            border-radius: 50%;
            animation: hnau-cat-core-pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes hnau-cat-core-pulse {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.8; }
            50% { transform: translateX(-50%) scale(1.2); opacity: 1; }
        }
        
        /* 扫描线 */
        .hnau-cat-scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.5), transparent);
            animation: hnau-cat-scan 2s linear infinite;
        }
        
        @keyframes hnau-cat-scan {
            from { top: 0; }
            to { top: 100%; }
        }
        
        /* ===== 尾巴 ===== */
        .hnau-cat-tail {
            position: absolute;
            bottom: 30px;
            right: -20px;
            width: 50px;
            height: 15px;
            background: linear-gradient(90deg, #1a2a40, #2a4a6f);
            border-radius: 10px;
            transform-origin: left center;
            animation: hnau-cat-tail-wave 1.5s ease-in-out infinite;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        .hnau-cat-tail::after {
            content: '';
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #2a4a6f;
            border-radius: 50%;
        }
        
        @keyframes hnau-cat-tail-wave {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(15deg); }
        }
        
        /* ===== 爪子 ===== */
        .hnau-cat-paws {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            display: flex;
            justify-content: space-between;
        }
        
        .hnau-cat-paw {
            width: 20px;
            height: 15px;
            background: linear-gradient(180deg, #2a3f5f, #1a2a40);
            border-radius: 50% 50% 40% 40%;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        /* ===== 状态指示器 ===== */
        .hnau-cat-status {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(26, 26, 46, 0.9);
            padding: 4px 10px;
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        
        .hnau-cat-status-dot {
            width: 6px;
            height: 6px;
            background: #00ff88;
            border-radius: 50%;
            animation: hnau-cat-status-blink 1s ease-in-out infinite;
        }
        
        @keyframes hnau-cat-status-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .hnau-cat-status-text {
            font-size: 10px;
            color: #a1a1aa;
        }
        
        /* ===== 交互状态 ===== */
        /* 悬浮状态 */
        .hnau-cat-body:hover {
            animation: none;
        }
        
        .hnau-cat-body:hover .hnau-cat-scene {
            transform: translateY(-10px) rotateY(5deg);
        }
        
        .hnau-cat-body:hover .hnau-cat-tail {
            animation: hnau-cat-tail-excited 0.3s ease-in-out infinite;
        }
        
        @keyframes hnau-cat-tail-excited {
            0%, 100% { transform: rotate(-20deg); }
            50% { transform: rotate(20deg); }
        }
        
        .hnau-cat-body:hover .hnau-cat-holo {
            background: linear-gradient(180deg, rgba(0, 212, 255, 0.8) 0%, transparent 100%);
        }
        
        /* 点击状态 */
        .hnau-cat-body.hnau-cat-tapped .hnau-cat-scene {
            animation: hnau-cat-tap 0.3s ease;
        }
        
        @keyframes hnau-cat-tap {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.95); }
        }
        
        /* 庆祝状态 */
        .hnau-cat-body.hnau-cat-celebrate .hnau-cat-scene {
            animation: hnau-cat-jump 0.5s ease infinite;
        }
        
        @keyframes hnau-cat-jump {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(-5deg); }
            75% { transform: translateY(-15px) rotate(5deg); }
        }
        
        /* 消息提醒状态 */
        .hnau-cat-body.hnau-cat-alert .hnau-cat-holo {
            animation: hnau-cat-alert-holo 0.5s ease-in-out infinite;
        }
        
        @keyframes hnau-cat-alert-holo {
            0%, 100% { background: linear-gradient(180deg, rgba(255, 107, 157, 0.8) 0%, transparent 100%); }
            50% { background: linear-gradient(180deg, rgba(0, 212, 255, 0.8) 0%, transparent 100%); }
        }
        
        /* ===== 移动端适配 ===== */
        @media (max-width: 768px) {
            #hnau-cat-container {
                width: 150px;
                height: 220px;
                bottom: 80px;
                right: 10px;
            }
            
            .hnau-cat-scene {
                width: 90px;
                height: 140px;
            }
            
            .hnau-cat-head {
                width: 60px;
                height: 55px;
            }
            
            .hnau-cat-torso {
                width: 45px;
                height: 55px;
            }
            
            .hnau-cat-menu {
                min-width: 140px;
                right: -10px;
            }
            
            .hnau-cat-bubble {
                max-width: 150px;
                font-size: 11px;
            }
        }
    </style>
    
    <!-- 宠物猫组件脚本 -->
    <script>
        (function() {
            'use strict';
            
            // ===== 配置 =====
            const CONFIG = {
                particleCount: 30,      // 粒子数量
                particleSpeed: 2,       // 粒子速度
                checkInterval: 3000,   // 检查间隔(ms)
                bubbleDuration: 3000,   // 气泡显示时长(ms)
                menuDuration: 5000      // 菜单显示时长(ms)
            };
            
            // ===== DOM元素 =====
            const container = document.getElementById('hnau-cat-container');
            const catBody = document.getElementById('hnau-cat-body');
            const bubble = document.getElementById('hnau-cat-bubble');
            const bubbleContent = bubble.querySelector('.hnau-cat-bubble-content');
            const menu = document.getElementById('hnau-cat-menu');
            const canvas = document.getElementById('hnau-cat-particles');
            const ctx = canvas.getContext('2d');
            
            // ===== 粒子系统 =====
            let particles = [];
            
            function initParticles() {
                canvas.width = container.offsetWidth;
                canvas.height = container.offsetHeight;
                particles = [];
                
                for (let i = 0; i < CONFIG.particleCount; i++) {
                    particles.push(createParticle());
                }
            }
            
            function createParticle() {
                return {
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 3 + 1,
                    speedX: (Math.random() - 0.5) * CONFIG.particleSpeed,
                    speedY: (Math.random() - 0.5) * CONFIG.particleSpeed,
                    opacity: Math.random() * 0.5 + 0.3,
                    color: Math.random() > 0.5 ? '#00d4ff' : '#ff6b9d'
                };
            }
            
            function updateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach((p, i) => {
                    // 更新位置
                    p.x += p.speedX;
                    p.y += p.speedY;
                    
                    // 边界检测
                    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                    
                    // 绘制粒子
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.opacity;
                    ctx.fill();
                    
                    // 绘制光晕
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.opacity * 0.3;
                    ctx.fill();
                });
                
                ctx.globalAlpha = 1;
            }
            
            // ===== 气泡显示 =====
            function showBubble(text, duration) {
                bubbleContent.textContent = text;
                bubble.style.display = 'block';
                catBody.classList.add('hnau-cat-alert');
                
                setTimeout(() => {
                    hideBubble();
                }, duration || CONFIG.bubbleDuration);
            }
            
            function hideBubble() {
                bubble.style.display = 'none';
                catBody.classList.remove('hnau-cat-alert');
            }
            
            // ===== 菜单显示 =====
            function showMenu() {
                menu.style.display = 'block';
                
                setTimeout(() => {
                    hideMenu();
                }, CONFIG.menuDuration);
            }
            
            function hideMenu() {
                menu.style.display = 'none';
            }
            
            // ===== 播放音效 =====
            function playSound(type) {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    if (type === 'click') {
                        oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(1200, audioContext.currentTime + 0.1);
                        gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.1);
                    } else if (type === 'celebrate') {
                        oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
                        oscillator.frequency.exponentialRampToValueAtTime(1800, audioContext.currentTime + 0.2);
                        gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.3);
                    }
                } catch (e) {
                    // 静默处理音频不支持的情况
                }
            }
            
            // ===== 状态管理 =====
            let isHovering = false;
            let lastTapTime = 0;
            
            // ===== 事件绑定 =====
            // 悬浮事件
            catBody.addEventListener('mouseenter', function() {
                isHovering = true;
                catBody.style.cursor = 'pointer';
                playSound('click');
            });
            
            catBody.addEventListener('mouseleave', function() {
                isHovering = false;
            });
            
            // 点击事件
            catBody.addEventListener('click', function(e) {
                const now = Date.now();
                
                // 检测双击
                if (now - lastTapTime < 300) {
                    // 双击 - 显示快捷菜单
                    playSound('click');
                    showMenu();
                } else {
                    // 单击 - 蹭手效果 + 随机对话
                    catBody.classList.add('hnau-cat-tapped');
                    setTimeout(() => catBody.classList.remove('hnau-cat-tapped'), 300);
                    
                    const messages = [
                        '喵~欢迎来到农大闲置!',
                        '有什么需要帮忙的吗?',
                        '点击右上角🔔查看新消息哦~',
                        '想发布闲置?双击我试试!',
                        '校园认证完成后才能发布商品哦~',
                        '我是你的小助手,随时为你服务!'
                    ];
                    showBubble(messages[Math.floor(Math.random() * messages.length)]);
                }
                
                lastTapTime = now;
            });
            
            // 气泡点击
            bubble.addEventListener('click', function() {
                hideBubble();
            });
            
            // 菜单项点击
            menu.querySelectorAll('.hnau-cat-menu-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    const action = this.dataset.action;
                    
                    switch(action) {
                        case 'publish':
                            Auth.requireReleasePermission(function() {
                                Utils.跳转('release_goods.html');
                            });
                            break;
                        case 'favorites':
                            Utils.跳转('user_center.html?tab=favorites');
                            break;
                        case 'center':
                            Utils.跳转('user_center.html');
                            break;
                    }
                    
                    hideMenu();
                });
            });
            
            // ===== 项目联动功能 =====
            // 检查新消息
            function checkNewMessages() {
                try {
                    const notifications = JSON.parse(localStorage.getItem('hnau_notifications') || '[]');
                    const unread = notifications.filter(n => !n.read);
                    
                    if (unread.length > 0) {
                        const latest = unread[0];
                        showBubble(`📬 ${latest.title}: ${latest.content}`, 5000);
                    }
                } catch (e) {}
            }
            
            // 检查发布成功
            function checkPublishSuccess() {
                try {
                    const publishStatus = sessionStorage.getItem('hnau_publish_success');
                    if (publishStatus === 'true') {
                        sessionStorage.removeItem('hnau_publish_success');
                        
                        // 庆祝动画
                        catBody.classList.add('hnau-cat-celebrate');
                        playSound('celebrate');
                        showBubble('发布成功啦,等待同学来咨询~', 4000);
                        
                        setTimeout(() => {
                            catBody.classList.remove('hnau-cat-celebrate');
                        }, 3000);
                    }
                } catch (e) {}
            }
            
            // 监听storage变化(跨标签页)
            window.addEventListener('storage', function(e) {
                if (e.key === 'hnau_notifications') {
                    checkNewMessages();
                }
            });
            
            // ===== 动画循环 =====
            function animate() {
                if (isHovering) {
                    updateParticles();
                }
                requestAnimationFrame(animate);
            }
            
            // ===== 初始化 =====
            function init() {
                initParticles();
                animate();
                
                // 定期检查新消息
                setInterval(checkNewMessages, CONFIG.checkInterval);
                
                // 检查发布成功
                checkPublishSuccess();
                
                console.log('[HNAU Cat] 科技风宠物猫组件初始化完成~ 🐱');
            }
            
            // 页面加载完成后初始化
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>

</body>
</html>
