    <!-- 脚本 -->

    <script>

        document.addEventListener('DOMContentLoaded', function() {

                mobileReleaseBtn.addEventListener('click', function() {
                    Auth.requireReleasePermission(function() {
                        Utils.跳转('release_goods.html');
                    });
                });
            }
        });
    </script>

    <!-- ========== 轻量化3D科技风宠物猫组件 ========== -->
    <!-- 
        ┌─────────────────────────────────────────────────────────┐
        │  配置说明（可直接修改以下变量）                            │
        │  • hnau-cat-position: 位置，默认 bottom:25px right:25px  │
        │  • hnau-cat-size: 尺寸，默认 190x270px                  │
        │  • hnau-cat-bubble-1: 新商品提醒气泡文字                  │
        │  • hnau-cat-bubble-2: 发布引导气泡文字                    │
        │  • hnau-cat-sound: 是否启用音效，true/false              │
        └─────────────────────────────────────────────────────────┘
    -->
    <div id="hnau-cat-box" style="
        position: fixed;
        bottom: 25px;
        right: 25px;
        width: 190px;
        height: 270px;
        z-index: 999;
        pointer-events: auto;
    ">
        <!-- 气泡层 -->
        <div id="hnau-cat-bubble" class="hnau-cat-bubble" style="display:none;">
            <div class="hnau-cat-bubble-txt"></div>
        </div>
        
        <!-- 粒子画布 -->
        <canvas id="hnau-cat-canvas" class="hnau-cat-canvas"></canvas>
        
        <!-- 猫咪主体 -->
        <div id="hnau-cat-main" class="hnau-cat-main">
            <!-- 底座 -->
            <div class="hnau-cat-base">
                <div class="hnau-cat-ring"></div>
                <div class="hnau-cat-glow"></div>
            </div>
            
            <!-- 猫咪容器 -->
            <div class="hnau-cat-scene">
                <!-- 头部 -->
                <div class="hnau-cat-head">
                    <div class="hnau-cat-holo"></div>
                    <div class="hnau-cat-ear hnau-cat-el"></div>
                    <div class="hnau-cat-ear hnau-cat-er"></div>
                    <div class="hnau-cat-face">
                        <div class="hnau-cat-eye hnau-cat-eyel">
                            <div class="hnau-cat-pupil"></div>
                        </div>
                        <div class="hnau-cat-eye hnau-cat-eyer">
                            <div class="hnau-cat-pupil"></div>
                        </div>
                        <div class="hnau-cat-nose"></div>
                        <div class="hnau-cat-mouth"></div>
                        <div class="hnau-cat-whisk"></div>
                    </div>
                    <div class="hnau-cat-lines"></div>
                </div>
                
                <!-- 身体 -->
                <div class="hnau-cat-body">
                    <div class="hnau-cat-core"></div>
                    <div class="hnau-cat-scan"></div>
                </div>
                
                <!-- 尾巴 -->
                <div class="hnau-cat-tail"></div>
                
                <!-- 爪子 -->
                <div class="hnau-cat-paws">
                    <div class="hnau-cat-paw"></div>
                    <div class="hnau-cat-paw"></div>
                </div>
            </div>
        </div>
        
        <!-- 状态 -->
        <div class="hnau-cat-status">
            <span class="hnau-cat-dot"></span>
            <span class="hnau-cat-stxt">在线</span>
        </div>
    </div>
    
    <!-- 宠物猫组件样式 -->
    <style id="hnau-cat-style">
        /* ===== 隔离容器 ===== */
        #hnau-cat-box * {
            box-sizing: border-box !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        
        /* ===== 气泡 ===== */
        .hnau-cat-bubble {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 100%);
            border: 1px solid #4fc3f7;
            border-radius: 10px;
            padding: 8px 14px;
            max-width: 180px;
            box-shadow: 0 0 15px rgba(79, 195, 247, 0.3);
            z-index: 10;
            animation: hnau-cat-bi 0.3s ease;
        }
        
        .hnau-cat-bubble::after {
            content: '';
            position: absolute;
            bottom: -7px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-top: 7px solid #1a2a4a;
        }
        
        .hnau-cat-bubble-txt {
            color: #4fc3f7;
            font-size: 11px;
            text-align: center;
            line-height: 1.4;
            white-space: nowrap;
        }
        
        @keyframes hnau-cat-bi {
            from { opacity: 0; transform: translateX(-50%) translateY(8px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        /* ===== 粒子画布 ===== */
        .hnau-cat-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        
        /* ===== 猫咪主体 ===== */
        .hnau-cat-main {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            cursor: pointer;
        }
        
        /* ===== 底座 ===== */
        .hnau-cat-base {
            position: absolute;
            bottom: 0;
            width: 150px;
            height: 35px;
        }
        
        .hnau-cat-ring {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 25px;
            border: 2px solid rgba(79, 195, 247, 0.4);
            border-radius: 50%;
            animation: hnau-cat-pulse 2s ease-in-out infinite;
        }
        
        .hnau-cat-glow {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 18px;
            background: radial-gradient(ellipse, rgba(79, 195, 247, 0.25) 0%, transparent 70%);
            filter: blur(4px);
        }
        
        @keyframes hnau-cat-pulse {
            0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.9; transform: translateX(-50%) scale(1.04); }
        }
        
        /* ===== 猫咪场景 ===== */
        .hnau-cat-scene {
            position: relative;
            width: 100px;
            height: 160px;
            transform-style: preserve-3d;
            perspective: 500px;
            animation: hnau-cat-float 3s ease-in-out infinite;
            z-index: 2;
        }
        
        @keyframes hnau-cat-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        
        /* ===== 头部 ===== */
        .hnau-cat-head {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 60px;
            background: linear-gradient(180deg, #1e3a5f 0%, #0f2744 100%);
            border-radius: 35% 35% 40% 40%;
            box-shadow: 
                inset 0 -8px 15px rgba(0, 0, 0, 0.3),
                0 0 25px rgba(79, 195, 247, 0.15);
            border: 1px solid rgba(79, 195, 247, 0.25);
            overflow: hidden;
        }
        
        /* 全息头顶 */
        .hnau-cat-holo {
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 18px;
            background: linear-gradient(180deg, rgba(79, 195, 247, 0.5) 0%, transparent 100%);
            border-radius: 50% 50% 0 0;
            animation: hnau-cat-holo 1.5s ease-in-out infinite;
        }
        
        @keyframes hnau-cat-holo {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }
        
        /* 耳朵 */
        .hnau-cat-ear {
            position: absolute;
            top: -12px;
            width: 22px;
            height: 26px;
            background: linear-gradient(180deg, #2a4a70 0%, #1e3a5f 100%);
            border: 1px solid rgba(79, 195, 247, 0.25);
        }
        
        .hnau-cat-el { left: 3px; transform: rotate(-12deg); border-radius: 50% 50% 0 50%; }
        .hnau-cat-er { right: 3px; transform: rotate(12deg); border-radius: 50% 50% 50% 0; }
        
        .hnau-cat-ear::after {
            content: '';
            position: absolute;
            top: 7px;
            left: 50%;
            transform: translateX(-50%);
            width: 9px;
            height: 10px;
            background: rgba(79, 195, 247, 0.25);
            border-radius: 50%;
        }
        
        /* 面部 */
        .hnau-cat-face {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 45px;
        }
        
        /* 眼睛 */
        .hnau-cat-eye {
            position: absolute;
            top: 4px;
            width: 17px;
            height: 14px;
            background: linear-gradient(180deg, #4fc3f7 0%, #0288d1 100%);
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 8px rgba(79, 195, 247, 0.5);
        }
        
        .hnau-cat-eyel { left: 6px; }
        .hnau-cat-eyer { right: 6px; }
        
        .hnau-cat-pupil {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 7px;
            height: 10px;
            background: #050a15;
            border-radius: 50%;
            animation: hnau-cat-blink 4s ease-in-out infinite;
        }
        
        @keyframes hnau-cat-blink {
            0%, 92%, 100% { transform: translate(-50%, -50%) scaleY(1); }
            96% { transform: translate(-50%, -50%) scaleY(0.1); }
        }
        
        /* 鼻子 */
        .hnau-cat-nose {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: 7px;
            height: 5px;
            background: #f06292;
            border-radius: 50%;
            box-shadow: 0 0 4px rgba(240, 98, 146, 0.5);
        }
        
        /* 嘴巴 */
        .hnau-cat-mouth {
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 8px;
            border-bottom: 2px solid rgba(79, 195, 247, 0.4);
            border-left: 2px solid transparent;
            border-right: 2px solid transparent;
            border-radius: 0 0 50% 50%;
        }
        
        /* 腮须 */
        .hnau-cat-whisk {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
        }
        
        .hnau-cat-whisk::before,
        .hnau-cat-whisk::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 1px;
            background: rgba(79, 195, 247, 0.4);
        }
        
        .hnau-cat-whisk::before { left: -3px; top: 0; transform: rotate(-8deg); }
        .hnau-cat-whisk::after { right: -3px; top: 0; transform: rotate(8deg); }
        
        /* 数据流线 */
        .hnau-cat-lines {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(180deg, transparent 0%, rgba(79, 195, 247, 0.08) 50%, transparent 100%);
            background-size: 100% 18px;
            animation: hnau-cat-lines-move 1.2s linear infinite;
            border-radius: 35% 35% 40% 40%;
            pointer-events: none;
        }
        
        @keyframes hnau-cat-lines-move {
            from { background-position: 0 -18px; }
            to { background-position: 0 60px; }
        }
        
        /* ===== 身体 ===== */
        .hnau-cat-body {
            position: absolute;
            top: 52px;
            left: 50%;
            transform: translateX(-50%);
            width: 52px;
            height: 60px;
            background: linear-gradient(180deg, #0f2744 0%, #081c38 100%);
            border-radius: 26% 26% 35% 35%;
            border: 1px solid rgba(79, 195, 247, 0.2);
            overflow: hidden;
        }
        
        /* 能量核心 */
        .hnau-cat-core {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            background: radial-gradient(circle, #4fc3f7 0%, #0288d1 50%, transparent 70%);
            border-radius: 50%;
            animation: hnau-cat-core-pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes hnau-cat-core-pulse {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.7; }
            50% { transform: translateX(-50%) scale(1.15); opacity: 1; }
        }
        
        /* 扫描线 */
        .hnau-cat-scan {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(79, 195, 247, 0.4), transparent);
            animation: hnau-cat-scan-move 2s linear infinite;
        }
        
        @keyframes hnau-cat-scan-move {
            from { top: 0; }
            to { top: 100%; }
        }
        
        /* ===== 尾巴 ===== */
        .hnau-cat-tail {
            position: absolute;
            bottom: 28px;
            right: -15px;
            width: 42px;
            height: 12px;
            background: linear-gradient(90deg, #0f2744, #1e3a5f);
            border-radius: 8px;
            transform-origin: left center;
            animation: hnau-cat-tail-idle 1.8s ease-in-out infinite;
            border: 1px solid rgba(79, 195, 247, 0.15);
        }
        
        .hnau-cat-tail::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            background: #1e3a5f;
            border-radius: 50%;
        }
        
        @keyframes hnau-cat-tail-idle {
            0%, 100% { transform: rotate(-8deg); }
            50% { transform: rotate(12deg); }
        }
        
        /* ===== 爪子 ===== */
        .hnau-cat-paws {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 42px;
            display: flex;
            justify-content: space-between;
        }
        
        .hnau-cat-paw {
            width: 17px;
            height: 12px;
            background: linear-gradient(180deg, #1e3a5f, #0f2744);
            border-radius: 50% 50% 40% 40%;
            border: 1px solid rgba(79, 195, 247, 0.15);
        }
        
        /* ===== 状态指示 ===== */
        .hnau-cat-status {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(10, 22, 40, 0.9);
            padding: 3px 8px;
            border-radius: 8px;
            border: 1px solid rgba(79, 195, 247, 0.2);
        }
        
        .hnau-cat-dot {
            width: 5px;
            height: 5px;
            background: #4caf50;
            border-radius: 50%;
            animation: hnau-cat-dot-blink 1s ease-in-out infinite;
        }
        
        @keyframes hnau-cat-dot-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .hnau-cat-stxt {
            font-size: 9px;
            color: #78909c;
        }
        
        /* ===== 交互状态 ===== */
        /* 悬浮 */
        #hnau-cat-main:hover .hnau-cat-scene {
            transform: translateY(-8px);
            animation: none;
        }
        
        #hnau-cat-main:hover .hnau-cat-tail {
            animation: hnau-cat-tail-happy 0.25s ease-in-out infinite;
        }
        
        @keyframes hnau-cat-tail-happy {
            0%, 100% { transform: rotate(-18deg); }
            50% { transform: rotate(18deg); }
        }
        
        #hnau-cat-main:hover .hnau-cat-holo {
            background: linear-gradient(180deg, rgba(79, 195, 247, 0.7) 0%, transparent 100%);
        }
        
        /* 点击 */
        #hnau-cat-main.hnau-cat-tap .hnau-cat-scene {
            animation: hnau-cat-tap 0.25s ease !important;
        }
        
        @keyframes hnau-cat-tap {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.94); }
        }
        
        /* 跳跃（新品提醒） */
        #hnau-cat-main.hnau-cat-jump .hnau-cat-scene {
            animation: hnau-cat-jump 0.4s ease !important;
        }
        
        @keyframes hnau-cat-jump {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            30% { transform: translateY(-18px) rotate(-4deg); }
            70% { transform: translateY(-14px) rotate(4deg); }
        }
        
        /* 移动端 */
        @media (max-width: 768px) {
            #hnau-cat-box {
                width: 150px !important;
                height: 210px !important;
                bottom: 85px !important;
                right: 10px !important;
            }
            
            .hnau-cat-scene {
                width: 80px;
                height: 130px;
            }
            
            .hnau-cat-head {
                width: 56px;
                height: 48px;
            }
            
            .hnau-cat-body {
                width: 42px;
                height: 48px;
            }
            
            .hnau-cat-base {
                width: 120px;
            }
            
            .hnau-cat-ring {
                width: 80px;
            }
            
            .hnau-cat-bubble {
                max-width: 140px;
            }
            
            .hnau-cat-bubble-txt {
                font-size: 10px;
            }
        }
    </style>
    
    <!-- 宠物猫组件脚本 -->
    <script id="hnau-cat-script">
        (function() {
            'use strict';
            
            // ===== 配置区（可自行修改）=====
            var CONFIG = {
                enableSound: false,           // 是否启用音效：true / false
                bubbleDuration: 3500,          // 气泡显示时长(ms)
                productBubbleText: '今日有新闲置上架啦',  // 新商品提醒气泡
                publishBubbleText: '点顶部发布，闲置快出手', // 发布引导气泡
                jumpDelay: 2000,              // 页面加载后多久触发跳跃(ms)
                particleCount: 20,            // 粒子数量
                particleSpeed: 1.5            // 粒子速度
            };
            
            // ===== DOM引用 =====
            var box = document.getElementById('hnau-cat-box');
            var main = document.getElementById('hnau-cat-main');
            var bubble = document.getElementById('hnau-cat-bubble');
            var bubbleTxt = bubble.querySelector('.hnau-cat-bubble-txt');
            var canvas = document.getElementById('hnau-cat-canvas');
            var ctx = canvas.getContext('2d');
            
            // ===== 粒子系统 =====
            var particles = [];
            var isHover = false;
            var rafId = null;
            
            function initCanvas() {
                canvas.width = box.offsetWidth;
                canvas.height = box.offsetHeight;
                particles = [];
                for (var i = 0; i < CONFIG.particleCount; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        s: Math.random() * 2.5 + 0.8,
                        vx: (Math.random() - 0.5) * CONFIG.particleSpeed,
                        vy: (Math.random() - 0.5) * CONFIG.particleSpeed,
                        o: Math.random() * 0.4 + 0.2
                    });
                }
            }
            
            function updateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(function(p) {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(79, 195, 247, ' + p.o + ')';
                    ctx.fill();
                });
            }
            
            function animate() {
                if (isHover) updateParticles();
                rafId = requestAnimationFrame(animate);
            }
            
            // ===== 音效（可选）=====
            function playTap() {
                if (!CONFIG.enableSound) return;
                try {
                    var ac = new (window.AudioContext || window.webkitAudioContext)();
                    var osc = ac.createOscillator();
                    var gain = ac.createGain();
                    osc.connect(gain);
                    gain.connect(ac.destination);
                    osc.frequency.setValueAtTime(700, ac.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1100, ac.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.08, ac.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.1);
                    osc.start(ac.currentTime);
                    osc.stop(ac.currentTime + 0.1);
                } catch(e) {}
            }
            
            // ===== 气泡控制 =====
            var bubbleTimer = null;
            
            function showBubble(text, duration) {
                if (bubbleTimer) clearTimeout(bubbleTimer);
                bubbleTxt.textContent = text;
                bubble.style.display = 'block';
                bubbleTimer = setTimeout(function() {
                    bubble.style.display = 'none';
                }, duration || CONFIG.bubbleDuration);
            }
            
            function hideBubble() {
                if (bubbleTimer) clearTimeout(bubbleTimer);
                bubble.style.display = 'none';
            }
            
            // ===== 跳跃动画 =====
            function doJump(callback) {
                main.classList.add('hnau-cat-jump');
                setTimeout(function() {
                    main.classList.remove('hnau-cat-jump');
                    if (callback) callback();
                }, 500);
            }
            
            // ===== 点击事件 =====
            main.addEventListener('mouseenter', function() {
                isHover = true;
                initCanvas();
            });
            
            main.addEventListener('mouseleave', function() {
                isHover = false;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });
            
            main.addEventListener('click', function(e) {
                // 蹭手反馈
                main.classList.add('hnau-cat-tap');
                setTimeout(function() { main.classList.remove('hnau-cat-tap'); }, 250);
                playTap();
                
                // 发布引导气泡
                showBubble(CONFIG.publishBubbleText, CONFIG.bubbleDuration);
            });
            
            // 气泡点击 - 跳转锚点
            bubble.addEventListener('click', function(e) {
                e.stopPropagation();
                hideBubble();
                // 跳转到商品列表锚点
                var productArea = document.getElementById('product-list') || document.querySelector('.product-grid') || document.querySelector('.goods-section');
                if (productArea) {
                    productArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
            
            // ===== 项目联动：新商品提醒 =====
            function checkNewProduct() {
                // 模拟：随机触发新商品提醒（实际项目中可读取localStorage）
                var hasNewProduct = sessionStorage.getItem('hnau_new_product');
                if (hasNewProduct === 'true') {
                    sessionStorage.removeItem('hnau_new_product');
                    doJump(function() {
                        showBubble(CONFIG.productBubbleText, CONFIG.bubbleDuration);
                    });
                }
            }
            
            // 监听跨标签页消息
            window.addEventListener('storage', function(e) {
                if (e.key === 'hnau_new_product') {
                    doJump(function() {
                        showBubble(CONFIG.productBubbleText, CONFIG.bubbleDuration);
                    });
                }
            });
            
            // ===== 初始化 =====
            function init() {
                initCanvas();
                animate();
                
                // 页面加载后延迟触发跳跃+气泡
                setTimeout(function() {
                    // 随机决定是否触发（70%概率）
                    if (Math.random() < 0.7) {
                        doJump(function() {
                            showBubble(CONFIG.productBubbleText, CONFIG.bubbleDuration);
                        });
                    }
                }, CONFIG.jumpDelay);
                
                // 检查新商品状态
                checkNewProduct();
                
                console.log('[HNAU Cat] 科技风宠物猫已就绪~');
            }
            
            // 页面加载完成后初始化
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>

</body>
</html>
