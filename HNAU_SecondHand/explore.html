<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农大闲置 - 探索</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0d1f0d 100%);
            min-height: 100vh;
            overflow: hidden;
            color: white;
            perspective: 1000px;
        }

        /* 粒子背景 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 215, 0, 0.6);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            25% { transform: translateY(-30px) translateX(10px); opacity: 0.8; }
            50% { transform: translateY(-15px) translateX(-10px); opacity: 0.5; }
            75% { transform: translateY(-40px) translateX(5px); opacity: 0.7; }
        }

        /* 顶部标题 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            text-align: center;
            padding: 40px 20px 20px;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(10,10,26,0.9) 0%, transparent 100%);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #90EE90, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
        }

        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 101;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: rgba(255, 215, 0, 0.5);
            transform: scale(1.1);
        }

        .back-btn span {
            font-size: 20px;
        }

        /* 中心麦穗容器 */
        .center-wheat {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
        }

        .wheat-icon {
            font-size: 80px;
            animation: sway 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.5));
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .center-text {
            margin-top: 20px;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 4px;
        }

        /* 模块容器 */
        .modules-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            cursor: grab;
            user-select: none;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .modules-container:active {
            cursor: grabbing;
        }

        /* 3D 舞台 */
        .scene-stage {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            pointer-events: none;
        }

        /* 模块节点 */
        .module-node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.7;
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .module-node:hover {
            opacity: 1;
            transform: scale(1.1) translateZ(30px);
            z-index: 20;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .module-node.active {
            opacity: 1;
            transform: scale(1.15) translateZ(50px);
            z-index: 20;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .module-node .icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .module-node .name {
            font-size: 14px;
            font-weight: 600;
            color: white;
            text-align: center;
        }

        .module-node .desc {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
        }

        /* 进入按钮 */
        .enter-btn {
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 16px;
            background: linear-gradient(135deg, #ffd700, #90EE90);
            border: none;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #1a1a2e;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .module-node:hover .enter-btn,
        .module-node.active .enter-btn {
            opacity: 1;
        }

        .enter-btn:hover {
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        /* 底部提示 */
        .footer-hint {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 100;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .footer-hint span {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 装饰麦穗 */
        .wheat-decoration {
            position: fixed;
            font-size: 40px;
            opacity: 0.15;
            z-index: 1;
            animation: floatDecor 8s ease-in-out infinite;
        }

        @keyframes floatDecor {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* 拖拽提示 */
        .drag-indicator {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            z-index: 100;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .drag-indicator span:first-child {
            font-size: 18px;
            animation: swipe 1.5s ease-in-out infinite;
        }

        @keyframes swipe {
            0%, 100% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
        }

        .drag-indicator span:last-child {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* 麦穗光线 */
        .wheat-ray {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
        }

        .wheat-ray::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 215, 0, 0.1), transparent, rgba(144, 238, 144, 0.1), transparent);
            transform: translate(-50%, -50%);
            animation: rotateRay 20s linear infinite;
        }

        @keyframes rotateRay {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 返回按钮 -->
    <div class="back-btn" onclick="goBack()">
        <span>←</span>
    </div>

    <!-- 顶部标题 -->
    <div class="header">
        <h1>🌾 农大闲置 🌾</h1>
        <p>探索校园闲置 · 开启绿色循环</p>
    </div>

    <!-- 粒子背景 -->
    <div class="particles" id="particles"></div>

    <!-- 麦穗光线 -->
    <div class="wheat-ray"></div>

    <!-- 装饰麦穗 -->
    <div class="wheat-decoration" style="top: 15%; left: 10%;">🌾</div>
    <div class="wheat-decoration" style="top: 20%; right: 8%; animation-delay: -2s;">🌾</div>
    <div class="wheat-decoration" style="bottom: 25%; left: 5%; animation-delay: -4s;">🌾</div>
    <div class="wheat-decoration" style="bottom: 20%; right: 12%; animation-delay: -6s;">🌾</div>

    <!-- 中心麦穗 -->
    <div class="center-wheat">
        <div class="wheat-icon">🌾</div>
        <div class="center-text">DRAG TO EXPLORE</div>
    </div>

    <!-- 模块容器 -->
    <div class="modules-container" id="modulesContainer">
        <div class="scene-stage" id="sceneStage"></div>
    </div>

    <!-- 拖拽提示 -->
    <div class="drag-indicator">
        <span>👆</span>
        <span>拖拽探索更多功能</span>
    </div>

    <!-- 底部提示 -->
    <div class="footer-hint">
        <span>点击卡片进入功能 · 拖拽浏览全部</span>
    </div>

    <script>
        // 模块数据
        const modules = [
            {
                id: 'release',
                icon: '📦',
                name: '发布闲置',
                desc: '发布你的物品',
                color: '#ffd93d',
                link: 'release_goods.html'
            },
            {
                id: 'donation',
                icon: '💝',
                name: '公益转赠',
                desc: '传递爱心',
                color: '#ff9ff3',
                link: 'donation_publish.html'
            },
            {
                id: 'demand',
                icon: '🔍',
                name: '需求广场',
                desc: '寻找物品',
                color: '#54a0ff',
                link: 'demand_board.html'
            },
            {
                id: 'carbon',
                icon: '🌱',
                name: '碳足迹',
                desc: '绿色生活',
                color: '#6bcb77',
                link: 'carbon.html'
            },
            {
                id: 'user',
                icon: '👤',
                name: '个人中心',
                desc: '管理信息',
                color: '#a29bfe',
                link: 'user_center.html'
            }
        ];

        // 状态变量
        let isDragging = false;
        let startX = 0, startY = 0;
        let currentOffsetX = 0, currentOffsetY = 0;
        let targetOffsetX = 0, targetOffsetY = 0;
        let velocityX = 0, velocityY = 0;
        let moduleElements = [];
        let containerCenterX = window.innerWidth / 2;
        let containerCenterY = window.innerHeight / 2;
        
        // 3D 旋转状态
        let currentRotX = 0, currentRotY = 0;
        let targetRotX = 0, targetRotY = 0;
        const maxRotX = 15, maxRotY = 20;

        // 初始化
        function init() {
            createParticles();
            createModules();
            updateContainerCenter();
            animate();
            
            // 事件监听
            window.addEventListener('resize', updateContainerCenter);
        }

        // 创建粒子
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 100; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = -Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particle.style.opacity = 0.2 + Math.random() * 0.4;
                container.appendChild(particle);
            }
        }

        // 创建模块
        function createModules() {
            const container = document.getElementById('sceneStage');
            
            // 环形排列 - 使用 3D 球面分布
            const radius = Math.min(window.innerWidth, window.innerHeight) * 0.32;
            const angleStep = (Math.PI * 2) / modules.length;
            const startAngle = -Math.PI / 2; // 从顶部开始
            const sphereRadius = radius * 0.6; // 球面深度

            modules.forEach((module, index) => {
                const angle = startAngle + angleStep * index;
                const sphereAngle = angle;
                
                // 计算 3D 位置
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                const z = Math.sin(sphereAngle) * sphereRadius; // 3D 深度
                
                // 计算旋转角度（用于 3D 效果）
                const rotateY = -angle * (180 / Math.PI); // 绕 Y 轴旋转
                const rotateX = Math.sin(sphereAngle) * 15; // 上下有轻微倾斜

                const node = document.createElement('div');
                node.className = 'module-node';
                node.dataset.index = index;
                node.style.transform = `translate(-50%, -50%) translateX(${x}px) translateY(${y}px) translateZ(${z}px) rotateY(${rotateY}deg) rotateX(${rotateX}deg)`;
                node.style.borderColor = module.color + '40';

                node.innerHTML = `
                    <div class="icon">${module.icon}</div>
                    <div class="name">${module.name}</div>
                    <div class="desc">${module.desc}</div>
                    <button class="enter-btn" onclick="enterModule('${module.link}', event)">进入 →</button>
                `;

                node.addEventListener('mouseenter', () => setActive(index));
                node.addEventListener('mouseleave', () => clearActive());
                node.addEventListener('click', (e) => {
                    e.stopPropagation();
                    enterModule(module.link, e);
                });

                container.appendChild(node);
                moduleElements.push({
                    element: node,
                    baseX: x,
                    baseY: y,
                    baseZ: z,
                    angle: angle,
                    radius: radius,
                    rotateY: rotateY,
                    rotateX: rotateX
                });
            });
        }

        // 更新容器中心
        function updateContainerCenter() {
            containerCenterX = window.innerWidth / 2;
            containerCenterY = window.innerHeight / 2;
        }

        // 设置激活状态
        function setActive(index) {
            moduleElements.forEach((m, i) => {
                m.element.classList.toggle('active', i === index);
            });
        }

        // 清除激活状态
        function clearActive() {
            moduleElements.forEach(m => {
                m.element.classList.remove('active');
            });
        }

        // 进入模块
        function enterModule(link, event) {
            if (event) {
                event.stopPropagation();
            }
            // 跳转
            window.location.href = link;
        }

        // 返回
        function goBack() {
            window.location.href = 'starfield.html';
        }

        // 鼠标/触摸事件
        const moduleContainer = document.getElementById('modulesContainer');

        moduleContainer.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            velocityX = 0;
            velocityY = 0;
        });

        moduleContainer.addEventListener('mousemove', (e) => {
            // 3D 旋转跟随
            if (!isDragging) {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                targetRotY = ((e.clientX - centerX) / centerX) * maxRotY;
                targetRotX = ((e.clientY - centerY) / centerY) * maxRotX;
            }
            
            if (!isDragging) return;
            
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;
            
            velocityX = deltaX * 0.1;
            velocityY = deltaY * 0.1;
            
            targetOffsetX += deltaX * 0.3;
            targetOffsetY += deltaY * 0.3;
            
            // 限制拖拽范围
            const maxOffset = 300;
            targetOffsetX = Math.max(-maxOffset, Math.min(maxOffset, targetOffsetX));
            targetOffsetY = Math.max(-maxOffset, Math.min(maxOffset, targetOffsetY));
            
            startX = e.clientX;
            startY = e.clientY;
        });

        moduleContainer.addEventListener('mouseup', () => {
            isDragging = false;
            // 惯性
            animateInertia();
        });

        moduleContainer.addEventListener('mouseleave', () => {
            if (isDragging) {
                isDragging = false;
                animateInertia();
            }
            // 鼠标离开时回归中心
            targetRotX = 0;
            targetRotY = 0;
        });

        // 触摸事件
        moduleContainer.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            velocityX = 0;
            velocityY = 0;
        });

        moduleContainer.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            
            const deltaX = e.touches[0].clientX - startX;
            const deltaY = e.touches[0].clientY - startY;
            
            velocityX = deltaX * 0.1;
            velocityY = deltaY * 0.1;
            
            targetOffsetX += deltaX * 0.3;
            targetOffsetY += deltaY * 0.3;
            
            const maxOffset = 300;
            targetOffsetX = Math.max(-maxOffset, Math.min(maxOffset, targetOffsetX));
            targetOffsetY = Math.max(-maxOffset, Math.min(maxOffset, targetOffsetY));
            
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        moduleContainer.addEventListener('touchend', () => {
            isDragging = false;
            animateInertia();
        });

        // 惯性动画
        function animateInertia() {
            const friction = 0.95;
            const minVelocity = 0.5;
            
            function step() {
                if (Math.abs(velocityX) < minVelocity && Math.abs(velocityY) < minVelocity) return;
                
                velocityX *= friction;
                velocityY *= friction;
                
                targetOffsetX += velocityX;
                targetOffsetY += velocityY;
                
                const maxOffset = 300;
                targetOffsetX = Math.max(-maxOffset, Math.min(maxOffset, targetOffsetX));
                targetOffsetY = Math.max(-maxOffset, Math.min(maxOffset, targetOffsetY));
                
                requestAnimationFrame(step);
            }
            
            step();
        }

        // 主动画循环
        function animate() {
            // 平滑跟随
            currentOffsetX += (targetOffsetX - currentOffsetX) * 0.1;
            currentOffsetY += (targetOffsetY - currentOffsetY) * 0.1;
            
            // 3D 旋转平滑跟随
            currentRotX += (targetRotX - currentRotX) * 0.08;
            currentRotY += (targetRotY - currentRotY) * 0.08;

            // 更新舞台 3D 变换
            const stage = document.getElementById('sceneStage');
            stage.style.transform = `rotateX(${-currentRotX}deg) rotateY(${currentRotY}deg)`;

            // 更新模块位置
            moduleElements.forEach((m, index) => {
                const wobble = Math.sin(Date.now() * 0.001 + index) * 5;
                const x = m.baseX + currentOffsetX + wobble * Math.cos(m.angle);
                const y = m.baseY + currentOffsetY + wobble * Math.sin(m.angle) * 0.3;
                const z = m.baseZ; // 保持原有 Z 深度
                
                // 添加旋转影响
                const rotX = m.rotateX + currentRotX * 0.5;
                const rotY = m.rotateY + currentRotY;
                
                m.element.style.transform = `translate(-50%, -50%) translateX(${x}px) translateY(${y}px) translateZ(${z}px) rotateY(${rotY}deg) rotateX(${rotX}deg)`;
            });

            requestAnimationFrame(animate);
        }

        // 启动
        init();
    </script>
</body>
</html>
