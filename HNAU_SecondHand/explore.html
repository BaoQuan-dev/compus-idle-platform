<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>探索 - 农大闲置</title>
    <link rel="stylesheet" href="script/common.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0a12;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* 星空背景 */
        .star-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 粒子效果 */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-30px) rotate(180deg); opacity: 0.8; }
        }

        /* 顶部标题 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #f5d742, #f5a623, #f5d742);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 3s ease infinite;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header .subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-top: 8px;
            letter-spacing: 3px;
        }

        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 101;
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.1);
        }

        .back-btn svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
        }

        /* 拖拽提示 */
        .drag-hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .drag-hint svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        /* 主场景容器 - 只占屏幕上半部分 */
        .scene-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 300px);
            min-height: 350px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        /* 中心麦穗容器 */
        .center-wheat-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 光环效果 */
        .wheat-glow {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(245, 215, 66, 0.15) 0%, transparent 70%);
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        /* 旋转光环 */
        .wheat-ring {
            position: absolute;
            width: 380px;
            height: 380px;
            border: 2px dashed rgba(245, 215, 66, 0.2);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }

        .wheat-ring:nth-child(2) {
            width: 420px;
            height: 420px;
            border-color: rgba(107, 203, 119, 0.15);
            animation-duration: 30s;
            animation-direction: reverse;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 中心麦穗 */
        .center-wheat {
            font-size: 140px;
            animation: wheatSway 4s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.3s;
            text-shadow: 0 0 80px rgba(245, 215, 66, 0.6);
            z-index: 10;
        }

        .center-wheat:hover {
            transform: scale(1.1);
        }

        @keyframes wheatSway {
            0%, 100% { transform: rotate(-8deg) scale(1); }
            25% { transform: rotate(5deg) scale(1.02); }
            50% { transform: rotate(8deg) scale(1); }
            75% { transform: rotate(-5deg) scale(1.02); }
        }

        /* 中心文字 */
        .center-text {
            position: absolute;
            bottom: -60px;
            text-align: center;
        }

        .center-text h2 {
            font-size: 24px;
            font-weight: 700;
            color: #f5d742;
            text-shadow: 0 0 20px rgba(245, 215, 66, 0.5);
        }

        .center-text p {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 5px;
            letter-spacing: 2px;
        }

        /* 模块环绕容器 */
        .rings-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* 环形模块 */
        .ring-module {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            opacity: 0.7;
        }

        .ring-module:hover {
            opacity: 1;
            transform: scale(1.15) !important;
            border-color: var(--module-color);
            box-shadow: 0 0 40px rgba(var(--module-color-rgb), 0.4);
        }

        .ring-module .icon {
            font-size: 36px;
            margin-bottom: 6px;
        }

        .ring-module .label {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            text-align: center;
        }

        /* 底部轮播卡片 */
        /* 轮播展示区域 */
        .carousel-section {
            position: relative;
            width: 100%;
            min-height: 380px;
            z-index: 20;
            padding: 20px;
            background: linear-gradient(to top, rgba(10, 10, 18, 0.98) 0%, rgba(10, 10, 18, 0.9) 100%);
        }

        .carousel-wrapper {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
        }

        .carousel-track {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 15px 5px;
        }

        .carousel-track::-webkit-scrollbar {
            display: none;
        }

        /* 轮播卡片 */
        .slide-card {
            flex-shrink: 0;
            width: 280px;
            height: 200px;
            scroll-snap-align: center;
            background: rgba(25, 25, 45, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .slide-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--card-color);
        }

        .slide-card:hover {
            transform: translateY(-5px);
            border-color: var(--card-color);
            box-shadow: 0 15px 40px rgba(var(--card-color-rgb), 0.3);
        }

        .slide-card .card-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .slide-card .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .slide-card .card-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            line-height: 1.5;
        }

        .slide-card .card-arrow {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 36px;
            height: 36px;
            background: var(--card-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s;
        }

        .slide-card:hover .card-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .slide-card .card-arrow svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        /* 轮播指示器 */
        .indicators {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s;
        }

        .indicator.active {
            width: 28px;
            background: #f5d742;
        }

        /* 箭头按钮 */
        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10;
        }

        .carousel-arrow:hover {
            background: rgba(255,255,255,0.2);
        }

        .carousel-arrow svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
        }

        .carousel-arrow.prev { left: -22px; }
        .carousel-arrow.next { right: -22px; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .center-wheat {
                font-size: 100px;
            }

            .wheat-glow {
                width: 250px;
                height: 250px;
            }

            .wheat-ring {
                width: 280px;
                height: 280px;
            }

            .wheat-ring:nth-child(2) {
                width: 320px;
                height: 320px;
            }

            .ring-module {
                width: 80px;
                height: 80px;
            }

            .ring-module .icon {
                font-size: 28px;
            }

            .ring-module .label {
                font-size: 10px;
            }

            .carousel-arrow {
                display: none;
            }

            .slide-card {
                width: 240px;
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="star-bg" id="starBg"></div>

    <!-- 顶部标题 -->
    <div class="header">
        <h1>🌾 农大闲置 🌾</h1>
        <div class="subtitle">探索校园闲置 · 开启绿色循环</div>
    </div>

    <!-- 返回按钮 -->
    <a href="starfield.html" class="back-btn">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </a>

    <!-- 主场景：中心麦穗 -->
    <div class="scene-container" id="scene">
        <div class="center-wheat-container">
            <!-- 光环效果 -->
            <div class="wheat-glow"></div>
            <div class="wheat-ring"></div>
            <div class="wheat-ring"></div>
            
            <!-- 中心麦穗 -->
            <div class="center-wheat" id="wheat">🌾</div>
            
            <!-- 中心文字 -->
            <div class="center-text">
                <h2>农大闲置</h2>
                <p>DRAG TO EXPLORE</p>
            </div>
        </div>
    </div>

    <!-- 环形模块 -->
    <div class="rings-container" id="ringsContainer"></div>

    <!-- 拖拽提示 -->
    <div class="drag-hint">
        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        左右滑动查看更多
    </div>

    <!-- 底部轮播 -->
    <div class="carousel-section">
        <div class="carousel-wrapper">
            <div class="carousel-track" id="carouselTrack">
                <!-- 发布闲置 -->
                <div class="slide-card" style="--card-color: #ffd93d; --card-color-rgb: 255, 217, 61;" onclick="goTo('release_goods.html')">
                    <div class="card-icon">📦</div>
                    <div class="card-title">发布闲置</div>
                    <div class="card-desc">闲置好物快速发布，分类精准匹配</div>
                    <div class="card-arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
                </div>

                <!-- 公益转赠 -->
                <div class="slide-card" style="--card-color: #ff9ff3; --card-color-rgb: 255, 159, 243;" onclick="goTo('donation_publish.html')">
                    <div class="card-icon">💝</div>
                    <div class="card-title">公益转赠</div>
                    <div class="card-desc">传递爱心，让闲置物品重获新生</div>
                    <div class="card-arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
                </div>

                <!-- 需求广场 -->
                <div class="slide-card" style="--card-color: #54a0ff; --card-color-rgb: 84, 160, 255;" onclick="goTo('demand_board.html')">
                    <div class="card-icon">🔍</div>
                    <div class="card-title">需求广场</div>
                    <div class="card-desc">发布需求快速匹配，找到所需</div>
                    <div class="card-arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
                </div>

                <!-- 碳足迹 -->
                <div class="slide-card" style="--card-color: #6bcb77; --card-color-rgb: 107, 203, 119;" onclick="goTo('carbon.html')">
                    <div class="card-icon">🌱</div>
                    <div class="card-title">碳足迹</div>
                    <div class="card-desc">记录绿色生活，共建低碳校园</div>
                    <div class="card-arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
                </div>

                <!-- 个人中心 -->
                <div class="slide-card" style="--card-color: #a29bfe; --card-color-rgb: 162, 155, 254;" onclick="goTo('user_center.html')">
                    <div class="card-icon">👤</div>
                    <div class="card-title">个人中心</div>
                    <div class="card-desc">管理信息，查看数据，便捷操作</div>
                    <div class="card-arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
                </div>
            </div>

            <!-- 箭头按钮 -->
            <div class="carousel-arrow prev" onclick="scrollCarousel(-1)">
                <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            </div>
            <div class="carousel-arrow next" onclick="scrollCarousel(1)">
                <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
            </div>

            <!-- 指示器 -->
            <div class="indicators" id="indicators"></div>
        </div>
    </div>

    <script>
        // 星空背景
        function createStars() {
            const bg = document.getElementById('starBg');
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = Math.random() * 3 + 1 + 'px';
                star.style.animationDelay = Math.random() * 2 + 's';
                bg.appendChild(star);
            }

            // 添加金色粒子
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.width = particle.style.height = Math.random() * 8 + 4 + 'px';
                particle.style.background = `rgba(245, 215, 66, ${Math.random() * 0.3 + 0.1})`;
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.animationDuration = Math.random() * 5 + 6 + 's';
                bg.appendChild(particle);
            }
        }
        createStars();

        // 环形模块配置
        const ringModules = [
            { icon: '📦', label: '发布闲置', color: '#ffd93d', colorRgb: '255, 217, 61', page: 'release_goods.html', angle: -90, distance: 220 },
            { icon: '💝', label: '公益转赠', color: '#ff9ff3', colorRgb: '255, 159, 243', page: 'donation_publish.html', angle: -18, distance: 220 },
            { icon: '🔍', label: '需求广场', color: '#54a0ff', colorRgb: '84, 160, 255', page: 'demand_board.html', angle: 54, distance: 220 },
            { icon: '🌱', label: '碳足迹', color: '#6bcb77', colorRgb: '107, 203, 119', page: 'carbon.html', angle: 126, distance: 220 },
            { icon: '👤', label: '个人中心', color: '#a29bfe', colorRgb: '162, 155, 254', page: 'user_center.html', angle: 198, distance: 220 }
        ];

        // 创建环形模块
        function createRingModules() {
            const container = document.getElementById('ringsContainer');
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            ringModules.forEach((mod, i) => {
                const module = document.createElement('div');
                module.className = 'ring-module';
                module.style.setProperty('--module-color', mod.color);
                module.style.setProperty('--module-color-rgb', mod.colorRgb);

                const radian = mod.angle * Math.PI / 180;
                const x = centerX + Math.cos(radian) * mod.distance - 50;
                const y = centerY + Math.sin(radian) * mod.distance * 0.6 - 50;

                module.style.left = x + 'px';
                module.style.top = y + 'px';

                module.innerHTML = `
                    <span class="icon">${mod.icon}</span>
                    <span class="label">${mod.label}</span>
                `;

                module.addEventListener('click', () => goTo(mod.page));
                container.appendChild(module);
            });
        }
        createRingModules();

        // 窗口大小变化时重新定位
        window.addEventListener('resize', () => {
            document.getElementById('ringsContainer').innerHTML = '';
            createRingModules();
        });

        // 鼠标跟随效果
        const scene = document.getElementById('scene');
        const wheat = document.getElementById('wheat');
        const ringsContainer = document.getElementById('ringsContainer');

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            wheat.style.transform = `translate(${x}px, ${y}px) rotate(${x}deg)`;
            
            const modules = ringsContainer.querySelectorAll('.ring-module');
            modules.forEach((mod, i) => {
                const factor = (i % 2 === 0 ? 1 : 0.5);
                mod.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
            });
        });

        // 麦穗点击效果
        wheat.addEventListener('click', () => {
            wheat.style.animation = 'none';
            wheat.style.transform = 'scale(1.3)';
            setTimeout(() => {
                wheat.style.transform = '';
                wheat.style.animation = 'wheatSway 4s ease-in-out infinite';
            }, 300);
        });

        // 轮播逻辑
        const track = document.getElementById('carouselTrack');
        const cards = track.querySelectorAll('.slide-card');
        const indicatorsContainer = document.getElementById('indicators');

        // 创建指示器
        cards.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'indicator' + (i === 0 ? ' active' : '');
            dot.addEventListener('click', () => scrollToCard(i));
            indicatorsContainer.appendChild(dot);
        });

        function scrollCarousel(direction) {
            const cardWidth = 280;
            track.scrollBy({ left: cardWidth * direction, behavior: 'smooth' });
        }

        function scrollToCard(index) {
            const cardWidth = 280;
            track.scrollTo({ left: cardWidth * index, behavior: 'smooth' });
        }

        // 更新指示器
        track.addEventListener('scroll', () => {
            const cardWidth = 280;
            const index = Math.round(track.scrollLeft / cardWidth);
            document.querySelectorAll('.indicator').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        });

        // 触摸滑动
        let startX = 0;
        track.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
        });

        track.addEventListener('touchend', (e) => {
            const endX = e.changedTouches[0].clientX;
            const diff = startX - endX;
            if (Math.abs(diff) > 50) {
                scrollCarousel(diff > 0 ? 1 : -1);
            }
        });

        // 跳转到页面
        function goTo(page) {
            window.location.href = page;
        }
    </script>
</body>
</html>
