<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 农大闲置</title>
    <link rel="stylesheet" href="./style/main.css">
    <style>
        /* ========== 星空背景 ========== */
        body { position: relative; }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: url('./images/bg-starry.jpg') center center / cover no-repeat;
        }
        
        /* ========== 页面头部 ========== */
        .page-header {
            padding: 60px 20px 0;
            text-align: left;
            max-width: 900px;
            margin: 0 auto;
        }
        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #fff 0%, #60A5FA 50%, #C084FC 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .page-header p {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin: 0;
        }
        
        /* ========== 内容区 ========== */
        .page-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 16px 100px;
        }
        
        /* ========== 玻璃拟态卡片 ========== */
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        
        /* 用户信息卡片 */
        .user-info-card {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .user-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #60A5FA, #C084FC);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .user-details {
            flex: 1;
        }
        .user-name {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }
        .user-id {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }
        .user-badge {
            padding: 4px 12px;
            background: linear-gradient(135deg, rgba(96,165,250,0.3), rgba(192,132,252,0.3));
            border: 1px solid rgba(96,165,250,0.5);
            border-radius: 20px;
            font-size: 12px;
            color: #fff;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .stat-card {
            padding: 16px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        
        /* 功能菜单 */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .menu-item {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .menu-item:hover {
            background: rgba(96,165,250,0.1);
            border-color: rgba(96,165,250,0.3);
        }
        .menu-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(96,165,250,0.3), rgba(192,132,252,0.3));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .menu-text {
            flex: 1;
        }
        .menu-title {
            font-size: 15px;
            font-weight: 500;
            color: #fff;
        }
        .menu-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        .menu-arrow {
            color: rgba(255,255,255,0.3);
            font-size: 18px;
        }
        
        /* ========== 碳足迹模块 ========== */
        .carbon-section {
            margin-top: 20px;
            padding: 20px;
        }
        .carbon-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .carbon-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        .carbon-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(96,165,250,0.5), rgba(59,130,246,0.5));
            border: 1px solid rgba(96,165,250,0.5);
            border-radius: 20px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .carbon-btn:hover {
            background: linear-gradient(135deg, rgba(96,165,250,0.7), rgba(59,130,246,0.7));
        }
        .carbon-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .carbon-stat {
            padding: 16px;
            text-align: center;
        }
        .carbon-stat-value {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }
        .carbon-stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <!-- 页面头部 -->
    <div class="page-header">
        <h1>👤 个人中心</h1>
        <p>管理您的信息和发布</p>
    </div>
    
    <!-- 主内容 -->
    <div class="page-container">
        <!-- 用户信息 -->
        <div class="user-info-card glass-card">
            <div class="user-avatar">👤</div>
            <div class="user-details">
                <div class="user-name" id="userName">农大学子</div>
                <div class="user-id">ID: 20240001</div>
            </div>
            <div class="user-badge">🌟 环保达人</div>
        </div>
        
        <!-- 统计数据 -->
        <div class="stats-grid">
            <div class="stat-card glass-card">
                <div class="stat-value" id="statPublish">0</div>
                <div class="stat-label">发布闲置</div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-value" id="statSold">0</div>
                <div class="stat-label">已售出</div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-value" id="statViews">0</div>
                <div class="stat-label">被浏览</div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-value" id="statStars">0</div>
                <div class="stat-label">收藏数</div>
            </div>
        </div>
        
        <!-- 功能菜单 -->
        <div class="glass-card menu-list">
            <div class="menu-item" onclick="location.href='stu_check.html'">
                <div class="menu-icon">🎓</div>
                <div class="menu-text">
                    <div class="menu-title">校园认证</div>
                    <div class="menu-desc">完成认证，解锁更多功能</div>
                </div>
                <span class="menu-arrow">›</span>
            </div>
            <div class="menu-item" onclick="location.href='release_goods.html'">
                <div class="menu-icon">📦</div>
                <div class="menu-text">
                    <div class="menu-title">发布闲置</div>
                    <div class="menu-desc">分享你的闲置物品</div>
                </div>
                <span class="menu-arrow">›</span>
            </div>
            <div class="menu-item" onclick="location.href='donation_my.html'">
                <div class="menu-icon">🎁</div>
                <div class="menu-text">
                    <div class="menu-title">我的公益</div>
                    <div class="menu-desc">追踪你的爱心足迹</div>
                </div>
                <span class="menu-arrow">›</span>
            </div>
            <div class="menu-item" onclick="location.href='carbon_ai.html'">
                <div class="menu-icon">🌱</div>
                <div class="menu-text">
                    <div class="menu-title">碳足迹助手</div>
                    <div class="menu-desc">智能分析你的环保贡献</div>
                </div>
                <span class="menu-arrow">›</span>
            </div>
            <div class="menu-item" onclick="location.href='user_login.html'">
                <div class="menu-icon">🚪</div>
                <div class="menu-text">
                    <div class="menu-title">退出登录</div>
                    <div class="menu-desc">切换账号或退出当前账号</div>
                </div>
                <span class="menu-arrow">›</span>
            </div>
        </div>
        
        <!-- 碳足迹预览 -->
        <div class="carbon-section glass-card">
            <div class="carbon-header">
                <div class="carbon-title">🌱 我的碳足迹</div>
                <button class="carbon-btn" onclick="location.href='carbon_ai.html'">查看详情</button>
            </div>
            <div class="carbon-stats">
                <div class="carbon-stat">
                    <div class="carbon-stat-value" id="carbonTotal">0</div>
                    <div class="carbon-stat-label">累计减碳(kg)</div>
                </div>
                <div class="carbon-stat">
                    <div class="carbon-stat-value" id="carbonPoints">0</div>
                    <div class="carbon-stat-label">碳积分</div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="./script/common.js"></script>
    <script>
        // 模拟数据
        document.getElementById('statPublish').textContent = '12';
        document.getElementById('statSold').textContent = '8';
        document.getElementById('statViews').textContent = '1.2k';
        document.getElementById('statStars').textContent = '23';
        document.getElementById('carbonTotal').textContent = '45.6';
        document.getElementById('carbonPoints').textContent = '560';
    </script>
</body>
</html>
