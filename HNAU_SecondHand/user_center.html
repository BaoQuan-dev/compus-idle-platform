<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 农大闲置</title>
    <link rel="stylesheet" href="./style/main.css">
    <style>
        /* ========== 星空背景 ========== */
        body { position: relative; }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: url('./images/bg-starry.jpg') center center / cover no-repeat;
        }
        
        /* ========== 个人中心 - 星空玻璃拟态风格 ========== */
        
        .center-header {
            padding: 60px 20px 0;
            text-align: left;
        }
        
        .center-header h1 { 
            margin: 0 0 6px 0; 
            font-size: 26px; 
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #60A5FA 50%, #C084FC 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .center-header p { 
            margin: 0; 
            color: rgba(255,255,255,0.6); 
            font-size: 13px; 
        }
        
        .center-container {
            max-width: 700px;
            margin: 20px auto;
            padding: 0 16px 100px;
        }
        
        /* 返回按钮 - 玻璃拟态风格 */
        .ai-back-btn {
            position: fixed;
            top: 20px;
            left: 16px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 10px 16px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 100;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .ai-back-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(96,165,250,0.3);
        }
        
        /* 用户信息卡片 */
        .user-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        
        .user-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #60A5FA, #C084FC);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: 3px solid rgba(255,255,255,0.2);
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin: 0 0 4px 0;
        }
        
        .user-id {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin: 0;
        }
        
        .user-badge {
            background: linear-gradient(135deg, #60A5FA, #3B82F6);
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(96,165,250,0.2) 0%, rgba(192,132,252,0.15) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px 12px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #60A5FA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 4px 0;
        }
        
        .stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin: 0;
        }
        
        /* 功能菜单 */
        .menu-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            margin-top: 16px;
            overflow: hidden;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .menu-item:last-child {
            border-bottom: none;
        }
        
        .menu-item:hover {
            background: rgba(96,165,250,0.1);
        }
        
        .menu-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(96,165,250,0.3), rgba(192,132,252,0.3));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 14px;
        }
        
        .menu-text {
            flex: 1;
        }
        
        .menu-title {
            font-size: 15px;
            color: #fff;
            margin: 0 0 2px 0;
            font-weight: 500;
        }
        
        .menu-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin: 0;
        }
        
        .menu-arrow {
            color: rgba(255,255,255,0.3);
            font-size: 18px;
        }
        
        .menu-item.logout {
            color: #f87171;
        }
        
        .menu-item.logout .menu-title {
            color: #f87171;
        }
        
        /* 我的发布列表 */
        .my-publications-section {
            margin-top: 20px;
        }
        
        .section-title {
            color: #fff;
            font-size: 18px;
            margin-bottom: 16px;
            padding-left: 4px;
        }
        
        .publication-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .publication-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .publication-type {
            color: #fff;
            font-size: 15px;
            font-weight: 600;
        }
        
        .publication-count {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
        }
        
        .publication-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .empty-tip {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            text-align: center;
            padding: 20px 0;
        }
        
        .publication-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            transition: background 0.2s;
        }
        
        .publication-item:hover {
            background: rgba(255,255,255,0.12);
        }
        
        .item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .item-title {
            color: #fff;
            font-size: 14px;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .item-price {
            color: #60A5FA;
            font-size: 13px;
            font-weight: 600;
        }
        
        .item-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            background: rgba(16,185,129,0.2);
            color: #10B981;
        }
        
        .item-status.sold {
            background: rgba(107,114,128,0.2);
            color: #9CA3AF;
        }
        
        .item-status.reserved {
            background: rgba(251,191,36,0.2);
            color: #FBBF24;
        }
        
        .item-status.deleted {
            background: rgba(239,68,68,0.2);
            color: #EF4444;
        }
        
        /* 响应式 */
        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        /* 修改信息表单 */
        .edit-form-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 24px;
            margin-top: 16px;
        }
        
        .edit-form-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin: 0 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 6px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #60A5FA;
            background: rgba(255,255,255,0.12);
        }
        
        .form-input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .form-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #60A5FA, #3B82F6);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        
        .form-btn:hover {
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(96,165,250,0.4);
        }
        
        .form-btn:active {
            transform: translateY(0);
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(135deg, #10B981, #059669);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(16,185,129,0.4);
            z-index: 10000;
            transition: transform 0.3s ease;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.error {
            background: linear-gradient(135deg, #EF4444, #DC2626);
            box-shadow: 0 4px 20px rgba(239,68,68,0.4);
        }
        
        .edit-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }
        
        .edit-btn-secondary {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .edit-btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <!-- 返回按钮 -->
    <a href="explore.html" class="ai-back-btn">← 返回</a>
    
    <!-- 顶部标题 -->
    <div class="center-header">
        <h1>👤 个人中心</h1>
        <p>管理您的信息和发布</p>
    </div>
    
    <!-- 主内容 -->
    <div class="center-container">
        <!-- 用户信息卡片 -->
        <div class="user-card">
            <div class="user-avatar" id="userAvatar">🎓</div>
            <div class="user-info">
                <h2 class="user-name" id="userName">加载中...</h2>
                <p class="user-id" id="userId">ID: -</p>
            </div>
            <div class="user-badge" id="userBadge">未认证</div>
        </div>
        
        <!-- 统计卡片 - 真实数据 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="statPublished">0</div>
                <div class="stat-label">发布闲置</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statSold">0</div>
                <div class="stat-label">已售出</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statViews">0</div>
                <div class="stat-label">被浏览</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statDemands">0</div>
                <div class="stat-label">发布需求</div>
            </div>
        </div>
        
        <!-- 我的发布列表 -->
        <div class="my-publications-section">
            <h3 class="section-title">📦 我的发布</h3>
            
            <!-- 发布闲置列表 -->
            <div class="publication-card">
                <div class="publication-header">
                    <span class="publication-type">🛍️ 发布闲置</span>
                    <span class="publication-count" id="publishedCount">0 件商品</span>
                </div>
                <div class="publication-list" id="myGoodsList">
                    <div class="empty-tip">暂无发布的闲置物品</div>
                </div>
            </div>
            
            <!-- 发布需求列表 -->
            <div class="publication-card">
                <div class="publication-header">
                    <span class="publication-type">📋 发布需求</span>
                    <span class="publication-count" id="demandsCount">0 条需求</span>
                </div>
                <div class="publication-list" id="myDemandsList">
                    <div class="empty-tip">暂无发布的需求</div>
                </div>
            </div>
        </div>
        
        <!-- 功能菜单 - 只保留退出登录 -->
        <div class="menu-card">
            <div class="menu-item logout" onclick="logout()">
                <div class="menu-icon">🚪</div>
                <div class="menu-text">
                    <p class="menu-title">退出登录</p>
                    <p class="menu-desc">切换账号或退出</p>
                </div>
                <span class="menu-arrow">›</span>
            </div>
        </div>
        
        <!-- 修改信息表单 -->
        <div class="edit-form-card">
            <h3 class="edit-form-title">✏️ 修改个人信息</h3>
            <form id="editForm" onsubmit="return saveProfile(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">昵称</label>
                        <input type="text" class="form-input" id="editNickname" placeholder="请输入昵称" maxlength="20">
                    </div>
                    <div class="form-group">
                        <label class="form-label">学校</label>
                        <input type="text" class="form-input" id="editSchool" placeholder="请输入学校" maxlength="50">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">联系方式</label>
                    <input type="text" class="form-input" id="editContact" placeholder="请输入手机号或微信号" maxlength="30">
                </div>
                <div class="form-group">
                    <label class="form-label">个人简介</label>
                    <input type="text" class="form-input" id="editBio" placeholder="介绍一下自己..." maxlength="100">
                </div>
                <button type="submit" class="form-btn">💾 保存修改</button>
            </form>
        </div>
    </div>
    
    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>
    
    <!-- 引入公共JS -->
    <script src="./script/common.js"></script>
    <script>
        // 显示提示
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
        
        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('authToken');
                location.href = 'user_login.html';
            }
        }
        
        // 加载用户数据 - 使用 Auth 类获取
        function loadUserData() {
            // 使用 Auth.getCurrentUser() 获取用户数据
            const currentUser = Auth.getCurrentUser();
            
            // 如果用户未登录，显示空数据
            if (!currentUser) {
                console.log('用户未登录或数据异常');
                return;
            }
            
            // 同步更新基本信息显示
            document.getElementById('userName').textContent = currentUser.username || '未设置昵称';
            document.getElementById('userId').textContent = 'ID: ' + (currentUser.id || '-');
            
            // 校园认证状态
            const authStatusMap = {
                'verified': { text: '已认证', class: 'verified' },
                'approved': { text: '已认证', class: 'verified' },
                'pending': { text: '审核中', class: 'pending' },
                'rejected': { text: '已拒绝', class: 'rejected' },
                'unsubmitted': { text: '未认证', class: 'unverified' }
            };
            const authStatus = currentUser.authStatus || 'unsubmitted';
            const authInfo = authStatusMap[authStatus] || authStatusMap['unsubmitted'];
            const userBadge = document.getElementById('userBadge');
            userBadge.textContent = authInfo.text;
            userBadge.className = 'user-badge ' + authInfo.class;
            
            // 同步更新修改表单 - 基本信息与表单一致
            const editNickname = document.getElementById('editNickname');
            const editSchool = document.getElementById('editSchool');
            const editContact = document.getElementById('editContact');
            const editBio = document.getElementById('editBio');
            
            if (editNickname) editNickname.value = currentUser.username || '';
            if (editSchool) editSchool.value = currentUser.campus || currentUser.school || '';
            if (editContact) editContact.value = currentUser.contact || currentUser.phone || '';
            if (editBio) editBio.value = currentUser.bio || currentUser.intro || '';
            
            // 填充表单 - 基本信息与表单同步
            document.getElementById('editNickname').value = currentUser.username || '';
            document.getElementById('editSchool').value = currentUser.campus || currentUser.school || '';
            document.getElementById('editContact').value = currentUser.contact || currentUser.phone || '';
            document.getElementById('editBio').value = currentUser.bio || currentUser.intro || '';
            
            // 加载统计数据 - 使用 username 匹配
            loadStats(currentUser.username);
            
            // 加载我的发布列表 - 使用 username 匹配
            loadMyPublications(currentUser.username);
        }
        
        // 加载统计真实数据 - 兼容多种用户ID格式
        function loadStats(userId) {
            // 确保 userId 是正确的格式
            const normalizedId = userId.startsWith('user_') ? userId : 'user_' + userId;
            
            // 获取发布的商品（兼容 publisherId 和 publisher.id 两种格式）
            const goodsList = JSON.parse(localStorage.getItem('hnau_goods_list') || localStorage.getItem('goodsList') || '[]');
            const myGoods = goodsList.filter(g => 
                // 匹配 publisher.name（username格式）
                (g.publisher && g.publisher.name === userId) || 
                // 匹配 publisherId（user_xxx格式或纯username格式）
                g.publisherId === normalizedId || 
                g.publisherId === userId ||
                // 匹配 publisher.id
                (g.publisher && g.publisher.id === normalizedId) ||
                (g.publisher && g.publisher.id === userId)
            );
            document.getElementById('statPublished').textContent = myGoods.length;
            
            // 获取已售出数量
            const soldCount = myGoods.filter(g => g.status === 'sold').length;
            document.getElementById('statSold').textContent = soldCount;
            
            // 获取总浏览量
            const totalViews = myGoods.reduce((sum, g) => sum + (g.views || 0), 0);
            document.getElementById('statViews').textContent = totalViews;
            
            // 获取发布的需求（兼容 publisher.id 格式）
            const demandList = JSON.parse(localStorage.getItem('hnau_demand_list') || localStorage.getItem('demandList') || '[]');
            const myDemands = demandList.filter(d => 
                // 匹配 publisher.name（username格式）
                (d.publisher && d.publisher.name === userId) || 
                // 匹配 publisherId（user_xxx格式或纯username格式）
                d.publisherId === normalizedId || 
                d.publisherId === userId ||
                // 匹配 publisher.id
                (d.publisher && d.publisher.id === normalizedId) ||
                (d.publisher && d.publisher.id === userId)
            );
            document.getElementById('statDemands').textContent = myDemands.length;
        }
        
        // 加载我的发布列表 - 兼容多种用户ID格式
        function loadMyPublications(userId) {
            // 确保 userId 是正确的格式
            const normalizedId = userId.startsWith('user_') ? userId : 'user_' + userId;
            
            // 加载发布的商品
            const goodsList = JSON.parse(localStorage.getItem('hnau_goods_list') || localStorage.getItem('goodsList') || '[]');
            const myGoods = goodsList.filter(g => 
                // 匹配 publisher.name（username格式）
                (g.publisher && g.publisher.name === userId) || 
                // 匹配 publisherId（user_xxx格式或纯username格式）
                g.publisherId === normalizedId || 
                g.publisherId === userId ||
                // 匹配 publisher.id
                (g.publisher && g.publisher.id === normalizedId) ||
                (g.publisher && g.publisher.id === userId)
            );
            
            const goodsContainer = document.getElementById('myGoodsList');
            const publishedCount = document.getElementById('publishedCount');
            publishedCount.textContent = myGoods.length + ' 件商品';
            
            if (myGoods.length === 0) {
                goodsContainer.innerHTML = '<div class="empty-tip">暂无发布的闲置物品</div>';
            } else {
                goodsContainer.innerHTML = myGoods.slice(0, 5).map(g => `
                    <div class="publication-item">
                        <div class="item-info">
                            <span class="item-title">${g.name || g.title || '未命名'}</span>
                            <span class="item-price">¥${g.price || 0}</span>
                        </div>
                        <span class="item-status ${g.status || 'available'}">${getStatusText(g.status)}</span>
                    </div>
                `).join('');
            }
            
            // 加载发布的需求
            const demandList = JSON.parse(localStorage.getItem('hnau_demand_list') || localStorage.getItem('demandList') || '[]');
            const myDemands = demandList.filter(d => 
                // 匹配 publisher.name（username格式）
                (d.publisher && d.publisher.name === userId) || 
                // 匹配 publisherId（user_xxx格式或纯username格式）
                d.publisherId === normalizedId || 
                d.publisherId === userId ||
                // 匹配 publisher.id
                (d.publisher && d.publisher.id === normalizedId) ||
                (d.publisher && d.publisher.id === userId)
            );
            
            const demandsContainer = document.getElementById('myDemandsList');
            const demandsCount = document.getElementById('demandsCount');
            demandsCount.textContent = myDemands.length + ' 条需求';
            
            if (myDemands.length === 0) {
                demandsContainer.innerHTML = '<div class="empty-tip">暂无发布的需求</div>';
            } else {
                demandsContainer.innerHTML = myDemands.slice(0, 5).map(d => `
                    <div class="publication-item demand-item">
                        <div class="item-info">
                            <span class="item-title">${d.title || '未命名'}</span>
                            <span class="item-price">¥${d.price || 0}</span>
                        </div>
                        <span class="item-status">${d.status === 'published' ? '发布中' : '已结束'}</span>
                    </div>
                `).join('');
            }
        }
        
        // 获取状态文字
        function getStatusText(status) {
            const statusMap = {
                'available': '在售',
                'reserved': '已预约',
                'sold': '已售出',
                'deleted': '已删除'
            };
            return statusMap[status] || '在售';
        }
        
        // 监听 storage 变化，自动刷新数据（当用户在其他页面发布后返回）
        window.addEventListener('storage', function(e) {
            if (e.key === 'goodsList' || e.key === 'demandList' || e.key === 'currentUser') {
                const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
                if (currentUser && currentUser.id) {
                    loadStats(currentUser.id);
                    loadMyPublications(currentUser.id);
                }
            }
        });
        
        // 页面可见性变化时刷新数据（当用户从其他页面返回）
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
                if (currentUser && currentUser.id) {
                    loadUserData();
                    loadMyPublications(currentUser.id);
                }
            }
        });
        
        // 保存个人信息
        function saveProfile(e) {
            e.preventDefault();
            
            // 使用 Auth 获取当前用户
            const currentUser = Auth.getCurrentUser();
            if (!currentUser) {
                showToast('请先登录', true);
                return false;
            }
            
            // 获取表单数据
            const newUsername = document.getElementById('editNickname').value.trim();
            const newSchool = document.getElementById('editSchool').value.trim();
            const newContact = document.getElementById('editContact').value.trim();
            const newBio = document.getElementById('editBio').value.trim();
            
            // 获取用户列表
            const userList = Storage.get('userList') || [];
            const userIndex = userList.findIndex(u => u.username === currentUser.username);
            
            if (userIndex !== -1) {
                // 更新用户信息
                userList[userIndex].username = newUsername;
                userList[userIndex].school = newSchool;
                userList[userIndex].campus = newSchool;
                userList[userIndex].contact = newContact;
                userList[userIndex].phone = newContact;
                userList[userIndex].bio = newBio;
                userList[userIndex].intro = newBio;
                
                // 保存到 localStorage
                Storage.set('userList', userList);
            }
            
            // 更新页面显示
            document.getElementById('userName').textContent = newUsername || '未设置昵称';
            document.getElementById('userId').textContent = 'ID: ' + (currentUser.id || '-');
            
            // 触发 storage 事件通知其他页面
            localStorage.setItem('userProfileUpdated', Date.now().toString());
            
            showToast('修改成功！');
            
            // 重新加载页面以刷新所有数据
            setTimeout(() => {
                loadUserData();
            }, 100);
            
            return false;
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', loadUserData);
    </script>
</body>
</html>
