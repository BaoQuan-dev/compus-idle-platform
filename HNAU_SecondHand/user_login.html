<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="河南农业大学登录注册">
    <title>登录/注册 - 农大闲置</title>
    <link rel="stylesheet" href="./style/main.css">
</head>
<body style="background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0f0f23 100%) !important;">
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-container">
            <!-- Logo -->
            <a href="starfield.html" class="navbar-brand">
                <img src="./images/logo.png" alt="农大闲置" class="navbar-logo" onerror="this.style.display='none'">
                <span>🌱 农大闲置</span>
            </a>

            <!-- 导航菜单（PC端） -->
            <ul class="navbar-menu">
                <li class="navbar-menu-item">
                    <a href="starfield.html" class="navbar-menu-link">首页</a>
                </li>
                <li class="navbar-menu-item">
                    <a href="javascript:void(0)" class="navbar-menu-link" id="releaseBtn">发布闲置</a>
                </li>
                <li class="navbar-menu-item">
                    <a href="stu_check.html" class="navbar-menu-link">校园认证</a>
                </li>
                <li class="navbar-menu-item">
                    <a href="user_center.html" class="navbar-menu-link">个人中心</a>
                </li>
                <li class="navbar-menu-item">
                    <a href="carbon_ai.html" class="navbar-menu-link">🤖 碳足迹AI助手</a>
                </li>
                <li class="navbar-menu-item">
                    <a href="donation_list.html" class="navbar-menu-link">🌱 公益转赠通道</a>
                </li>
                <li class="navbar-menu-item">
                    <a href="demand_board.html" class="navbar-menu-link">📋 需求公告板</a>
                </li>
                <li class="navbar-menu-item">
                    <a href="manage_admin.html" class="navbar-menu-link">管理员</a>
                </li>
            </ul>

            <!-- 用户操作 -->
            <div class="navbar-actions">
                <!-- JS渲染 -->
            </div>

            <!-- 汉堡菜单按钮（移动端） -->
            <button class="navbar-hamburger" aria-label="菜单">
                <span class="navbar-hamburger-line"></span>
                <span class="navbar-hamburger-line"></span>
                <span class="navbar-hamburger-line"></span>
            </button>
        </div>

        <!-- 移动端菜单 -->
        <div class="navbar-mobile-menu">
            <a href="starfield.html" class="navbar-mobile-menu-item">首页</a>
            <a href="javascript:void(0)" class="navbar-mobile-menu-item" id="mobileReleaseBtn">发布闲置</a>
            <a href="stu_check.html" class="navbar-mobile-menu-item">校园认证</a>
            <a href="user_center.html" class="navbar-mobile-menu-item">个人中心</a>
            <a href="carbon_ai.html" class="navbar-mobile-menu-item">🤖 碳足迹AI助手</a>
            <a href="donation_list.html" class="navbar-mobile-menu-item">🌱 公益转赠通道</a>
            <a href="manage_admin.html" class="navbar-mobile-menu-item">管理员</a>
            <div class="navbar-mobile-actions">
                <!-- JS渲染 -->
            </div>
        </div>

        <!-- 遮罩层 -->
        <div class="navbar-overlay"></div>
    </nav>

    <!-- 主内容区域 -->
    <main class="main-content">
        <!-- 页面标题 -->
        <div class="page-header">
            <div class="container">
                <h1>👤 用户中心</h1>
                <p>登录或注册账号，享受更多功能</p>
            </div>
        </div>

        <!-- 登录注册内容区 -->
        <section class="container" style="padding-top: 30px; padding-bottom: 30px;">
            <div class="card" style="max-width: 500px; margin: 0 auto;" id="loginContent">
                <!-- 选项卡 -->
                <div class="tabs">
                    <div class="tabs-nav">
                        <div class="tabs-nav-item active" data-tab="login">登录</div>
                        <div class="tabs-nav-item" data-tab="register">注册</div>
                    </div>
                </div>

                <!-- 登录面板 -->
                <div class="tabs-panel active" id="loginPanel">
                    <form id="loginForm">
                        <div class="form-group">
                            <label class="form-label" for="loginUsername">用户名</label>
                            <input type="text" id="loginUsername" class="form-input" 
                                   placeholder="请输入用户名" autocomplete="username">
                            <p class="form-error" id="loginUsernameError"></p>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="loginPassword">密码</label>
                            <input type="password" id="loginPassword" class="form-input" 
                                   placeholder="请输入密码" autocomplete="current-password">
                            <p class="form-error" id="loginPasswordError"></p>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn" disabled>
                            登录
                        </button>
                    </form>
                    <p style="text-align: center; margin-top: 20px; color: var(--text-hint); font-size: 14px;">
                        还没有账号？<a href="javascript:void(0)" class="go-register" style="color: var(--primary-color);">立即注册</a>
                    </p>
                </div>

                <!-- 注册面板 -->
                <div class="tabs-panel" id="registerPanel">
                    <form id="registerForm">
                        <div class="form-group">
                            <label class="form-label" for="regUsername">用户名</label>
                            <input type="text" id="regUsername" class="form-input" 
                                   placeholder="请输入6-20位字母、数字或下划线" 
                                   maxlength="20" autocomplete="username">
                            <p class="form-error" id="regUsernameError"></p>
                            <p class="form-help">仅允许字母、数字、下划线，长度6-20位</p>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="regPassword">密码</label>
                            <input type="password" id="regPassword" class="form-input" 
                                   placeholder="请输入6-16位密码" 
                                   maxlength="16" autocomplete="new-password">
                            <p class="form-error" id="regPasswordError"></p>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="regConfirmPassword">确认密码</label>
                            <input type="password" id="regConfirmPassword" class="form-input" 
                                   placeholder="请再次输入密码" 
                                   maxlength="16" autocomplete="new-password">
                            <p class="form-error" id="regConfirmError"></p>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg btn-block" id="registerBtn" disabled>
                            注册
                        </button>
                    </form>
                    <p style="text-align: center; margin-top: 20px; color: var(--text-hint); font-size: 14px;">
                        已有账号？<a href="javascript:void(0)" class="go-login" style="color: var(--primary-color);">立即登录</a>
                    </p>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p class="footer-text">🌟 河南农业大学·星空校园闲置循环平台 | 践行双碳目标，共建星空校园</p>
        </div>
    </footer>

    <!-- 脚本 -->
    <script src="./script/common.js"></script>
    <script src="./script/login.js"></script>
    <script>
        // 移动端发布按钮
        document.addEventListener('DOMContentLoaded', function() {
            var mobileReleaseBtn = document.getElementById('mobileReleaseBtn');
            if (mobileReleaseBtn) {
                mobileReleaseBtn.addEventListener('click', function() {
                    Auth.requireReleasePermission(function() {
                        Utils.跳转('release_goods.html');
                    });
                });
            }

            // 切换链接
            var goRegister = document.querySelector('.go-register');
            if (goRegister) {
                goRegister.addEventListener('click', function() {
                    LoginModule.switchTab('register');
                });
            }

            var goLogin = document.querySelector('.go-login');
            if (goLogin) {
                goLogin.addEventListener('click', function() {
                    LoginModule.switchTab('login');
                });
            }
        });
    </script>
</body>
</html>
