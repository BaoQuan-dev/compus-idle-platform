<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>需求公告板 - 农大闲置</title>
    <link rel="stylesheet" href="style/main.css">
    <style>
        /* ========== 内嵌星空背景 ========== */
        body { position: relative; }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: url('./images/bg-starry.jpg') center center / cover no-repeat;
        }
        /* ========== 星空背景 ========== */
        .cosmos-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: url('./images/bg-starry.jpg') center center / cover no-repeat;
        }
        .cosmos-stars {
            position: absolute;
            width: 100%;
            height: 200%;
            background-image: 
                radial-gradient(2px 2px at 100px 50px, rgba(255,255,255,0.9), transparent),
                radial-gradient(3px 3px at 300px 150px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 500px 80px, rgba(96,165,250,0.9), transparent),
                radial-gradient(3px 3px at 700px 200px, rgba(255,255,255,0.85), transparent),
                radial-gradient(3px 3px at 900px 100px, rgba(192,132,252,0.8), transparent);
            background-size: 1200px 600px;
            animation: starFloat 80s linear infinite;
        }
        .cosmos-nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(96,165,250,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(192,132,252,0.12) 0%, transparent 50%);
        }
        @keyframes starFloat {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }
        
        /* ========== 页面基础样式 ========== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: transparent;
            min-height: 100vh;
            color: #fff;
        }
        
        /* 返回按钮 - 玻璃拟态风格 */
        .ai-back-btn {
            position: fixed;
            top: 20px;
            left: 16px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 10px 16px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 100;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .ai-back-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(96,165,250,0.3);
        }
        
        /* ========== 顶部Banner - 改为透明内嵌式 ========== */
        .page-header {
            background: transparent;
            padding: 80px 20px 10px;
            text-align: center;
            position: relative;
        }
        
        .page-header::before {
            display: none;
        }
        
        .page-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #fff 0%, #60A5FA 50%, #C084FC 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .page-header p {
            font-size: 0.9rem;
            opacity: 0.7;
            position: relative;
            color: rgba(255,255,255,0.7);
        }
        
        /* ========== 主容器 ========== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* ========== 操作栏 ========== */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
            position: relative;
            z-index: 1;
        }
        
        .filter-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            flex: 1;
            position: relative;
            z-index: 2;
        }
        
        .filter-input {
            padding: 10px 14px;
            font-size: 0.9rem;
            min-width: 160px;
            transition: all 0.2s;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            color: #fff;
        }
        
        .filter-input:focus {
            outline: none;
            border-color: #60A5FA;
            box-shadow: 0 0 0 3px rgba(96,165,250,0.2);
        }
        
        .filter-input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .filter-select {
            padding: 10px 14px;
            font-size: 0.9rem;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            cursor: pointer;
            min-width: 120px;
            color: #fff;
        }
        
        .filter-select:focus {
            outline: none;
            border-color: #60A5FA;
        }
        
        /* ========== 搜索联想列表样式 ========== */
        .search-wrapper {
            position: relative;
            flex: 1;
        }
        
        .search-suggestions {
            position: fixed;
            background: linear-gradient(180deg, rgba(25,25,45,0.98) 0%, rgba(15,15,35,0.98) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(96,165,250,0.3);
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 30px rgba(96,165,250,0.15);
            z-index: 99999;
            display: none;
            max-height: 320px;
            overflow-y: auto;
            animation: slideDown 0.2s ease-out;
            min-width: 280px;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .search-suggestions.active {
            display: block;
        }
        
        /* 搜索建议头部 */
        .suggestions-header {
            padding: 10px 14px 6px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .search-suggestion-item {
            padding: 12px 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.85);
        }
        
        .search-suggestion-item:last-child {
            border-bottom: none;
        }
        
        .search-suggestion-item:hover,
        .search-suggestion-item.active {
            background: linear-gradient(90deg, rgba(96,165,250,0.25) 0%, rgba(192,132,252,0.15) 100%);
            padding-left: 18px;
        }
        
        .search-suggestion-item .suggestion-icon {
            width: 28px;
            height: 28px;
            background: rgba(96,165,250,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: #60A5FA;
            flex-shrink: 0;
        }
        
        .search-suggestion-item .suggestion-content {
            flex: 1;
            min-width: 0;
        }
        
        .search-suggestion-item .suggestion-text {
            font-size: 0.9rem;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .search-suggestion-item .suggestion-text mark {
            background: linear-gradient(120deg, rgba(96,165,250,0.4) 0%, rgba(192,132,252,0.4) 100%);
            color: #fff;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 500;
        }
        
        .search-suggestion-item .suggestion-desc {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .search-suggestion-item .suggestion-arrow {
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            transition: transform 0.15s;
        }
        
        .search-suggestion-item:hover .suggestion-arrow,
        .search-suggestion-item.active .suggestion-arrow {
            color: #60A5FA;
            transform: translateX(3px);
        }
        
        .search-no-results {
            padding: 20px 14px;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }
        
        .search-no-results::before {
            content: '🔍';
            display: block;
            font-size: 2rem;
            margin-bottom: 8px;
            opacity: 0.5;
        }
        
        /* 热门搜索标签 */
        .hot-search-tags {
            padding: 10px 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .hot-tag {
            padding: 4px 10px;
            background: rgba(96,165,250,0.15);
            border: 1px solid rgba(96,165,250,0.3);
            border-radius: 20px;
            font-size: 0.8rem;
            color: #60A5FA;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .hot-tag:hover {
            background: rgba(96,165,250,0.3);
            transform: scale(1.05);
        }
        
        .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            color: #fff;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }
        
        .search-wrapper.has-value .search-clear {
            display: flex;
        }
        
        .publish-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, rgba(96,165,250,0.6) 0%, rgba(59,130,246,0.6) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: white;
            border: 1px solid rgba(96,165,250,0.4);
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        
        .publish-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, rgba(96,165,250,0.8) 0%, rgba(59,130,246,0.8) 100%);
            box-shadow: 0 12px 40px rgba(96,165,250,0.3);
        }
        
        /* ========== 统计信息 ========== */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        
        .stats-info {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
        }
        
        .stats-info strong {
            background: linear-gradient(135deg, #fff 0%, #60A5FA 50%, #C084FC 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* ========== 需求列表 ========== */
        .demand-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        /* ========== 需求卡片 ========== */
        .demand-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: all 0.25s;
            cursor: pointer;
        }
        
        .demand-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(96,165,250,0.2);
            border-color: rgba(96,165,250,0.4);
        }
        
        .demand-card-header {
            padding: 16px;
            background: linear-gradient(135deg, rgba(30,40,80,0.8) 0%, rgba(59,130,246,0.4) 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .demand-card-badge {
            background: linear-gradient(135deg, rgba(251,191,36,0.8) 0%, rgba(245,158,11,0.8) 100%);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .demand-card-price {
            background: transparent;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .demand-card-price.free {
            background: linear-gradient(135deg, rgba(96,165,250,0.6) 0%, rgba(59,130,246,0.6) 100%);
        }
        
        .demand-card-body {
            padding: 16px;
        }
        
        .demand-card-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .demand-card-desc {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.6;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .demand-card-desc.expanded {
            -webkit-line-clamp: unset;
        }
        
        .demand-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            padding-top: 12px;
            border-top: 1px dashed rgba(255,255,255,0.1);
        }
        
        .demand-card-user {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .demand-card-avatar {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, rgba(96,165,250,0.6) 0%, rgba(192,132,252,0.6) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }
        
        .demand-card-footer {
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .demand-card-time {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
        }
        
        .demand-card-actions {
            display: flex;
            gap: 8px;
        }
        
        .demand-card-btn {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            backdrop-filter: blur(10px);
        }
        
        .demand-card-btn-edit {
            background: rgba(96,165,250,0.3);
            color: #60A5FA;
        }
        
        .demand-card-btn-delete {
            background: rgba(248,113,113,0.3);
            color: #F87171;
        }
        
        .demand-card-btn:hover {
            opacity: 0.8;
            transform: scale(1.02);
        }
        
        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.04);
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        
        .empty-state-title {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .empty-state-desc {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 20px;
        }
        
        .empty-state-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .empty-state-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(30, 64, 175, 0.3);
        }
        
        /* ========== 发布/编辑弹窗 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            padding: 20px;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            transform: translateY(20px);
            transition: transform 0.3s;
            overflow: hidden;
        }
        
        .modal-overlay.active .modal {
            transform: translateY(0);
        }
        
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #0f172a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #60A5FA 50%, #C084FC 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .modal-close {
            width: 36px;
            height: 36px;
            border: none;
            background: #1e293b;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.8);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-close:hover {
            background: #e0e0e0;
            color: #fff;
        }
        
        .modal-body {
            padding: 24px;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
        }
        
        .form-label.required::after {
            content: ' *';
            color: #d32f2f;
        }
        
        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #0f172a;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        
        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(67, 160, 71, 0.1);
        }
        
        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .form-help {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin-top: 6px;
        }
        
        .form-checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .form-checkbox input {
            width: 18px;
            height: 18px;
            accent-color: #2563eb;
        }
        
        .price-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .price-input-group .form-input {
            flex: 1;
        }
        
        .price-unit {
            color: rgba(255,255,255,0.8);
            font-size: 0.95rem;
        }
        
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #0f172a;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        
        .btn {

    <script>
        // ========== 配置 ==========
        var STORAGE_KEY = 'demandList';
        var currentUser = null;

        // ========== 初始化 ==========

            initSampleData();
            bindEvents();

        // ========== 获取当前用户 ==========
        function initUser() {
            var loginState = JSON.parse(localStorage.getItem('hnau_login_state') || '{}');
            if (loginState && loginState.isLoggedIn && loginState.curUser) {
                // loginState.curUser 是用户名字符串，需要构造成对象
                currentUser = { id: loginState.curUser, name: loginState.curUser, username: loginState.curUser };
            } else {
                currentUser = { id: 'guest_' + Date.now(), name: '游客', username: '游客' };
            }
        }
        
        // ========== 获取需求列表 ==========
        function getDemands() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }
        
        // ========== 保存需求列表 ==========
        function saveDemands(demands) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(demands));

                },
                {

                    description: '想要一款降噪耳机，预算300以内，品牌最好是小米或华为。',

                },
                {
                    id: 'sample_4',
                    title: '求购一台二手笔记本电脑',
                    description: '学习用，不打游戏，预算1500以内，要求续航好，屏幕14寸以上。',
                    price: 1500,
                    priceNegotiable: true,
                    contact: '手机：139****1234',

                    note: '最好带充电器',

                    publisher: { id: 'user_4', name: '编程新手' },
                    publishTime: new Date(Date.now() - 345600000).toISOString(),

                },
                {

                    description: '需要历年真题和词汇书，最好是2024年最新版，星火或新东方的都可以。',
                    price: 80,

                }
            ];
            
            saveDemands(sampleData);
        }
        
        // ========== 加载需求 ==========
        function loadDemands() {
            var demands = getDemands();
            renderDemands(demands);
            document.getElementById('totalCount').textContent = demands.length;
        }
        
        // ========== 渲染需求列表 ==========
        function renderDemands(demands) {
            var listEl = document.getElementById('demandList');
            var emptyEl = document.getElementById('emptyState');
            
            // 【修改】独立筛选层
            var keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            var timeSort = document.getElementById('timeSort').value;  // 最新/最早
            var priceSort = document.getElementById('priceSort').value;  // 价格排序
            
            // 筛选层1：关键词搜索
            if (keyword) {
                demands = demands.filter(function(d) {
                    return d.title.toLowerCase().includes(keyword) ||
                           d.description.toLowerCase().includes(keyword) ||
                           d.note.toLowerCase().includes(keyword);
                });
            }
            
            // 筛选层2&3：排序（时间优先 OR 价格优先，互斥）
            demands.sort(function(a, b) {
                // 如果选择了价格排序，优先按价格排序
                if (priceSort) {
                    if (priceSort === 'price-low') return (a.price || 0) - (b.price || 0);
                    if (priceSort === 'price-high') return (b.price || 0) - (a.price || 0);
                }
                // 否则按时间排序
                if (timeSort === 'newest') return new Date(b.publishTime) - new Date(a.publishTime);
                if (timeSort === 'oldest') return new Date(a.publishTime) - new Date(b.publishTime);
                // 默认按最新
                return new Date(b.publishTime) - new Date(a.publishTime);
            });
            
            if (demands.length === 0) {
                listEl.innerHTML = '';
                emptyEl.style.display = 'block';
                return;
            }
            
            emptyEl.style.display = 'none';
            
            listEl.innerHTML = demands.map(function(item) {
                var priceText = item.price > 0 ? '¥' + item.price + (item.priceNegotiable ? ' 可协商' : '') : '价格面议';
                var priceClass = item.price > 0 ? '' : 'free';
                var isOwn = item.publisher && (item.publisher.id === currentUser.id || item.publisher.name === currentUser.username);
                var isAuth = JSON.parse(localStorage.getItem('hnau_login_state') || '{}').authStatus === 'approved';
                
                var actionsHtml = '';
                if (isOwn) {
                    actionsHtml = '<button class="demand-card-btn demand-card-btn-edit" onclick="event.stopPropagation(); editDemand(\'' + item.id + '\')">编辑</button>' +
                                  '<button class="demand-card-btn demand-card-btn-delete" onclick="event.stopPropagation(); deleteDemand(\'' + item.id + '\')">删除</button>';
                }
                
                return '<div class="demand-card" onclick="showDetail(\'' + item.id + '\')">' +
                    '<div class="demand-card-header">' +
                    '<span class="demand-card-badge">📋 需求</span>' +
                    '<span class="demand-card-price ' + priceClass + '">' + priceText + '</span>' +
                    '</div>' +
                    '<div class="demand-card-body">' +
                    '<div class="demand-card-title">' + item.title + '</div>' +
                    '<div class="demand-card-desc">' + item.description + '</div>' +
                    '<div class="demand-card-meta">' +
                    '<div class="demand-card-user">' +
                    '<div class="demand-card-avatar">👤</div>' +
                    '<span>' + (item.publisher ? item.publisher.name : '匿名') + '</span>' +
                    '</div>' +
                    '<span>' + formatTime(item.publishTime) + '</span>' +
                    '</div>' +
                    '</div>' +
                    '<div class="demand-card-footer">' +
                    '<span class="demand-card-time">' + formatDate(item.publishTime) + '</span>' +
                    '<div class="demand-card-actions" onclick="event.stopPropagation()">' + actionsHtml + '</div>' +
                    '</div>' +
                    '</div>';
            }).join('');
        }
        
        // ========== 搜索提示词功能 ==========
        var suggestionCache = null;
        var currentSuggestionIndex = -1;
        
        function getAllDemandsForSuggestions() {
            if (!suggestionCache) {
                var allDemands = getDemands();
                suggestionCache = allDemands.map(function(d) {
                    return {
                        title: d.title,
                        description: d.description,
                        category: d.category || '其他'
                    };
                });
            }
            return suggestionCache;
        }
        
        function showSearchSuggestions(keyword) {
            var suggestionsEl = document.getElementById('searchSuggestions');
            var searchInput = document.getElementById('searchInput');
            var demands = getAllDemandsForSuggestions();
            
            // 清空之前的内容
            suggestionsEl.innerHTML = '';
            
            if (!keyword || keyword.length < 1) {
                // 无关键词时显示热门搜索
                suggestionsEl.innerHTML = '<div class="suggestions-header">🔥 热门搜索</div>' +
                    '<div class="hot-search-tags">' +
                    '<span class="hot-tag" onclick="selectSuggestion(\'自行车\')">自行车</span>' +
                    '<span class="hot-tag" onclick="selectSuggestion(\'教材\')">教材</span>' +
                    '<span class="hot-tag" onclick="selectSuggestion(\'电脑\')">电脑</span>' +
                    '<span class="hot-tag" onclick="selectSuggestion(\'手机\')">手机</span>' +
                    '<span class="hot-tag" onclick="selectSuggestion(\'耳机\')">耳机</span>' +
                    '</div>';
                suggestionsEl.classList.add('active');
                currentSuggestionIndex = -1;
            } else {
                keyword = keyword.toLowerCase();
                var matches = demands.filter(function(d) {
                    return d.title.toLowerCase().includes(keyword) ||
                           d.description.toLowerCase().includes(keyword);
                }).slice(0, 6);
                
                if (matches.length === 0) {
                    suggestionsEl.innerHTML = '<div class="search-no-results">没有找到包含"' + keyword + '"的需求</div>';
                    suggestionsEl.classList.add('active');
                } else {
                    suggestionsEl.innerHTML = '<div class="suggestions-header">📋 匹配的需求 (' + matches.length + ')</div>' +
                        matches.map(function(item, index) {
                            var highlightedTitle = highlightKeyword(item.title, keyword);
                            var shortDesc = item.description.length > 30 ? item.description.substring(0, 30) + '...' : item.description;
                            return '<div class="search-suggestion-item" data-index="' + index + '" data-title="' + item.title + '">' +
                                   '<span class="suggestion-icon">📋</span>' +
                                   '<div class="suggestion-content">' +
                                   '<div class="suggestion-text">' + highlightedTitle + '</div>' +
                                   '<div class="suggestion-desc">' + shortDesc + '</div>' +
                                   '</div>' +
                                   '<span class="suggestion-arrow">›</span>' +
                                   '</div>';
                        }).join('');
                    suggestionsEl.classList.add('active');
                    currentSuggestionIndex = -1;
                }
            }
            
            // 定位到搜索框下方 - 使用 fixed 定位确保不被遮挡
            var rect = searchInput.getBoundingClientRect();
            
            // 强制使用 fixed 定位并移动到 body 末尾
            suggestionsEl.style.position = 'fixed';
            suggestionsEl.style.top = (rect.bottom + window.scrollY + 8) + 'px';
            suggestionsEl.style.left = (rect.left + window.scrollX) + 'px';
            suggestionsEl.style.width = rect.width + 'px';
            suggestionsEl.style.zIndex = '99999';
            suggestionsEl.style.visibility = 'visible';
            suggestionsEl.style.opacity = '1';
            
            // 确保在 body 末尾，不被父容器裁剪
            if (suggestionsEl.parentElement !== document.body) {
                document.body.appendChild(suggestionsEl);
            }
        }
        
        function highlightKeyword(text, keyword) {
            if (!keyword) return text;
            var regex = new RegExp('(' + keyword + ')', 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }
        
        function hideSearchSuggestions() {
            var suggestionsEl = document.getElementById('searchSuggestions');
            suggestionsEl.classList.remove('active');
            currentSuggestionIndex = -1;
        }
        
        function selectSuggestion(title) {
            document.getElementById('searchInput').value = title;
            hideSearchSuggestions();
            loadDemands();
        }
        
        // 处理联想列表点击事件（委托）
        document.addEventListener('click', function(e) {
            // 处理热门标签点击
            if (e.target.classList.contains('hot-tag')) {
                var tagText = e.target.textContent;
                selectSuggestion(tagText);
                return;
            }
            // 处理建议项点击
            var suggestionItem = e.target.closest('.search-suggestion-item');
            if (suggestionItem) {
                selectSuggestion(suggestionItem.dataset.title);
            }
        });
        
        // ========== 绑定事件 ==========
        function bindEvents() {
            // 发布按钮
            var publishBtn = document.getElementById('publishBtn');
            if (publishBtn) {
                publishBtn.addEventListener('click', function() {
                    showPublishModal();
                });
            }
            
            // 【修改】筛选 - 搜索框
            var searchInput = document.getElementById('searchInput');
            
            if (!searchInput) {
                console.error('[Demand] 错误：找不到 searchInput 元素！');
                return;
            }
            
            var searchWrapper = searchInput.parentElement;
            
            // input 事件
            searchInput.addEventListener('input', function() {
                var value = this.value.trim();
                if (value) {
                    searchWrapper.classList.add('has-value');
                } else {
                    searchWrapper.classList.remove('has-value');
                }
                showSearchSuggestions(value);
                loadDemands();
            });
            
            // focus 事件
            searchInput.addEventListener('focus', function() {
                showSearchSuggestions(this.value.trim());
            });
            
            searchInput.addEventListener('keydown', function(e) {
                var suggestionsEl = document.getElementById('searchSuggestions');
                var items = suggestionsEl.querySelectorAll('.search-suggestion-item');
                
                if (!suggestionsEl.classList.contains('active') || items.length === 0) {
                    if (e.key === 'Enter') {
                        loadDemands();
                    }
                    return;
                }
                
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    currentSuggestionIndex = (currentSuggestionIndex + 1) % items.length;
                    items.forEach(function(item, i) {
                        item.classList.toggle('active', i === currentSuggestionIndex);
                    });
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    currentSuggestionIndex = currentSuggestionIndex <= 0 ? items.length - 1 : currentSuggestionIndex - 1;
                    items.forEach(function(item, i) {
                        item.classList.toggle('active', i === currentSuggestionIndex);
                    });
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (currentSuggestionIndex >= 0 && items[currentSuggestionIndex]) {
                        selectSuggestion(items[currentSuggestionIndex].dataset.title);
                    } else {
                        loadDemands();
                    }
                } else if (e.key === 'Escape') {
                    hideSearchSuggestions();
                }
            });
            
            // 点击空白处关闭提示
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.search-wrapper')) {
                    hideSearchSuggestions();
                }
            });
            
            // 提示词点击选择
            document.getElementById('searchSuggestions').addEventListener('click', function(e) {
                var item = e.target.closest('.search-suggestion-item');
                if (item) {
                    selectSuggestion(item.dataset.title);
                }
            });
            
            // 【修改】筛选 - 时间排序
            document.getElementById('timeSort').addEventListener('change', function() {
                // 选择时间排序时，清空价格排序
                if (this.value) {
                    document.getElementById('priceSort').value = '';
                }
                loadDemands();
            });
            
            // 【修改】筛选 - 价格排序
            document.getElementById('priceSort').addEventListener('change', function() {
                // 选择价格排序时，清空时间排序
                if (this.value) {
                    document.getElementById('timeSort').value = '';
                }
                loadDemands();
            });
            
            // 弹窗
            document.getElementById('modalClose').addEventListener('click', hidePublishModal);
            document.getElementById('cancelBtn').addEventListener('click', hidePublishModal);
            document.getElementById('submitBtn').addEventListener('click', submitDemand);
            
            // 详情弹窗
            document.getElementById('detailClose').addEventListener('click', hideDetailModal);
            document.getElementById('copyContactBtn').addEventListener('click', copyContact);
            
            // 点击遮罩关闭
            document.getElementById('publishModal').addEventListener('click', function(e) {
                if (e.target === this) hidePublishModal();
            });
            document.getElementById('detailModal').addEventListener('click', function(e) {
                if (e.target === this) hideDetailModal();
            });
        }
        
        // ========== 显示发布弹窗 ==========
        function showPublishModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '📝 发布需求';
            document.getElementById('submitBtn').textContent = '发布需求';
            document.getElementById('editId').value = '';
            document.getElementById('demandTitle').value = '';
            document.getElementById('demandDesc').value = '';
            document.getElementById('demandPrice').value = '';
            document.getElementById('priceNegotiable').checked = false;
            document.getElementById('demandContact').value = '';
            document.getElementById('contactPublic').checked = true;
            document.getElementById('demandNote').value = '';
            document.getElementById('publishModal').classList.add('active');
        }
        
        // ========== 编辑需求 ==========
        function editDemand(id) {
            var demands = getDemands();
            var demand = demands.find(function(d) { return d.id === id; });
            if (!demand) return;
            
            editingId = id;
            document.getElementById('modalTitle').textContent = '✏️ 编辑需求';
            document.getElementById('submitBtn').textContent = '保存修改';
            document.getElementById('editId').value = id;
            document.getElementById('demandTitle').value = demand.title;
            document.getElementById('demandDesc').value = demand.description;
            document.getElementById('demandPrice').value = demand.price || '';
            document.getElementById('priceNegotiable').checked = demand.priceNegotiable || false;
            document.getElementById('demandContact').value = demand.contact || '';
            document.getElementById('contactPublic').checked = demand.contactPublic !== false;
            document.getElementById('demandNote').value = demand.note || '';
            document.getElementById('publishModal').classList.add('active');
        }
        
        // ========== 隐藏发布弹窗 ==========
        function hidePublishModal() {
            document.getElementById('publishModal').classList.remove('active');
            editingId = null;
        }
        
        // ========== 提交需求 ==========
        function submitDemand() {
            var title = document.getElementById('demandTitle').value.trim();
            var description = document.getElementById('demandDesc').value.trim();
            var price = parseFloat(document.getElementById('demandPrice').value) || 0;
            var priceNegotiable = document.getElementById('priceNegotiable').checked;
            var contact = document.getElementById('demandContact').value.trim();
            var contactPublic = document.getElementById('contactPublic').checked;
            var note = document.getElementById('demandNote').value.trim();
            
            // 验证
            if (!title) {
                showToast('请输入需求标题', 'error');
                return;
            }
            if (!description) {
                showToast('请输入需求描述', 'error');
                return;
            }
            if (!contact) {
                showToast('请输入联系方式', 'error');
                return;
            }
            
            var demands = getDemands();
            var now = new Date().toISOString();
            
            if (editingId) {
                // 编辑
                demands = demands.map(function(d) {
                    if (d.id === editingId) {
                        return Object.assign({}, d, {
                            title: title,
                            description: description,
                            price: price,
                            priceNegotiable: priceNegotiable,
                            contact: contact,
                            contactPublic: contactPublic,
                            note: note,
                            updateTime: now
                        });
                    }
                    return d;
                });
                showToast('需求已更新', 'success');
            } else {
                // 新增
                var demand = {
                    id: 'demand_' + Date.now(),
                    title: title,
                    description: description,
                    price: price,
                    priceNegotiable: priceNegotiable,
                    contact: contact,
                    contactPublic: contactPublic,
                    note: note,
                    publisher: {
                        id: currentUser.username,
                        name: currentUser.username
                    },
                    publishTime: now,
                    updateTime: now
                };
                demands.unshift(demand);
                showToast('需求发布成功', 'success');
            }
            
            saveDemands(demands);
            hidePublishModal();
            loadDemands();
        }
        
        // ========== 删除需求 ==========
        function deleteDemand(id) {
            if (!confirm('确定要删除这条需求吗？')) return;
            
            var demands = getDemands();
            demands = demands.filter(function(d) { return d.id !== id; });
            saveDemands(demands);
            showToast('需求已删除', 'success');
            loadDemands();
        }
        
        // ========== 显示详情 ==========
        function showDetail(id) {
            var demands = getDemands();
            var demand = demands.find(function(d) { return d.id === id; });
            if (!demand) return;
            
            currentDetail = demand;
            
            document.getElementById('detailTitle').textContent = demand.title;
            
            var priceText = demand.price > 0 ? '¥' + demand.price + (demand.priceNegotiable ? ' 可协商' : '') : '价格面议';
            document.getElementById('detailPrice').textContent = priceText;
            document.getElementById('detailPrice').className = 'detail-badge detail-badge-price' + (demand.price > 0 ? '' : ' free');
            
            document.getElementById('detailDesc').textContent = demand.description;
            
            // 联系方式
            if (demand.contactPublic) {
                document.getElementById('detailContactLabel').textContent = demand.contact.includes('@') ? '邮箱' : 
                    (demand.contact.match(/\d{11}/) ? '手机号' : '联系方式');
                document.getElementById('detailContact').textContent = demand.contact;
                document.getElementById('detailContact').classList.remove('hidden');
                document.getElementById('copyContactBtn').style.display = 'inline-block';
            } else {
                document.getElementById('detailContactLabel').textContent = '联系方式';
                document.getElementById('detailContact').textContent = '发布者选择隐藏联系方式';
                document.getElementById('detailContact').classList.add('hidden');
                document.getElementById('copyContactBtn').style.display = 'none';
            }
            
            // 备注
            if (demand.note) {
                document.getElementById('detailNoteSection').style.display = 'block';
                document.getElementById('detailNote').textContent = demand.note;
            } else {
                document.getElementById('detailNoteSection').style.display = 'none';
            }
            
            // 发布信息
            document.getElementById('detailPublisher').textContent = '发布者：' + (demand.publisher ? demand.publisher.name : '匿名用户');
            document.getElementById('detailTime').textContent = formatDate(demand.publishTime);
            
            document.getElementById('detailModal').classList.add('active');
        }
        
        // ========== 隐藏详情 ==========
        function hideDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
            currentDetail = null;
        }
        
        // ========== 复制联系方式 ==========
        function copyContact() {
            if (!currentDetail) return;
            navigator.clipboard.writeText(currentDetail.contact).then(function() {
                showToast('联系方式已复制', 'success');
            }).catch(function() {
                showToast('复制失败，请手动复制', 'error');
            });
        }
        
        // ========== 工具函数 ==========
        function formatTime(isoString) {
            if (!isoString) return '';
            var date = new Date(isoString);
            var now = new Date();
            var diff = now - date;
            var minutes = Math.floor(diff / 60000);
            var hours = Math.floor(diff / 3600000);
            var days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return '刚刚';
            if (minutes < 60) return minutes + '分钟前';
            if (hours < 24) return hours + '小时前';
            if (days < 7) return days + '天前';
            return date.toLocaleDateString();
        }
        
        function formatDate(isoString) {
            if (!isoString) return '';
            return new Date(isoString).toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }
        
        function showToast(message, type) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + (type || '');
            toast.classList.add('show');
            setTimeout(function() {
                toast.classList.remove('show');
            }, 2500);
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadDemands();
            bindEvents();
        });
    </script>
</body>
</html>
